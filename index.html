<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galaxy with Zoom Effect</title>
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.152.2/build/three.module.js",
        "three/addons/controls/OrbitControls.js": "https://unpkg.com/three@0.152.2/examples/jsm/controls/OrbitControls.js",
        "three/examples/jsm/loaders/FontLoader.js": "https://unpkg.com/three@0.152.2/examples/jsm/loaders/FontLoader.js",
        "three/examples/jsm/geometries/TextGeometry.js": "https://unpkg.com/three@0.152.2/examples/jsm/geometries/TextGeometry.js"
      }
    }
  </script>
</head>

<body>
  <div id="container"></div>

  <div id="landscape-warning">
    <div class="warning-content">
      <div class="rotate-icon"></div>
      <h1>Stellar Bloom</h1>
      <h1>Tinh Cầu</h1>
      <div class="stars-bg"></div>
    </div>
  </div>

  <div id="dark-overlay"></div>
  <div id="info"></div>
  <h1 id="creator-credit"></h1>
  <button id="musicButton" disabled>Mainkan Musik 🎵</button>
  <div id="player"></div>
  <script src="config.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    document.getElementById('creator-credit').innerText = window.appConfig.creatorName;

    let player;
    const startTime = window.appConfig.music.startTime;
    const endTime = window.appConfig.music.endTime;
    window.onYouTubeIframeAPIReady = function() {
      player = new YT.Player('player', {
        height: '0',
        width: '0',
        videoId: window.appConfig.music.videoId,
        playerVars: {
          autoplay: 0,
          start: startTime,
          end: endTime,
          controls: 0,
          loop: 1,
          playlist: window.appConfig.music.videoId
        },
        events: {
          onReady: () => {
            const btn = document.getElementById('musicButton');
            btn.disabled = false;
            btn.innerText = "Mainkan Musik 🎵";
          },
          onStateChange: (event) => {
            if (event.data === YT.PlayerState.ENDED) {
              player.seekTo(window.appConfig.music.loopSeekTo);
            }
          }
        }
      });
    };

    document.getElementById('musicButton').addEventListener('click', () => {
      if (player) {
        player.playVideo();
        document.getElementById('musicButton').style.display = 'none';
      }
    });
  </script>

  <script type="module" src="script.js"></script>
</body>
</html>
