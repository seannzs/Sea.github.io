<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kuis Bahasa Mandarin — Goresan Dasar (笔画) — SMA Kelas XI</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #EDF2F0; --surface: #F8FBF9; --ink: #141D1A;
      --muted: #6A7872; --accent: #2D6A4F; --border: #C8DDD5;
      --correct: #1B4332; --wrong: #7B2222; --radius: 12px;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; padding: 0 0 80px; }

    header {
      background: var(--ink); color: #EDF2F0;
      padding: 52px 24px 44px; text-align: center; position: relative; overflow: hidden;
    }
    header::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 70% 50%, rgba(45,106,79,.25) 0%, transparent 65%),
                  radial-gradient(ellipse at 20% 80%, rgba(45,106,79,.15) 0%, transparent 55%);
    }
    header .label {
      position: relative; display: inline-block; font-size: .68rem; font-weight: 600;
      letter-spacing: .22em; text-transform: uppercase; color: #74C69D;
      background: rgba(116,198,157,.1); border: 1px solid rgba(116,198,157,.3);
      padding: 5px 16px; border-radius: 99px; margin-bottom: 18px;
    }
    header h1 {
      position: relative;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.9rem, 5vw, 3rem); line-height: 1.18;
    }
    header .hanzi-deco {
      position: absolute; right: 5%; top: 50%; transform: translateY(-50%);
      font-size: 6rem; opacity: .06; user-select: none; line-height: 1;
    }
    header .sub {
      position: relative; margin-top: 10px; color: #8AA898; font-size: .9rem;
    }
    header .difficulty {
      position: relative; display: inline-block; margin-top: 14px;
      font-size: .78rem; font-weight: 600; color: #74C69D;
      background: rgba(116,198,157,.08); border: 1px solid rgba(116,198,157,.25);
      padding: 4px 14px; border-radius: 99px; letter-spacing: .06em;
    }

    #progress-wrap { position: sticky; top: 0; z-index: 10; background: var(--ink); }
    #progress-bar { height: 3px; background: var(--accent); width: 0%; transition: width .35s ease; }
    #progress-count {
      text-align: right; padding: 4px 16px 5px; font-size: .7rem;
      color: #6A7872; background: var(--ink); letter-spacing: .05em;
    }

    .container { max-width: 780px; margin: 0 auto; padding: 40px 20px 0; }

    .question-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px 28px; margin-bottom: 18px;
      transition: box-shadow .2s;
    }
    .question-card:hover { box-shadow: 0 4px 22px rgba(0,0,0,.07); }
    .question-card.unanswered { border-color: #C8962A; box-shadow: 0 0 0 3px rgba(200,150,42,.14); }

    .q-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .q-num { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 700; color: var(--accent); min-width: 30px; }
    .q-tag {
      font-size: .68rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase;
      color: var(--muted); background: var(--bg); border: 1px solid var(--border);
      padding: 3px 10px; border-radius: 99px;
    }
    .q-diff {
      font-size: .65rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      padding: 3px 9px; border-radius: 99px;
    }
    .q-diff.hard { color: #7B2222; background: rgba(123,34,34,.08); border: 1px solid rgba(123,34,34,.2); }
    .q-diff.medium { color: #5A6A1A; background: rgba(90,106,26,.08); border: 1px solid rgba(90,106,26,.2); }

    .q-text { font-size: 1rem; line-height: 1.72; font-weight: 500; margin-bottom: 20px; }
    .q-text .hanzi { font-size: 2.8rem; display: block; text-align: center; margin: 12px 0 4px; letter-spacing: .15em; color: var(--accent); }
    .q-text .pinyin { display: block; text-align: center; font-size: .85rem; color: var(--muted); margin-bottom: 10px; font-style: italic; }
    .stroke-box {
      display: flex; justify-content: center; gap: 16px; flex-wrap: wrap;
      margin: 12px 0; padding: 14px; background: var(--bg);
      border: 1px dashed var(--border); border-radius: 8px;
    }
    .stroke-item { text-align: center; }
    .stroke-char { font-size: 1.8rem; color: var(--accent); display: block; }
    .stroke-name { font-size: .72rem; color: var(--muted); margin-top: 2px; }
    .q-note { font-size: .82rem; color: var(--muted); font-style: italic; margin-bottom: 16px; margin-top: -10px; }

    .options { display: flex; flex-direction: column; gap: 9px; }
    .option-label {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 8px;
      cursor: pointer; transition: border-color .15s, background .15s; user-select: none;
    }
    .option-label:hover { border-color: var(--accent); background: #EEF5F1; }
    .option-label input[type="radio"] { display: none; }
    .opt-letter {
      flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%;
      background: var(--bg); border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: .74rem; font-weight: 700; color: var(--muted);
      transition: all .15s; margin-top: 1px;
    }
    .option-label:has(input:checked) { border-color: var(--accent); background: #EEF5F1; }
    .option-label:has(input:checked) .opt-letter { background: var(--accent); border-color: var(--accent); color: #fff; }
    .opt-text { font-size: .92rem; line-height: 1.55; padding-top: 2px; }

    .option-label.correct { border-color: var(--correct); background: #E8F5EE; }
    .option-label.correct .opt-letter { background: var(--correct); border-color: var(--correct); color: #fff; }
    .option-label.wrong { border-color: var(--wrong); background: #FAF0EE; }
    .option-label.wrong .opt-letter { background: var(--wrong); border-color: var(--wrong); color: #fff; }

    #btn-wrap { text-align: center; margin-top: 40px; }
    #submit-btn {
      font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600;
      background: var(--ink); color: #EDF2F0; border: none;
      padding: 16px 56px; border-radius: 8px; cursor: pointer;
      transition: background .2s, transform .1s; letter-spacing: .04em;
    }
    #submit-btn:hover { background: #1F2E28; transform: translateY(-1px); }
    #submit-btn:active { transform: translateY(0); }
    #submit-btn:disabled { opacity: .4; cursor: not-allowed; }

    #warn-msg {
      display: none; margin-top: 12px; font-size: .86rem; color: #8B6200;
      background: #FFF8E6; border: 1px solid #DEB84A; border-radius: 8px;
      padding: 10px 18px; text-align: center;
    }

    #hasil {
      display: none; margin-top: 44px; background: var(--ink); color: #EDF2F0;
      border-radius: var(--radius); padding: 44px 32px; text-align: center;
      animation: fadeUp .5s ease both;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    .score-label { font-size: .72rem; letter-spacing: .2em; text-transform: uppercase; color: #8A9890; margin-bottom: 10px; }
    .score-num { font-family: 'Playfair Display', serif; font-size: clamp(3.5rem,10vw,5.5rem); font-weight: 700; line-height: 1; color: #74C69D; }
    .score-of { font-size: .88rem; color: #8A9890; margin-top: 6px; }
    .predikat { display: inline-block; margin-top: 18px; font-size: 1rem; font-weight: 600; padding: 7px 22px; border-radius: 99px; border: 1.5px solid rgba(255,255,255,.15); }
    .divider { width: 48px; height: 2px; background: rgba(255,255,255,.1); margin: 24px auto; }
    .summary-row { display: flex; justify-content: center; gap: 36px; flex-wrap: wrap; margin-bottom: 30px; }
    .stat .val { font-size: 1.65rem; font-weight: 700; }
    .stat .val.g { color: #7DCFAA; }
    .stat .val.r { color: #E07878; }
    .stat .lbl { font-size: .75rem; color: #8A9890; margin-top: 3px; }
    .kunci-title { font-family: 'Playfair Display', serif; font-size: 1.22rem; margin-bottom: 18px; }
    .kunci-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(270px,1fr)); gap: 10px; text-align: left; }
    .kunci-item { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.09); border-radius: 8px; padding: 12px 14px; font-size: .84rem; line-height: 1.55; }
    .kunci-item.ok { border-color: rgba(125,207,170,.2); }
    .ki-no { color: #74C69D; font-weight: 700; margin-bottom: 4px; font-size: .8rem; }
    .ki-ans { color: #7DCFAA; font-weight: 600; }
    .ki-your { color: #E07878; font-size: .8rem; margin-top: 3px; }
    .ki-explain { color: #8A9890; font-size: .78rem; margin-top: 4px; font-style: italic; }

    #retry-btn {
      margin-top: 28px; font-family: 'DM Sans', sans-serif; font-size: .92rem; font-weight: 600;
      background: transparent; color: #EDF2F0; border: 1.5px solid rgba(255,255,255,.22);
      padding: 12px 36px; border-radius: 8px; cursor: pointer; transition: all .2s;
    }
    #retry-btn:hover { border-color: rgba(255,255,255,.6); background: rgba(255,255,255,.06); }

    @media (max-width: 500px) { .question-card { padding: 22px 16px; } #hasil { padding: 32px 16px; } }
  </style>
</head>

<header>
  <div class="hanzi-deco">笔画</div>
  <div class="label">SMA &middot; Kelas XI &middot; Bahasa Mandarin</div>
  <h1>Kuis Goresan (笔画)</h1>
  <p class="sub">Urutan & Jenis Goresan Dasar Penulisan Karakter Mandarin &mdash; 20 soal pilihan ganda</p>
  <div class="difficulty">&#9888; Tingkat Kesulitan: Dasar–Menengah</div>
</header>
<div id="progress-wrap">
  <div id="progress-bar"></div>
  <div id="progress-count">0 / 20 dijawab</div>
</div>

<div class="container">
  <div id="quiz-form"></div>

    <button id="submit-btn">Kirim Jawaban</button>
    <div id="warn-msg">&#9888; Masih ada soal yang belum dijawab. Lengkapi semua jawaban terlebih dahulu.</div>
  </div>
  <div id="hasil"></div>
</div>

<script>
const questions = [
  {
    topic: "Jenis Goresan Dasar",
    diff: "medium",
    q: 'Dalam penulisan karakter Mandarin, terdapat goresan yang disebut 横 (héng). Apa deskripsi goresan ini?<span class="hanzi">一</span><span class="pinyin">héng</span>',
    note: "",
    opts: [
      "Goresan vertikal dari atas ke bawah",
      "Goresan horizontal dari kiri ke kanan",
      "Goresan diagonal dari kiri atas ke kanan bawah",
      "Goresan melengkung ke kiri"
    ],
    ans: 1,
    explain: "横 (héng) adalah goresan horizontal yang ditarik dari kiri ke kanan (→). Ini salah satu dari 8 goresan dasar. Contoh karakter yang dimulai dengan héng: 王 (wáng), 土 (tǔ), 工 (gōng)."
  },
  {
    topic: "Jenis Goresan Dasar",
    diff: "medium",
    q: 'Apa nama goresan vertikal dari atas ke bawah yang ditandai dengan simbol berikut?<span class="hanzi">丨</span>',
    note: "",
    opts: ["横 (héng)", "撇 (piě)", "竖 (shù)", "点 (diǎn)"],
    ans: 2,
    explain: "竖 (shù) adalah goresan vertikal yang ditarik dari atas ke bawah (↓). Contoh karakter: 中 (zhōng), 十 (shí), 木 (mù). Goresan ini bisa lurus 竖 atau dengan ujung menarik ke kiri disebut 竖钩 (shùgōu)."
  },
  {
    topic: "Jenis Goresan Dasar",
    diff: "medium",
    q: 'Goresan 撇 (piě) memiliki arah penulisan yang bagaimana?<span class="hanzi">丿</span>',
    note: "",
    opts: [
      "Dari kiri ke kanan secara horizontal",
      "Dari atas ke bawah secara vertikal",
      "Dari kanan atas ke kiri bawah (miring ke kiri)",
      "Dari kiri bawah ke kanan atas (miring ke kanan)"
    ],
    ans: 2,
    explain: "撇 (piě) adalah goresan diagonal dari kanan atas menuju kiri bawah (↙). Karakter seperti 人 (rén), 八 (bā), dan 木 (mù) menggunakan goresan ini. Piě selalu ditarik ke kiri, bukan ke kanan."
  },
  {
    topic: "Jenis Goresan Dasar",
    diff: "medium",
    q: 'Goresan 捺 (nà) adalah pasangan dari 撇 (piě). Ke mana arah goresan 捺?<span class="hanzi">㇏</span>',
    note: "",
    opts: [
      "Dari kanan atas ke kiri bawah",
      "Dari kiri atas ke kanan bawah, dengan ujung yang menebal",
      "Dari bawah ke atas secara vertikal",
      "Titik kecil ke arah kiri"
    ],
    ans: 1,
    explain: "捺 (nà) adalah goresan diagonal dari kiri atas ke kanan bawah (↘), dengan ciri khas ujungnya menebal sebelum diangkat (seperti ekor). Karakter 人 (rén) dan 大 (dà) menggunakan kombinasi piě (↙) + nà (↘)."
  },
  {
    topic: "Jenis Goresan Dasar",
    diff: "medium",
    q: 'Apa nama goresan titik kecil yang ditunjukkan dalam karakter berikut (bagian atas karakter)?<span class="hanzi">主</span><span class="pinyin">zhǔ</span>',
    note: "Perhatikan titik di bagian paling atas karakter tersebut.",
    opts: ["横 (héng)", "竖 (shù)", "钩 (gōu)", "点 (diǎn)"],
    ans: 3,
    explain: "点 (diǎn) adalah goresan titik, biasanya ditulis sebagai sentuhan kuas kecil ke bawah-kiri atau bawah-kanan. Karakter 主 (zhǔ) memiliki titik 点 di atasnya. Karakter 六 (liù), 心 (xīn) juga menggunakan banyak goresan 点."
  },
  {
    topic: "Jenis Goresan Dasar",
    diff: "medium",
    q: '钩 (gōu) bukan goresan mandiri, melainkan tambahan di ujung goresan lain. Contoh 竖钩 (shùgōu) terlihat pada karakter …',
    note: "",
    opts: [
      "日 (rì) — matahari/hari",
      "小 (xiǎo) — kecil",
      "了 (le) — partikel aspek",
      "大 (dà) — besar"
    ],
    ans: 2,
    explain: "了 (le) menggunakan竖钩 (shùgōu): goresan vertikal yang di ujungnya melengkung ke kiri membentuk kait. Contoh lain: 水 (shuǐ), 子 (zǐ). Kait ini membantu membedakan karakter yang mirip."
  },
  {
    topic: "Aturan Urutan Goresan",
    diff: "medium",
    q: 'Aturan urutan goresan yang pertama dan paling dasar dalam bahasa Mandarin adalah …',
    note: "",
    opts: [
      "Dari bawah ke atas, lalu dari kanan ke kiri",
      "Dari kiri ke kanan, dan dari atas ke bawah",
      "Dari dalam ke luar, lalu menutup kotak",
      "Dari goresan diagonal dulu, baru goresan lurus"
    ],
    ans: 1,
    explain: "Dua aturan paling dasar urutan goresan (笔顺 bǐshùn): (1) Dari kiri ke kanan, (2) Dari atas ke bawah. Aturan ini berlaku untuk mayoritas karakter. Aturan tambahan berlaku untuk karakter dengan struktur khusus seperti kotak atau simetri."
  },
  {
    topic: "Aturan Urutan Goresan",
    diff: "medium",
    q: 'Untuk karakter yang memiliki struktur kotak seperti 口 (kǒu), urutan penulisan yang benar adalah …',
    note: "",
    opts: [
      "Goresan bawah dulu, lalu dua sisi, lalu atas",
      "Goresan kiri vertikal → atas horizontal + kanan vertikal → bawah horizontal (tutup kotak terakhir)",
      "Semua goresan horizontal dulu, baru vertikal",
      "Mulai dari tengah kotak, lalu keluar"
    ],
    ans: 1,
    explain: "Untuk kotak (口): (1) Goresan kiri竖 ↓, (2) Goresan atas横 → + kanan竖 (dalam satu gerakan atau terpisah), (3) Goresan bawah横 untuk menutup. Aturan: 'tutup kotak di akhir'. Karakter 日 (rì), 月 (yuè) juga ikuti pola ini."
  },
  {
    topic: "Aturan Urutan Goresan",
    diff: "hard",
    q: 'Karakter 小 (xiǎo = kecil) memiliki 3 goresan. Urutan penulisan yang benar adalah …',
    note: "",
    opts: [
      "竖钩 (tengah) → 撇 (kiri) → 点 (kanan)",
      "撇 (kiri) → 竖钩 (tengah) → 点 (kanan)",
      "点 (kanan) → 竖钩 (tengah) → 撇 (kiri)",
      "竖钩 (tengah) → 点 (kanan) → 撇 (kiri)"
    ],
    ans: 0,
    explain: "小 (xiǎo) ditulis: (1) 竖钩 di tengah ↓↪, (2) 撇 di kiri ↙, (3) 点 di kanan ↘. Untuk karakter simetris seperti 小, bagian tengah ditulis DULU, baru kiri, lalu kanan. Ini berbeda dari aturan 'kiri dulu' yang umum."
  },
  {
    topic: "Aturan Urutan Goresan",
    diff: "hard",
    q: 'Karakter 女 (nǚ = perempuan) memiliki urutan goresan yang khas. Goresan pertamanya adalah …',
    note: "",
    opts: [
      "Goresan vertikal di tengah",
      "Goresan horizontal di bawah",
      "Goresan 撇折 (piě-zhé): diagonal kiri bawah lalu belok kanan",
      "Titik di kanan atas"
    ],
    ans: 2,
    explain: "女 (nǚ) dimulai dengan 撇折 (piě-zhé): goresan kombinasi yang dimulai diagonal ke kiri bawah lalu berbelok ke kanan. Ini contoh goresan majemuk. Urutan lengkap: (1) 撇折 (badan bawah), (2) 撇 (lengan kiri), (3) 横 (goresan atas yang memotong)."
  },
  {
    topic: "Jumlah Goresan",
    diff: "medium",
    q: 'Berapa jumlah goresan (笔画数 bǐhuà shù) karakter 人 (rén = orang)?<span class="hanzi">人</span><span class="pinyin">rén</span>',
    note: "",
    opts: ["1 goresan", "2 goresan", "3 goresan", "4 goresan"],
    ans: 1,
    explain: "人 (rén) hanya terdiri dari 2 goresan: (1) 撇 piě (diagonal kiri) + (2) 捺 nà (diagonal kanan). Karakter ini adalah salah satu yang paling sederhana. Jumlah goresan penting untuk pengurutan kamus Mandarin tradisional."
  },
  {
    topic: "Jumlah Goresan",
    diff: "medium",
    q: 'Berapa jumlah goresan karakter 日 (rì = matahari/hari)?<span class="hanzi">日</span><span class="pinyin">rì</span>',
    note: "",
    opts: ["3 goresan", "4 goresan", "5 goresan", "6 goresan"],
    ans: 1,
    explain: "日 (rì) memiliki 4 goresan: (1) 竖 kiri, (2) 横折 atas+kanan, (3) 横 tengah, (4) 横 bawah penutup. Struktur kotak dengan satu garis tengah = 4 goresan. Bandingkan: 口 (kǒu) = 3 goresan (kotak tanpa garis tengah)."
  },
  {
    topic: "Jumlah Goresan",
    diff: "medium",
    q: 'Berapa jumlah goresan karakter 山 (shān = gunung)?<span class="hanzi">山</span><span class="pinyin">shān</span>',
    note: "",
    opts: ["2 goresan", "3 goresan", "4 goresan", "5 goresan"],
    ans: 1,
    explain: "山 (shān) memiliki 3 goresan: (1) 竖折 (竖+横折): goresan kiri yang membentuk sudut, (2) 竖 tengah (paling tinggi), (3) 竖折 kanan. Karakter ini menggambarkan tiga puncak gunung — termasuk karakter piktografik tertua."
  },
  {
    topic: "Jumlah Goresan",
    diff: "hard",
    q: 'Berapa jumlah goresan karakter 学 (xué = belajar)?<span class="hanzi">学</span><span class="pinyin">xué</span>',
    note: "",
    opts: ["6 goresan", "7 goresan", "8 goresan", "9 goresan"],
    ans: 2,
    explain: "学 (xué) memiliki 8 goresan. Karakter ini terdiri dari komponen atas 爫 (zhǎo, 3 goresan) + 冖 (mì, 2 goresan) + 子 (zǐ, 3 goresan) = 8. Menghitung goresan dengan tepat penting untuk mencari karakter di kamus tradisional."
  },
  {
    topic: "Komponen & Radikal",
    diff: "medium",
    q: 'Dalam sistem kamus Mandarin, 部首 (bùshǒu) atau radikal digunakan untuk …',
    note: "",
    opts: [
      "Menentukan nada (tones) sebuah karakter",
      "Mengklasifikasikan karakter untuk memudahkan pencarian di kamus",
      "Menunjukkan arti gramatikal sebuah kata",
      "Menentukan urutan goresan yang benar"
    ],
    ans: 1,
    explain: "部首 (bùshǒu) adalah komponen kunci karakter yang digunakan sebagai indeks kamus. Ada 214 radikal dalam sistem Kangxi tradisional. Misalnya: karakter yang berhubungan dengan air sering mengandung 氵(sāndiǎnshuǐ = tiga titik air)."
  },
  {
    topic: "Komponen & Radikal",
    diff: "medium",
    q: 'Komponen 氵(sāndiǎnshuǐ) yang terlihat di sisi kiri karakter seperti 河 (hé), 海 (hǎi), 游 (yóu) menandakan …',
    note: "",
    opts: [
      "Karakter tersebut berhubungan dengan api",
      "Karakter tersebut berhubungan dengan air",
      "Karakter tersebut berhubungan dengan tanaman",
      "Karakter tersebut berhubungan dengan manusia"
    ],
    ans: 1,
    explain: "氵adalah bentuk singkat dari 水 (shuǐ = air) saat digunakan sebagai radikal di sisi kiri. 河 = sungai, 海 = laut, 游 = berenang — semua berhubungan dengan air. Mengenali radikal sangat membantu dalam menebak arti karakter baru."
  },
  {
    topic: "Komponen & Radikal",
    diff: "medium",
    q: 'Karakter 妈 (māma = ibu), 姐 (jiě = kakak perempuan), 她 (tā = dia perempuan) semuanya memiliki komponen 女 (nǚ) di sisi kiri. Ini menunjukkan …',
    note: "",
    opts: [
      "Semua karakter ini dibaca dengan nada yang sama",
      "Semua karakter ini berkaitan dengan konsep kewanitaan atau perempuan",
      "Semua karakter ini memiliki jumlah goresan yang sama",
      "Semua karakter ini adalah kata kerja"
    ],
    ans: 1,
    explain: "女字旁 (nǚzìpáng) = radikal 'perempuan' menunjukkan hubungan semantik dengan konsep kewanitaan. Contoh lain: 姓 (xìng = marga), 婚 (hūn = pernikahan), 媒 (méi = perantara pernikahan). Radikal membantu memahami kelompok makna karakter."
  },
  {
    topic: "Komponen & Radikal",
    diff: "hard",
    q: 'Karakter Mandarin secara struktural dapat dibagi menjadi beberapa tipe. Karakter 明 (míng = terang) yang terdiri dari 日 (matahari) + 月 (bulan) termasuk tipe …',
    note: "",
    opts: [
      "Piktograf (象形字 xiàngxíngzì) — gambar langsung objek",
      "Karakter indikatif (指事字 zhǐshìzì) — simbol abstrak",
      "Karakter ideografik majemuk (会意字 huìyìzì) — gabungan makna",
      "Karakter fonosemantik (形声字 xíngshēngzì) — radikal + komponen bunyi"
    ],
    ans: 2,
    explain: "明 (míng) adalah 会意字 (huìyìzì): matahari 日 + bulan 月 = terang/cahaya. Ini logika semantik, bukan fonetik. Tipe terbanyak adalah 形声字 (~80% karakter): misal 妈 (māma) = 女 (makna: perempuan) + 马 (mǎ, bunyi). Mengenal tipe karakter membantu hafalan."
  },
  {
    topic: "Praktik Menulis",
    diff: "medium",
    q: 'Saat belajar menulis karakter Mandarin, kertas latihan khusus yang berisi kotak-kotak dengan garis diagonal disebut …',
    note: "",
    opts: [
      "田字格 (tiánzìgé) — kotak dengan garis tengah membentuk tanda 田",
      "方格纸 (fānggézhǐ) — kertas kotak-kotak biasa",
      "横线本 (héngxiànběn) — buku bergaris horizontal",
      "白纸 (báizhǐ) — kertas putih polos"
    ],
    ans: 0,
    explain: "田字格 (tiánzìgé) adalah kertas latihan menulis karakter dengan kotak dibagi menjadi 4 bagian oleh garis tengah (seperti karakter 田). Garis panduan ini membantu siswa menempatkan komponen karakter secara proporsional dan seimbang."
  },
  {
    topic: "Praktik Menulis",
    diff: "hard",
    q: 'Karakter 永 (yǒng = abadi/selamanya) terkenal dalam kaligrafi karena mengandung 8 goresan dasar. Prinsip ini disebut …',
    note: "",
    opts: [
      "八仙过海 (bā xiān guò hǎi) — delapan dewa menyeberangi laut",
      "永字八法 (yǒngzì bā fǎ) — delapan teknik goresan karakter 永",
      "八卦 (bāguà) — delapan trigram filosofi",
      "楷书八则 (kǎishū bā zé) — delapan aturan kaligrafi reguler"
    ],
    ans: 1,
    explain: "永字八法 (yǒngzì bā fǎ) = 'delapan metode karakter 永': satu karakter ini mengandung 8 goresan dasar: 侧(diǎn), 勒(héng), 努(shù), 趯(gōu), 策(piě pendek), 掠(piě panjang), 啄(nà pendek), 磔(nà panjang). Ini menjadi dasar pengajaran kaligrafi Tiongkok klasik."
  }
];

const letters = ['A','B','C','D'];
const form = document.getElementById('quiz-form');
const bar  = document.getElementById('progress-bar');
const countEl = document.getElementById('progress-count');
const warn = document.getElementById('warn-msg');
const hasilDiv = document.getElementById('hasil');
const submitBtn = document.getElementById('submit-btn');

questions.forEach((item, i) => {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = 'card-' + i;
  const optsHTML = item.opts.map((opt, j) => `
    <label class="option-label" id="lbl-${i}-${j}">
      <input type="radio" name="q${i}" value="${j}" />
      <span class="opt-letter">${letters[j]}</span>
      <span class="opt-text">${opt}</span>
    </label>`).join('');
  const diffLabel = item.diff === 'hard'
    ? '<span class="q-diff hard">Sulit</span>'
    : '<span class="q-diff medium">Sedang</span>';
  card.innerHTML = `
    <div class="q-meta">
      <span class="q-num">${String(i+1).padStart(2,'0')}.</span>
      <span class="q-tag">${item.topic}</span>
      ${diffLabel}
    </div>
    <p class="q-text">${item.q}</p>
    ${item.note ? '<p class="q-note">'+item.note+'</p>' : ''}
    <div class="options">${optsHTML}</div>`;
  form.appendChild(card);
});

function updateProgress() {
  let n = 0;
  questions.forEach((_,i) => { if (document.querySelector('input[name="q'+i+'"]:checked')) n++; });
  bar.style.width = (n / questions.length * 100) + '%';
  countEl.textContent = n + ' / ' + questions.length + ' dijawab';
}
form.addEventListener('change', updateProgress);

submitBtn.addEventListener('click', () => {
  const unanswered = [];
  questions.forEach((_,i) => {
    const card = document.getElementById('card-'+i);
    if (!document.querySelector('input[name="q'+i+'"]:checked')) {
      unanswered.push(i); card.classList.add('unanswered');
    } else { card.classList.remove('unanswered'); }
  });

  if (unanswered.length > 0) {
    warn.style.display = 'block';
    document.getElementById('card-'+unanswered[0]).scrollIntoView({ behavior:'smooth', block:'center' });
    return;
  }
  warn.style.display = 'none';
  submitBtn.disabled = true;
  form.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = true);

  let correct = 0;
  const details = [];
  questions.forEach((item, i) => {
    const sel = parseInt(document.querySelector('input[name="q'+i+'"]:checked').value);
    const ok = sel === item.ans;
    if (ok) correct++;
    for (let j = 0; j < item.opts.length; j++) {
      const lbl = document.getElementById('lbl-'+i+'-'+j);
      if (j === item.ans) lbl.classList.add('correct');
      else if (j === sel && !ok) lbl.classList.add('wrong');
    }
    details.push({ q:i+1, topic:item.topic, ans:item.ans, sel, ok,
      ansText:item.opts[item.ans], selText:item.opts[sel], explain:item.explain });
  });

  const score = Math.round(correct / questions.length * 100);
  let pred, col;
  if (score >= 90)      { pred = '&#127942; Luar Biasa';              col = '#74C69D'; }
  else if (score >= 75) { pred = '&#9733; Sangat Baik';               col = '#A8D08D'; }
  else if (score >= 60) { pred = '&#128218; Baik';                    col = '#F0C040'; }
  else if (score >= 40) { pred = '&#128214; Cukup — Terus Belajar';   col = '#E09050'; }
  else                  { pred = '&#128172; Jangan Menyerah!';        col = '#E07878'; }

  const kunciHTML = details.map(d => `
    <div class="kunci-item ${d.ok?'ok':''}">
      <div class="ki-no">Soal ${d.q} &mdash; ${d.topic}</div>
      <div class="ki-ans">&#10003; Benar: ${letters[d.ans]}. ${d.ansText}</div>
      ${!d.ok ? '<div class="ki-your">&#10007; Jawaban kamu: '+letters[d.sel]+'. '+d.selText+'</div>' : ''}
      <div class="ki-explain">${d.explain}</div>
    </div>`).join('');

  hasilDiv.innerHTML = `
    <div class="score-label">Nilai Kamu</div>
    <div class="score-num">${score}</div>
    <div class="score-of">${correct} dari ${questions.length} soal benar</div>
    <div class="predikat" style="border-color:${col}44;color:${col}">${pred}</div>
    <div class="divider"></div>
    <div class="summary-row">
      <div class="stat"><div class="val g">${correct}</div><div class="lbl">Benar</div></div>
      <div class="stat"><div class="val r">${questions.length-correct}</div><div class="lbl">Salah</div></div>
      <div class="stat"><div class="val">${questions.length}</div><div class="lbl">Total</div></div>
    </div>
    <div class="kunci-title">Kunci Jawaban &amp; Penjelasan</div>
    <div class="kunci-grid">${kunciHTML}</div>
    <button id="retry-btn">&#128260; Coba Lagi</button>`;
  hasilDiv.style.display = 'block';
  hasilDiv.scrollIntoView({ behavior:'smooth', block:'start' });
  document.getElementById('retry-btn').addEventListener('click', () => location.reload());
});
</script>
</body>
</html>
