<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kuis Antropologi Lanjutan — SMA Kelas XI Semester 2</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F0EBE3; --surface: #FDFAF6; --ink: #1A1614;
      --muted: #7A7068; --accent: #8B3A2A; --border: #DDD0C0;
      --correct: #2B5E3E; --wrong: #8B2020; --radius: 12px;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; padding: 0 0 80px; }

    header {
      background: var(--ink); color: #F0EBE3;
      padding: 52px 24px 44px; text-align: center; position: relative; overflow: hidden;
    }
    header::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 70% 50%, rgba(139,58,42,.18) 0%, transparent 65%),
                  radial-gradient(ellipse at 20% 80%, rgba(139,58,42,.1) 0%, transparent 55%);
    }
    header .label {
      position: relative; display: inline-block; font-size: .68rem; font-weight: 600;
      letter-spacing: .22em; text-transform: uppercase; color: #E8A87C;
      background: rgba(232,168,124,.1); border: 1px solid rgba(232,168,124,.3);
      padding: 5px 16px; border-radius: 99px; margin-bottom: 18px;
    }
    header h1 {
      position: relative;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.9rem, 5vw, 3rem); line-height: 1.18;
    }
    header .sub {
      position: relative; margin-top: 10px; color: #A09080; font-size: .9rem;
    }
    header .difficulty {
      position: relative; display: inline-block; margin-top: 14px;
      font-size: .78rem; font-weight: 600; color: #E8A87C;
      background: rgba(232,168,124,.08); border: 1px solid rgba(232,168,124,.25);
      padding: 4px 14px; border-radius: 99px; letter-spacing: .06em;
    }

    #progress-wrap { position: sticky; top: 0; z-index: 10; background: var(--ink); }
    #progress-bar { height: 3px; background: var(--accent); width: 0%; transition: width .35s ease; }
    #progress-count {
      text-align: right; padding: 4px 16px 5px; font-size: .7rem;
      color: #7A7068; background: var(--ink); letter-spacing: .05em;
    }

    .container { max-width: 780px; margin: 0 auto; padding: 40px 20px 0; }

    .question-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px 28px; margin-bottom: 18px;
      transition: box-shadow .2s;
    }
    .question-card:hover { box-shadow: 0 4px 22px rgba(0,0,0,.07); }
    .question-card.unanswered { border-color: #C8962A; box-shadow: 0 0 0 3px rgba(200,150,42,.14); }

    .q-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .q-num { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 700; color: var(--accent); min-width: 30px; }
    .q-tag {
      font-size: .68rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase;
      color: var(--muted); background: var(--bg); border: 1px solid var(--border);
      padding: 3px 10px; border-radius: 99px;
    }
    .q-diff {
      font-size: .65rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      padding: 3px 9px; border-radius: 99px;
    }
    .q-diff.hard { color: #8B3A2A; background: rgba(139,58,42,.08); border: 1px solid rgba(139,58,42,.2); }
    .q-diff.medium { color: #7A5A1A; background: rgba(122,90,26,.08); border: 1px solid rgba(122,90,26,.2); }

    .q-text { font-size: 1rem; line-height: 1.72; font-weight: 500; margin-bottom: 20px; }
    .q-note { font-size: .82rem; color: var(--muted); font-style: italic; margin-bottom: 16px; margin-top: -10px; }

    .options { display: flex; flex-direction: column; gap: 9px; }
    .option-label {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 8px;
      cursor: pointer; transition: border-color .15s, background .15s; user-select: none;
    }
    .option-label:hover { border-color: var(--accent); background: #FBF4EE; }
    .option-label input[type="radio"] { display: none; }
    .opt-letter {
      flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%;
      background: var(--bg); border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: .74rem; font-weight: 700; color: var(--muted);
      transition: all .15s; margin-top: 1px;
    }
    .option-label:has(input:checked) { border-color: var(--accent); background: #FBF4EE; }
    .option-label:has(input:checked) .opt-letter { background: var(--accent); border-color: var(--accent); color: #fff; }
    .opt-text { font-size: .92rem; line-height: 1.55; padding-top: 2px; }

    .option-label.correct { border-color: var(--correct); background: #EAF3EE; }
    .option-label.correct .opt-letter { background: var(--correct); border-color: var(--correct); color: #fff; }
    .option-label.wrong { border-color: var(--wrong); background: #FAF0EE; }
    .option-label.wrong .opt-letter { background: var(--wrong); border-color: var(--wrong); color: #fff; }

    #btn-wrap { text-align: center; margin-top: 40px; }
    #submit-btn {
      font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600;
      background: var(--ink); color: #F0EBE3; border: none;
      padding: 16px 56px; border-radius: 8px; cursor: pointer;
      transition: background .2s, transform .1s; letter-spacing: .04em;
    }
    #submit-btn:hover { background: #2A2420; transform: translateY(-1px); }
    #submit-btn:active { transform: translateY(0); }
    #submit-btn:disabled { opacity: .4; cursor: not-allowed; }

    #warn-msg {
      display: none; margin-top: 12px; font-size: .86rem; color: #8B6200;
      background: #FFF8E6; border: 1px solid #DEB84A; border-radius: 8px;
      padding: 10px 18px; text-align: center;
    }

    #hasil {
      display: none; margin-top: 44px; background: var(--ink); color: #F0EBE3;
      border-radius: var(--radius); padding: 44px 32px; text-align: center;
      animation: fadeUp .5s ease both;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    .score-label { font-size: .72rem; letter-spacing: .2em; text-transform: uppercase; color: #9A8878; margin-bottom: 10px; }
    .score-num { font-family: 'Playfair Display', serif; font-size: clamp(3.5rem,10vw,5.5rem); font-weight: 700; line-height: 1; color: var(--accent); }
    .score-of { font-size: .88rem; color: #9A8878; margin-top: 6px; }
    .predikat { display: inline-block; margin-top: 18px; font-size: 1rem; font-weight: 600; padding: 7px 22px; border-radius: 99px; border: 1.5px solid rgba(255,255,255,.15); }
    .divider { width: 48px; height: 2px; background: rgba(255,255,255,.1); margin: 24px auto; }
    .summary-row { display: flex; justify-content: center; gap: 36px; flex-wrap: wrap; margin-bottom: 30px; }
    .stat .val { font-size: 1.65rem; font-weight: 700; }
    .stat .val.g { color: #7DCFAA; }
    .stat .val.r { color: #E07878; }
    .stat .lbl { font-size: .75rem; color: #9A8878; margin-top: 3px; }
    .kunci-title { font-family: 'Playfair Display', serif; font-size: 1.22rem; margin-bottom: 18px; }
    .kunci-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(270px,1fr)); gap: 10px; text-align: left; }
    .kunci-item { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.09); border-radius: 8px; padding: 12px 14px; font-size: .84rem; line-height: 1.55; }
    .kunci-item.ok { border-color: rgba(125,207,170,.2); }
    .ki-no { color: #E8A87C; font-weight: 700; margin-bottom: 4px; font-size: .8rem; }
    .ki-ans { color: #7DCFAA; font-weight: 600; }
    .ki-your { color: #E07878; font-size: .8rem; margin-top: 3px; }
    .ki-explain { color: #9A8878; font-size: .78rem; margin-top: 4px; font-style: italic; }

    #retry-btn {
      margin-top: 28px; font-family: 'DM Sans', sans-serif; font-size: .92rem; font-weight: 600;
      background: transparent; color: #F0EBE3; border: 1.5px solid rgba(255,255,255,.22);
      padding: 12px 36px; border-radius: 8px; cursor: pointer; transition: all .2s;
    }
    #retry-btn:hover { border-color: rgba(255,255,255,.6); background: rgba(255,255,255,.06); }

    @media (max-width: 500px) { .question-card { padding: 22px 16px; } #hasil { padding: 32px 16px; } }
  </style>
</head>
<body>

<header>
  <div class="label">SMA &middot; Kelas XI &middot; Semester 2</div>
  <h1>Kuis Antropologi</h1>
  <p class="sub">20 soal pilihan ganda &mdash; jawab semua lalu kirim</p>
  <div class="difficulty">&#9888; Tingkat Kesulitan: Menengah-Tinggi</div>
</header>
<div id="progress-wrap">
  <div id="progress-bar"></div>
  <div id="progress-count">0 / 20 dijawab</div>
</div>

<div class="container">
  <div id="quiz-form"></div>
  <div id="btn-wrap">
    <button id="submit-btn">Kirim Jawaban</button>
    <div id="warn-msg">&#9888; Masih ada soal yang belum dijawab. Lengkapi semua jawaban terlebih dahulu.</div>
  </div>
  <div id="hasil"></div>
</div>

<script>
const questions = [
  {
    topic: "Teori Evolusi Budaya",
    diff: "hard",
    q: "Lewis Henry Morgan membagi evolusi kebudayaan manusia menjadi tiga tahap. Pernyataan yang TEPAT mengenai tahap <em>barbarisme</em> menurut Morgan adalah …",
    note: "",
    opts: [
      "Manusia sudah mengenal tulisan dan hukum tertulis",
      "Manusia sudah mengenal pertanian, peternakan, dan pengolahan logam, tetapi belum memiliki aksara",
      "Manusia hidup dengan berburu-meramu dan belum mengenal api",
      "Manusia sudah membangun kota dan negara moden"
    ],
    ans: 1,
    explain: "Tahap barbarisme ditandai dengan pengenalan pertanian dan peternakan, namun belum mengenal tulisan. Tahap savagery = berburu-meramu; civilization = aksara."
  },
  {
    topic: "Fungsionalisme Struktural",
    diff: "hard",
    q: "Talcott Parsons mengembangkan skema AGIL untuk menjelaskan syarat fungsional suatu sistem sosial. Huruf 'I' dalam AGIL merujuk pada fungsi …",
    note: "",
    opts: [
      "Integration — menjaga kohesi dan koordinasi antar subsistem",
      "Identity — memelihara identitas budaya masyarakat",
      "Interaction — mengatur pola interaksi antarindividu",
      "Institutionalization — melembagakan nilai dalam struktur sosial"
    ],
    ans: 0,
    explain: "AGIL: Adaptation (ekonomi), Goal attainment (politik), Integration (hukum/kohesi sosial), Latency/Pattern maintenance (keluarga/budaya)."
  },
  {
    topic: "Strukturalisme Lévi-Strauss",
    diff: "hard",
    q: "Claude Lévi-Strauss menganalisis mitos menggunakan metode biner oposisi (binary opposition). Konsep ini menyatakan bahwa mitos berfungsi untuk …",
    note: "",
    opts: [
      "Merekam peristiwa sejarah secara akurat dalam bentuk cerita",
      "Menyelesaikan secara simbolis kontradiksi dan ketegangan mendasar dalam kehidupan manusia",
      "Menghibur masyarakat dan mengalihkan perhatian dari masalah sosial",
      "Membuktikan keunggulan budaya satu kelompok atas kelompok lain"
    ],
    ans: 1,
    explain: "Bagi Lévi-Strauss, mitos tidak menceritakan sejarah melainkan 'menyelesaikan' secara mental kontradiksi seperti alam vs budaya, hidup vs mati melalui struktur biner."
  },
  {
    topic: "Relativisme Budaya",
    diff: "medium",
    q: "Kritik terbesar terhadap relativisme budaya ekstrem dalam konteks Hak Asasi Manusia adalah …",
    note: "",
    opts: [
      "Relativisme budaya terlalu berpihak pada nilai-nilai Barat",
      "Relativisme budaya dapat digunakan untuk membenarkan praktik pelanggaran HAM dengan dalih 'itu budaya kami'",
      "Relativisme budaya mengabaikan pentingnya agama dalam membentuk norma",
      "Relativisme budaya hanya berlaku untuk masyarakat primitif, bukan modern"
    ],
    ans: 1,
    explain: "Relativisme ekstrem bisa menjadi 'perisai' untuk membenarkan praktik seperti mutilasi, perbudakan, atau diskriminasi atas nama budaya — bertentangan dengan universalitas HAM."
  },
  {
    topic: "Teori Konflik",
    diff: "hard",
    q: "Ralf Dahrendorf mengkritik Parsons dan mengembangkan teori konflik dengan argumen bahwa konflik sosial bersumber pada …",
    note: "",
    opts: [
      "Perbedaan kepemilikan modal ekonomi semata, seperti yang dirumuskan Marx",
      "Perbedaan distribusi otoritas (authority) dalam asosiasi yang terkoordinasi secara imperatif",
      "Perbedaan nilai dan norma yang saling bertentangan antar kelompok",
      "Ketidakseimbangan antara kebutuhan individu dan kemampuan sistem sosial memenuhinya"
    ],
    ans: 1,
    explain: "Dahrendorf bergeser dari Marx: sumber konflik bukan kepemilikan alat produksi, melainkan perbedaan otoritas — mereka yang memerintah vs. yang diperintah dalam setiap organisasi."
  },
  {
    topic: "Difusi & Migrasi",
    diff: "medium",
    q: "Teori difusi Heliocentric (Hyperdiffusionism) yang dikembangkan oleh G. Elliot Smith menyatakan bahwa …",
    note: "",
    opts: [
      "Setiap kebudayaan berkembang secara mandiri dan paralel di berbagai penjuru dunia",
      "Seluruh peradaban dunia berasal dari satu sumber tunggal, yaitu Mesir kuno",
      "Peradaban manusia menyebar dari beberapa pusat independen melalui jalur perdagangan",
      "Kebudayaan berkembang mengikuti siklus alami tanpa pengaruh dari luar"
    ],
    ans: 1,
    explain: "Hyperdiffusionism (Smith & Perry) berpendapat bahwa semua kebudayaan tinggi berasal dari Mesir. Pandangan ini kini ditolak karena bukti arkeologi menunjukkan perkembangan mandiri di banyak wilayah."
  },
  {
    topic: "Antropologi Kognitif",
    diff: "hard",
    q: "Dalam antropologi kognitif, konsep <em>folk taxonomy</em> merujuk pada …",
    note: "",
    opts: [
      "Klasifikasi ilmiah makhluk hidup berdasarkan sistem Linnaeus",
      "Cara masyarakat lokal mengkategorikan dan mengklasifikasikan dunia berdasarkan pengetahuan dan bahasa mereka sendiri",
      "Hierarki kekuasaan dalam masyarakat tradisional berdasarkan garis keturunan",
      "Sistem penghitungan dan pengukuran yang digunakan petani tradisional"
    ],
    ans: 1,
    explain: "Folk taxonomy adalah sistem klasifikasi indigenous — misal cara suku tertentu membagi jenis tanaman, hewan, atau penyakit berdasarkan logika budaya mereka sendiri, bukan taksonomi ilmiah Barat."
  },
  {
    topic: "Perkawinan & Kekerabatan",
    diff: "hard",
    q: "Praktik <em>levirate</em> dalam sistem perkawinan adat merujuk pada kebiasaan …",
    note: "",
    opts: [
      "Perkawinan antara dua saudara kandung yang dilarang secara universal",
      "Kewajiban seorang pria menikahi janda saudaranya yang telah meninggal",
      "Pertukaran calon pasangan antar dua klan yang berlangsung secara timbal balik",
      "Perkawinan seorang wanita dengan lebih dari satu pria sekaligus"
    ],
    ans: 1,
    explain: "Levirate (levir = saudara ipar laki-laki) mengharuskan pria menikahi janda saudaranya. Praktik ini ada di beberapa budaya Afrika, Timur Tengah, dan Asia untuk menjaga harta dan keturunan dalam klan."
  },
  {
    topic: "Simbolisme & Ritual",
    diff: "medium",
    q: "Victor Turner mengembangkan konsep <em>liminality</em> (fase ambang batas) dalam konteks ritus peralihan. Ciri utama fase liminal adalah …",
    note: "",
    opts: [
      "Individu mencapai puncak statusnya dalam masyarakat",
      "Individu berada dalam kondisi 'antara' — sudah melepas status lama namun belum memperoleh status baru, sehingga struktur sosial normal tidak berlaku",
      "Individu mengalami peningkatan kekuasaan spiritual yang permanen",
      "Individu dieksklusi selamanya dari komunitas sebagai hukuman"
    ],
    ans: 1,
    explain: "Turner (dari van Gennep): liminality adalah fase tengah ritus peralihan. Individu bersifat 'ambigu' — tidak di sini, tidak di sana. Sering ditandai penyamaran, isolasi, atau ujian."
  },
  {
    topic: "Etnisitas & Identitas",
    diff: "medium",
    q: "Teori konstruksionis tentang etnisitas berpendapat bahwa identitas etnis bersifat …",
    note: "",
    opts: [
      "Primordial — diturunkan secara biologis dan bersifat tetap sejak lahir",
      "Mutlak — ditentukan oleh nenek moyang dan tidak dapat berubah",
      "Situasional dan cair — dikonstruksi secara sosial, dapat berubah sesuai konteks dan kepentingan",
      "Spiritual — dibentuk oleh kepercayaan agama yang dipeluk seseorang"
    ],
    ans: 2,
    explain: "Konstruksionisme (Barth, Anderson) melihat etnisitas sebagai batas sosial yang dikonstruksi dan dinegosiasi, bukan warisan biologis yang kaku. Seseorang dapat menekankan atau menyembunyikan identitas etnis sesuai situasi."
  },
  {
    topic: "Kapitalisme & Budaya",
    diff: "hard",
    q: "Istilah <em>komodifikasi budaya</em> (commodification of culture) merujuk pada proses …",
    note: "",
    opts: [
      "Pemerintah mengatur distribusi produk-produk budaya lokal",
      "Transformasi unsur budaya (ritual, seni, tradisi) menjadi produk yang dapat diperjualbelikan demi keuntungan ekonomi",
      "Masyarakat menolak budaya asing karena dianggap tidak layak dijual",
      "Pertukaran budaya yang dilakukan secara adil antar negara berkembang"
    ],
    ans: 1,
    explain: "Komodifikasi mengubah nilai guna (use value) budaya menjadi nilai tukar (exchange value). Contoh: tari Kecak yang semula ritual suci kini dijual sebagai pertunjukan wisata berbayar."
  },
  {
    topic: "Post-Kolonialisme",
    diff: "hard",
    q: "Edward Said dalam karya <em>Orientalism</em> (1978) berargumen bahwa 'Orientalisme' adalah …",
    note: "",
    opts: [
      "Studi ilmiah yang objektif tentang peradaban Asia dan Timur Tengah oleh sarjana Barat",
      "Gerakan seni yang terinspirasi keindahan budaya Timur di Eropa abad ke-19",
      "Wacana kekuasaan yang diciptakan Barat untuk mengkonstruksi 'Timur' sebagai inferior, eksotis, dan perlu dijajah",
      "Kebangkitan identitas budaya negara-negara Asia melawan kolonialisme Barat"
    ],
    ans: 2,
    explain: "Said menunjukkan bahwa representasi 'Timur' oleh Barat bukan ilmu netral, melainkan alat legitimasi kolonialisme — Timur digambarkan irasional, terbelakang, dan pasif agar Barat tampak rasional dan layak menjajah."
  },
  {
    topic: "Antropologi Gender",
    diff: "medium",
    q: "Margaret Mead dalam penelitiannya di Papua Nugini (<em>Sex and Temperament</em>, 1935) menyimpulkan bahwa …",
    note: "",
    opts: [
      "Perbedaan karakter maskulin dan feminin bersifat universal dan biologis",
      "Laki-laki secara alami lebih agresif daripada perempuan di semua kebudayaan",
      "Sifat-sifat yang dianggap 'maskulin' atau 'feminin' sangat bervariasi antar budaya, menunjukkan bahwa gender lebih bersifat budaya daripada biologi",
      "Perempuan di semua masyarakat tradisional selalu menempati posisi subordinat"
    ],
    ans: 2,
    explain: "Mead menemukan bahwa tiga suku di Papua memiliki pembagian sifat gender yang sangat berbeda — bahkan terbalik dari Barat. Ini menjadi argumen kuat bahwa gender adalah konstruksi budaya, bukan kodrat."
  },
  {
    topic: "Antropologi Ekonomi",
    diff: "hard",
    q: "Dalam ekonomi gift (gift economy), Marcel Mauss melalui konsep <em>potlatch</em> dan <em>kula</em> menunjukkan bahwa pertukaran hadiah dalam masyarakat tradisional sesungguhnya berfungsi untuk …",
    note: "",
    opts: [
      "Memaksimalkan akumulasi kekayaan material individu",
      "Menciptakan dan memperbarui hubungan sosial, prestise, serta kewajiban timbal balik antar kelompok",
      "Mendistribusikan sumber daya secara merata tanpa motivasi sosial apa pun",
      "Menghindari konflik dengan cara menyuap pihak yang lebih kuat"
    ],
    ans: 1,
    explain: "Mauss (Essay on the Gift, 1925): hadiah bukan gratis. Ada tiga kewajiban — memberi, menerima, membalas. Pertukaran ritual seperti kula (Trobriand) menciptakan jaringan aliansi dan hierarki sosial."
  },
  {
    topic: "Birokrasi & Budaya",
    diff: "medium",
    q: "Konsep 'budaya birokrasi' Max Weber yang disebut <em>rationalization</em> berimplikasi pada kebudayaan modern berupa …",
    note: "",
    opts: [
      "Menguatnya nilai-nilai tradisional dan religius dalam pemerintahan",
      "Berkembangnya seni dan ekspresi bebas dalam kehidupan publik",
      "Dominasi efisiensi, kalkulasi, dan aturan formal yang menggantikan nilai-nilai tradisional dan emosional — Weber menyebutnya 'disenchantment of the world'",
      "Meningkatnya partisipasi rakyat dalam pengambilan keputusan politik"
    ],
    ans: 2,
    explain: "Weber melihat modernitas sebagai proses rasionalisasi — dunia kehilangan 'pesona magis' (Entzauberung) karena semua diukur secara instrumental dan birokratis."
  },
  {
    topic: "Perubahan Budaya",
    diff: "medium",
    q: "Konsep <em>culture lag</em> yang dicetuskan William Ogburn menjelaskan situasi di mana …",
    note: "",
    opts: [
      "Kebudayaan suatu bangsa berkembang lebih cepat daripada bangsa lain",
      "Aspek material kebudayaan (teknologi) berkembang lebih cepat daripada aspek non-material (norma, nilai, institusi) sehingga terjadi ketertinggalan adaptasi",
      "Generasi tua tidak mampu mengikuti perubahan yang dilakukan generasi muda",
      "Kebudayaan daerah tertinggal dibandingkan kebudayaan ibu kota"
    ],
    ans: 1,
    explain: "Culture lag (Ogburn, 1922): teknologi (HP, internet) berubah cepat, tetapi hukum, moral, dan lembaga sosial lambat menyesuaikan — menciptakan ketegangan dan masalah sosial."
  },
  {
    topic: "Semiotika Budaya",
    diff: "hard",
    q: "Roland Barthes membedakan dua tingkat makna (signification) dalam semiotika budaya: denotasi dan konotasi. Dalam analisis iklan, 'konotasi' merujuk pada …",
    note: "",
    opts: [
      "Makna harfiah dan langsung dari gambar atau teks yang ditampilkan",
      "Makna ideologis, kultural, dan emosional yang tersembunyi di balik tanda, yang mencerminkan nilai-nilai dominan masyarakat",
      "Teknik fotografi dan komposisi warna yang digunakan dalam iklan",
      "Identitas merek yang didaftarkan secara hukum oleh perusahaan"
    ],
    ans: 1,
    explain: "Denotasi = makna literal (foto bunga = bunga). Konotasi = makna lapis kedua — nilai, mitos, ideologi (bunga dalam iklan parfum = feminitas, romansa). Barthes menyebut konotasi yang dinaturalisasi sebagai 'mitos'."
  },
  {
    topic: "Globalisasi & Hibriditas",
    diff: "medium",
    q: "Homi K. Bhabha mengembangkan konsep <em>hibriditas budaya</em> dalam teori post-kolonial. Hibriditas merujuk pada …",
    note: "",
    opts: [
      "Pencampuran ras secara biologis antara penjajah dan yang dijajah",
      "Penolakan total terhadap budaya penjajah oleh masyarakat terjajah",
      "Ruang 'ketiga' (third space) di mana budaya kolonial dan lokal bertemu, bernegosiasi, dan menghasilkan identitas baru yang tidak murni salah satunya",
      "Dominasi budaya Barat yang menghancurkan budaya lokal sepenuhnya"
    ],
    ans: 2,
    explain: "Hibriditas (Bhabha) bukan sekadar campuran — ia membongkar kemurnian ('purity') budaya penjajah maupun terjajah. Third space adalah zona ambigus tempat identitas baru terus dinegosiasi."
  },
  {
    topic: "Kearifan Ekologis",
    diff: "medium",
    q: "Konsep <em>Tri Hita Karana</em> dalam budaya Bali merupakan contoh kearifan lokal yang mengatur hubungan harmonis antara …",
    note: "",
    opts: [
      "Raja, rakyat, dan pedagang dalam sistem ekonomi tradisional",
      "Manusia dengan Tuhan (Parahyangan), manusia dengan sesama (Pawongan), dan manusia dengan alam (Palemahan)",
      "Leluhur, generasi kini, dan generasi mendatang dalam sistem waris adat",
      "Desa, kecamatan, dan provinsi dalam tata kelola pemerintahan adat"
    ],
    ans: 1,
    explain: "Tri Hita Karana = tiga penyebab kesejahteraan. Konsep ini menjadi landasan subak (sistem irigasi) Bali yang diakui UNESCO sebagai Warisan Budaya Dunia (2012)."
  },
  {
    topic: "Metodologi Penelitian",
    diff: "hard",
    q: "Dalam penelitian etnografi, <em>thick description</em> (deskripsi mendalam) yang diperkenalkan Clifford Geertz berbeda dari deskripsi biasa karena …",
    note: "",
    opts: [
      "Menggunakan data statistik yang sangat rinci dan terperinci",
      "Mendeskripsikan perilaku sekaligus menginterpretasikan makna, konteks, dan lapisan-lapisan signifikansi yang menyertai perilaku tersebut",
      "Menggunakan bahasa yang sangat teknis dan ilmiah agar terhindar dari bias peneliti",
      "Berfokus pada pengamatan jangka pendek yang sangat intensif dalam laboratorium"
    ],
    ans: 1,
    explain: "Geertz (Interpretation of Cultures, 1973): bukan sekadar mencatat apa yang terjadi (thin description), tetapi menafsirkan MENGAPA dan APA MAKNANYA dalam konteks budaya setempat — menggunakan contoh 'kedipan mata' yang terkenal."
  }
];

const letters = ['A','B','C','D'];
const form = document.getElementById('quiz-form');
const bar  = document.getElementById('progress-bar');
const countEl = document.getElementById('progress-count');
const warn = document.getElementById('warn-msg');
const hasilDiv = document.getElementById('hasil');
const submitBtn = document.getElementById('submit-btn');

questions.forEach((item, i) => {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = 'card-' + i;
  const optsHTML = item.opts.map((opt, j) => `
    <label class="option-label" id="lbl-${i}-${j}">
      <input type="radio" name="q${i}" value="${j}" />
      <span class="opt-letter">${letters[j]}</span>
      <span class="opt-text">${opt}</span>
    </label>`).join('');
  const diffLabel = item.diff === 'hard'
    ? '<span class="q-diff hard">Sulit</span>'
    : '<span class="q-diff medium">Sedang</span>';
  card.innerHTML = `
    <div class="q-meta">
      <span class="q-num">${String(i+1).padStart(2,'0')}.</span>
      <span class="q-tag">${item.topic}</span>
      ${diffLabel}
    </div>
    <p class="q-text">${item.q}</p>
    ${item.note ? '<p class="q-note">'+item.note+'</p>' : ''}
    <div class="options">${optsHTML}</div>`;
  form.appendChild(card);
});

function updateProgress() {
  let n = 0;
  questions.forEach((_,i) => { if (document.querySelector('input[name="q'+i+'"]:checked')) n++; });
  bar.style.width = (n / questions.length * 100) + '%';
  countEl.textContent = n + ' / ' + questions.length + ' dijawab';
}
form.addEventListener('change', updateProgress);

submitBtn.addEventListener('click', () => {
  const unanswered = [];
  questions.forEach((_,i) => {
    const card = document.getElementById('card-'+i);
    if (!document.querySelector('input[name="q'+i+'"]:checked')) {
      unanswered.push(i); card.classList.add('unanswered');
    } else { card.classList.remove('unanswered'); }
  });

  if (unanswered.length > 0) {
    warn.style.display = 'block';
    document.getElementById('card-'+unanswered[0]).scrollIntoView({ behavior:'smooth', block:'center' });
    return;
  }
  warn.style.display = 'none';
  submitBtn.disabled = true;
  form.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = true);

  let correct = 0;
  const details = [];
  questions.forEach((item, i) => {
    const sel = parseInt(document.querySelector('input[name="q'+i+'"]:checked').value);
    const ok = sel === item.ans;
    if (ok) correct++;
    for (let j = 0; j < item.opts.length; j++) {
      const lbl = document.getElementById('lbl-'+i+'-'+j);
      if (j === item.ans) lbl.classList.add('correct');
      else if (j === sel && !ok) lbl.classList.add('wrong');
    }
    details.push({ q:i+1, topic:item.topic, ans:item.ans, sel, ok,
      ansText:item.opts[item.ans], selText:item.opts[sel], explain:item.explain });
  });

  const score = Math.round(correct / questions.length * 100);
  let pred, col;
  if (score >= 90)      { pred = '&#127942; Luar Biasa';          col = '#E8A87C'; }
  else if (score >= 75) { pred = '&#9733; Sangat Baik';           col = '#A8D08D'; }
  else if (score >= 60) { pred = '&#128218; Baik';                col = '#F0C040'; }
  else if (score >= 40) { pred = '&#128214; Cukup — Terus Belajar'; col = '#E09050'; }
  else                  { pred = '&#128172; Jangan Menyerah!';    col = '#E07878'; }

  const kunciHTML = details.map(d => `
    <div class="kunci-item ${d.ok?'ok':''}">
      <div class="ki-no">Soal ${d.q} &mdash; ${d.topic}</div>
      <div class="ki-ans">&#10003; Benar: ${letters[d.ans]}. ${d.ansText}</div>
      ${!d.ok ? '<div class="ki-your">&#10007; Jawaban kamu: '+letters[d.sel]+'. '+d.selText+'</div>' : ''}
      <div class="ki-explain">${d.explain}</div>
    </div>`).join('');

  hasilDiv.innerHTML = `
    <div class="score-label">Nilai Kamu</div>
    <div class="score-num">${score}</div>
    <div class="score-of">${correct} dari ${questions.length} soal benar</div>
    <div class="predikat" style="border-color:${col}44;color:${col}">${pred}</div>
    <div class="divider"></div>
    <div class="summary-row">
      <div class="stat"><div class="val g">${correct}</div><div class="lbl">Benar</div></div>
      <div class="stat"><div class="val r">${questions.length-correct}</div><div class="lbl">Salah</div></div>
      <div class="stat"><div class="val">${questions.length}</div><div class="lbl">Total</div></div>
    </div>
    <div class="kunci-title">Kunci Jawaban &amp; Penjelasan</div>
    <div class="kunci-grid">${kunciHTML}</div>
    <button id="retry-btn">&#128260; Coba Lagi</button>`;
  hasilDiv.style.display = 'block';
  hasilDiv.scrollIntoView({ behavior:'smooth', block:'start' });
  document.getElementById('retry-btn').addEventListener('click', () => location.reload());
});
</script>
</body>
</html>
