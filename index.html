<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kuis PAT Bahasa Indonesia — Kelas XI Sem. II</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F0EBE3; --surface: #FDFAF6; --ink: #1A1614;
      --muted: #7A7068; --accent: #C0392B; --border: #DDD0C0;
      --correct: #2B5E3E; --wrong: #8B2020; --radius: 12px;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; padding: 0 0 80px; }

    header {
      background: var(--ink); color: #F0EBE3;
      padding: 52px 24px 44px; text-align: center; position: relative; overflow: hidden;
    }
    header::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 30% 50%, rgba(192,57,43,.2) 0%, transparent 65%),
                  radial-gradient(ellipse at 80% 80%, rgba(192,57,43,.12) 0%, transparent 55%);
    }
    header .label {
      position: relative; display: inline-block; font-size: .68rem; font-weight: 600;
      letter-spacing: .22em; text-transform: uppercase; color: #E8A87C;
      background: rgba(232,168,124,.1); border: 1px solid rgba(232,168,124,.3);
      padding: 5px 16px; border-radius: 99px; margin-bottom: 18px;
    }
    header h1 {
      position: relative; font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.9rem, 5vw, 3rem); line-height: 1.18;
    }
    header .hanzi-deco {
      position: absolute; right: 5%; top: 50%; transform: translateY(-50%);
      font-size: 6rem; opacity: .06; user-select: none; line-height: 1;
    }
    header .sub { position: relative; margin-top: 10px; color: #A09080; font-size: .9rem; }
    header .difficulty {
      position: relative; display: inline-block; margin-top: 14px;
      font-size: .78rem; font-weight: 600; color: #E8A87C;
      background: rgba(232,168,124,.08); border: 1px solid rgba(232,168,124,.25);
      padding: 4px 14px; border-radius: 99px; letter-spacing: .06em;
    }

    #progress-wrap { position: sticky; top: 0; z-index: 10; background: var(--ink); }
    #progress-bar { height: 3px; background: var(--accent); width: 0%; transition: width .35s ease; }
    #progress-count {
      text-align: right; padding: 4px 16px 5px; font-size: .7rem;
      color: #7A7068; background: var(--ink); letter-spacing: .05em;
    }

    .container { max-width: 780px; margin: 0 auto; padding: 40px 20px 0; }

    .question-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px 28px; margin-bottom: 18px;
      transition: box-shadow .2s;
    }
    .question-card:hover { box-shadow: 0 4px 22px rgba(0,0,0,.07); }
    .question-card.unanswered { border-color: #C8962A; box-shadow: 0 0 0 3px rgba(200,150,42,.14); }

    .q-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .q-num { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 700; color: var(--accent); min-width: 30px; }
    .q-tag {
      font-size: .68rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase;
      color: var(--muted); background: var(--bg); border: 1px solid var(--border);
      padding: 3px 10px; border-radius: 99px;
    }
    .q-diff {
      font-size: .65rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      padding: 3px 9px; border-radius: 99px;
    }
    .q-diff.hard   { color: #8B3A2A; background: rgba(139,58,42,.08); border: 1px solid rgba(139,58,42,.2); }
    .q-diff.medium { color: #7A5A1A; background: rgba(122,90,26,.08); border: 1px solid rgba(122,90,26,.2); }
    .q-diff.easy   { color: #2B5E3E; background: rgba(43,94,62,.08);  border: 1px solid rgba(43,94,62,.2); }

    .q-text { font-size: 1rem; line-height: 1.72; font-weight: 500; margin-bottom: 20px; }
    .q-text .kutipan {
      display: block; background: #F5EFE6; border-left: 3px solid var(--accent);
      padding: 14px 18px; margin: 12px 0; border-radius: 0 8px 8px 0;
      font-style: italic; font-size: .92rem; line-height: 1.7; color: #3A2E2A;
      white-space: pre-line;
    }

    .options { display: flex; flex-direction: column; gap: 9px; }
    .option-label {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 8px;
      cursor: pointer; transition: border-color .15s, background .15s; user-select: none;
    }
    .option-label:hover { border-color: var(--accent); background: #FBF4EE; }
    .option-label input[type="radio"] { display: none; }
    .opt-letter {
      flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%;
      background: var(--bg); border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: .74rem; font-weight: 700; color: var(--muted);
      transition: all .15s; margin-top: 1px;
    }
    .option-label:has(input:checked) { border-color: var(--accent); background: #FBF4EE; }
    .option-label:has(input:checked) .opt-letter { background: var(--accent); border-color: var(--accent); color: #fff; }
    .opt-text { font-size: .92rem; line-height: 1.55; padding-top: 2px; }
    .option-label.correct { border-color: var(--correct); background: #EAF3EE; }
    .option-label.correct .opt-letter { background: var(--correct); border-color: var(--correct); color: #fff; }
    .option-label.wrong { border-color: var(--wrong); background: #FAF0EE; }
    .option-label.wrong .opt-letter { background: var(--wrong); border-color: var(--wrong); color: #fff; }

    #btn-wrap { text-align: center; margin-top: 40px; }
    #submit-btn {
      font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600;
      background: var(--ink); color: #F0EBE3; border: none;
      padding: 16px 56px; border-radius: 8px; cursor: pointer;
      transition: background .2s, transform .1s; letter-spacing: .04em;
    }
    #submit-btn:hover { background: #2A2420; transform: translateY(-1px); }
    #submit-btn:active { transform: translateY(0); }
    #submit-btn:disabled { opacity: .4; cursor: not-allowed; }

    #warn-msg {
      display: none; margin-top: 12px; font-size: .86rem; color: #8B6200;
      background: #FFF8E6; border: 1px solid #DEB84A; border-radius: 8px;
      padding: 10px 18px; text-align: center;
    }

    #hasil {
      display: none; margin-top: 44px; background: var(--ink); color: #F0EBE3;
      border-radius: var(--radius); padding: 44px 32px; text-align: center;
      animation: fadeUp .5s ease both;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    .score-label { font-size: .72rem; letter-spacing: .2em; text-transform: uppercase; color: #9A8878; margin-bottom: 10px; }
    .score-num { font-family: 'Playfair Display', serif; font-size: clamp(3.5rem,10vw,5.5rem); font-weight: 700; line-height: 1; color: var(--accent); }
    .score-of { font-size: .88rem; color: #9A8878; margin-top: 6px; }
    .predikat { display: inline-block; margin-top: 18px; font-size: 1rem; font-weight: 600; padding: 7px 22px; border-radius: 99px; border: 1.5px solid rgba(255,255,255,.15); }
    .divider { width: 48px; height: 2px; background: rgba(255,255,255,.1); margin: 24px auto; }
    .summary-row { display: flex; justify-content: center; gap: 36px; flex-wrap: wrap; margin-bottom: 30px; }
    .stat .val { font-size: 1.65rem; font-weight: 700; }
    .stat .val.g { color: #7DCFAA; }
    .stat .val.r { color: #E07878; }
    .stat .lbl { font-size: .75rem; color: #9A8878; margin-top: 3px; }
    .kunci-title { font-family: 'Playfair Display', serif; font-size: 1.22rem; margin-bottom: 18px; }
    .kunci-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(270px,1fr)); gap: 10px; text-align: left; }
    .kunci-item { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.09); border-radius: 8px; padding: 12px 14px; font-size: .84rem; line-height: 1.55; }
    .kunci-item.ok { border-color: rgba(125,207,170,.2); }
    .ki-no { color: #E8A87C; font-weight: 700; margin-bottom: 4px; font-size: .8rem; }
    .ki-ans { color: #7DCFAA; font-weight: 600; }
    .ki-your { color: #E07878; font-size: .8rem; margin-top: 3px; }
    .ki-explain { color: #9A8878; font-size: .78rem; margin-top: 4px; font-style: italic; }
    #retry-btn {
      margin-top: 28px; font-family: 'DM Sans', sans-serif; font-size: .92rem; font-weight: 600;
      background: transparent; color: #F0EBE3; border: 1.5px solid rgba(255,255,255,.22);
      padding: 12px 36px; border-radius: 8px; cursor: pointer; transition: all .2s;
    }
    #retry-btn:hover { border-color: rgba(255,255,255,.6); background: rgba(255,255,255,.06); }
    @media (max-width: 500px) { .question-card { padding: 22px 16px; } #hasil { padding: 32px 16px; } }
  </style>
</head>
<body>

<header>
  <div class="hanzi-deco">BI</div>
  <div class="label">SMA &middot; Kelas XI &middot; Bahasa Indonesia</div>
  <h1>Kuis PAT Bahasa Indonesia</h1>
  <p class="sub">Sesorah · Novel · Artikel · Budaya Jawa &mdash; 50 soal pilihan ganda</p>
  <div class="difficulty">&#9888; Tingkat Kesulitan: Normal</div>
</header>

<div id="progress-wrap">
  <div id="progress-bar"></div>
  <div id="progress-count">0 / 50 dijawab</div>
</div>

<div class="container">
  <div id="quiz-form"></div>
  <div id="btn-wrap">
    <button id="submit-btn">Kirim Jawaban</button>
    <div id="warn-msg">&#9888; Masih ada soal yang belum dijawab. Lengkapi semua jawaban terlebih dahulu.</div>
  </div>
  <div id="hasil"></div>
</div>

<script>
const questions = [

  // ===== SESORAH / PIDATO (1–12) =====
  {
    topic: "Sesorah", diff: "easy",
    q: 'Sesorah dalam bahasa Jawa memiliki arti yang sama dengan …',
    opts: ["Tulisan ilmiah", "Pidato atau berbicara di depan umum", "Membaca puisi", "Menulis surat resmi"],
    ans: 1,
    explain: "Sesorah adalah istilah dalam bahasa Jawa yang berarti pidato atau kegiatan berbicara di hadapan khalayak (umum) untuk menyampaikan gagasan, informasi, atau pesan tertentu."
  },
  {
    topic: "Sesorah", diff: "medium",
    q: 'Bacalah kutipan sesorah berikut!\n<span class="kutipan">"Hadirin ingkang kula urmati, mangga kita sareng-sareng ngaturaken puji syukur dhumateng Gusti Allah ingkang Maha Kuwaos …"</span>\nKata "urmati" dalam sesorah tersebut berarti …',
    opts: ["Diundang", "Dihormati", "Dikenal", "Disayangi"],
    ans: 1,
    explain: "'Urmati' berasal dari kata 'hormat' dalam bahasa Jawa halus (krama). 'Ingkang kula urmati' berarti 'yang saya hormati'. Kata ini digunakan sebagai sapaan pembuka sesorah kepada hadirin yang hadir."
  },
  {
    topic: "Sesorah", diff: "medium",
    q: 'Sikap yang paling tepat ketika seseorang sedang berpidato di depan umum adalah …',
    opts: [
      "Menundukkan kepala agar terlihat sopan dan tidak mengganggu hadirin",
      "Berdiri tegak, pandangan menyapu seluruh hadirin, suara jelas, dan ekspresi wajah sesuai isi pidato",
      "Membaca teks pidato tanpa berhenti agar tidak lupa",
      "Berbicara sangat cepat agar pidato cepat selesai"
    ],
    ans: 1,
    explain: "Sikap berpidato yang baik meliputi: postur tegak (menunjukkan kepercayaan diri), kontak mata dengan hadirin (membangun keterhubungan), suara yang jelas dan teratur, serta ekspresi wajah yang sesuai isi — semuanya mendukung komunikasi yang efektif dan meyakinkan."
  },
  {
    topic: "Sesorah", diff: "medium",
    q: 'Metode pidato yang dilakukan dengan cara menghafalkan teks pidato seluruhnya disebut metode …',
    opts: ["Impromptu", "Ekstemporan", "Memoriter", "Naskah (manuskrip)"],
    ans: 2,
    explain: "Metode memoriter adalah metode berpidato dengan cara menghafal seluruh isi teks pidato. Kelebihan: tidak perlu membawa teks. Kekurangan: jika lupa satu bagian, bisa kacau. Berbeda dengan impromptu (tanpa persiapan), ekstemporan (pakai catatan kecil/outline), dan manuskrip (membaca teks langsung)."
  },
  {
    topic: "Sesorah", diff: "medium",
    q: 'Bacalah kutipan sesorah berikut!\n<span class="kutipan">"Kula ngaturaken agunging panuwun dhumateng Bapak/Ibu guru ingkang sampun maringi wekdal kangge sesorah menika. Mugi-mugi sesorah kula saged migunani tumrap kita sedaya."</span>\nBagian sesorah yang ditunjukkan kutipan tersebut adalah …',
    opts: ["Pembuka (purwaka)", "Isi (surasa)", "Penutup (wasana)", "Salam pembuka"],
    ans: 2,
    explain: "Kutipan tersebut berisi ucapan terima kasih dan harapan agar pidato bermanfaat — ini merupakan ciri bagian penutup (wasana) sesorah. Struktur sesorah: (1) salam pembuka, (2) purwaka (pembuka: ucapan syukur, salam), (3) surasa (isi pokok), (4) wasana (penutup: kesimpulan, terima kasih, permohonan maaf, harapan)."
  },
  {
    topic: "Sesorah", diff: "easy",
    q: 'Perhatikan bagian-bagian sesorah berikut!\n<span class="kutipan">(1) Surasa / isi pokok\n(2) Salam pambuka\n(3) Wasana / panutup\n(4) Purwaka / pambuka</span>\nUrutan bagian sesorah yang benar adalah …',
    opts: ["(1)-(2)-(3)-(4)", "(2)-(4)-(1)-(3)", "(4)-(2)-(1)-(3)", "(2)-(1)-(4)-(3)"],
    ans: 1,
    explain: "Urutan struktur sesorah yang benar: (2) Salam pambuka → (4) Purwaka (pembukaan: syukur, sapaan hormat) → (1) Surasa (isi pokok pidato) → (3) Wasana (penutup: kesimpulan, terima kasih, permohonan maaf). Ini adalah struktur baku sesorah dalam tradisi Jawa."
  },
  {
    topic: "Sesorah", diff: "medium",
    q: 'Bacalah kutipan sesorah berikut!\n<span class="kutipan">"Wonten ing kesempatan menika, kula badhe ngandharaken bab pentingipun njagi kebersihan lingkungan sekolah. Sekolah ingkang resik badhe ndadosaken kahanan sinau ingkang nyaman …"</span>\nPernyataan yang TIDAK SESUAI dengan isi kutipan sesorah tersebut adalah …',
    opts: [
      "Sesorah membahas tentang pentingnya kebersihan lingkungan sekolah",
      "Pembicara menyebutkan bahwa sekolah yang bersih menciptakan suasana belajar yang nyaman",
      "Pembicara mengajak hadirin untuk mengunjungi sekolah lain yang lebih bersih",
      "Isi pokok sesorah adalah topik kebersihan lingkungan"
    ],
    ans: 2,
    explain: "Kutipan hanya membahas pentingnya menjaga kebersihan lingkungan sekolah dan dampak positifnya terhadap kenyamanan belajar. Tidak ada pernyataan mengajak hadirin mengunjungi sekolah lain — pernyataan C tidak sesuai dengan isi kutipan."
  },
  {
    topic: "Sesorah", diff: "medium",
    q: 'Bagian surasa (isi) dalam sesorah berfungsi untuk …',
    opts: [
      "Menyampaikan salam dan ucapan syukur kepada Tuhan",
      "Menyampaikan pokok pikiran, gagasan utama, atau informasi inti yang ingin disampaikan pembicara",
      "Menyampaikan terima kasih dan permohonan maaf kepada hadirin",
      "Memperkenalkan diri dan latar belakang pembicara kepada hadirin"
    ],
    ans: 1,
    explain: "Surasa adalah bagian inti sesorah yang memuat pokok pikiran, gagasan, ajakan, informasi, atau argumentasi utama yang ingin disampaikan. Ini adalah bagian terpanjang dan terpenting dalam sesorah karena di sinilah tujuan komunikasi sesorah dicapai."
  },
  {
    topic: "Sesorah", diff: "easy",
    q: 'Cara berpidato yang paling tepat agar pesan tersampaikan dengan baik kepada hadirin adalah …',
    opts: [
      "Berbicara dengan suara sangat pelan agar terkesan lembut dan sopan",
      "Menggunakan bahasa yang sesuai dengan situasi, suara jelas, artikulasi tepat, dan intonasi bervariasi",
      "Membaca teks pidato dengan kepala menunduk tanpa memperhatikan hadirin",
      "Menggunakan bahasa asing sebanyak mungkin agar terkesan pintar"
    ],
    ans: 1,
    explain: "Cara berpidato yang efektif: bahasa disesuaikan dengan situasi dan hadirin, suara jelas dan keras secukupnya, artikulasi (pengucapan) tepat, serta intonasi bervariasi agar tidak monoton. Semua ini memastikan pesan tersampaikan dan hadirin tetap tertarik mengikuti."
  },
  {
    topic: "Sesorah", diff: "medium",
    q: 'Metode pidato yang paling tepat digunakan dalam situasi mendadak tanpa persiapan sebelumnya adalah metode …',
    opts: ["Memoriter", "Manuskrip", "Impromptu", "Ekstemporan"],
    ans: 2,
    explain: "Metode impromptu adalah pidato yang dilakukan secara spontan tanpa persiapan sebelumnya. Biasanya digunakan saat seseorang ditunjuk tiba-tiba untuk berbicara. Kelebihannya: terasa alami dan spontan. Kekurangannya: isi bisa kurang terstruktur jika pembicara kurang pengalaman."
  },
  {
    topic: "Sesorah", diff: "medium",
    q: 'Perhatikan teks berikut!\n<span class="kutipan">"Assalamualaikum Wr. Wb.\nYth. Bapak Kepala Sekolah\nYth. Bapak/Ibu Guru\nSerta rekan-rekan yang saya cintai\n\nPertama-tama marilah kita panjatkan puji syukur kehadirat Allah SWT …"</span>\nBagian sesorah yang ditunjukkan teks tersebut adalah …',
    opts: ["Surasa (isi pokok)", "Wasana (penutup)", "Salam pambuka dan purwaka (pembuka)", "Kesimpulan"],
    ans: 2,
    explain: "Teks tersebut menampilkan dua bagian awal sesorah: (1) salam pembuka ('Assalamualaikum') dan (2) purwaka/pambuka yang berisi sapaan hormat kepada hadirin (Yth. Bapak Kepala Sekolah, dll.) serta ucapan syukur kepada Tuhan. Keduanya merupakan bagian awal sebelum isi disampaikan."
  },
  {
    topic: "Sesorah", diff: "medium",
    q: 'Penulisan bagian penutup sesorah yang BENAR adalah …',
    opts: [
      "\"Maka dari itu saya akan menyampaikan isi pidato ini kepada hadirin …\"",
      "\"Demikianlah pidato yang dapat saya sampaikan. Mohon maaf apabila ada kata-kata yang kurang berkenan. Terima kasih atas perhatian hadirin sekalian.\"",
      "\"Pertama-tama marilah kita bersyukur kepada Tuhan Yang Maha Esa …\"",
      "\"Yang terhormat Bapak/Ibu guru dan rekan-rekan yang saya sayangi …\""
    ],
    ans: 1,
    explain: "Bagian penutup sesorah yang benar mengandung: (1) kesimpulan atau penegasan akhir ('demikianlah'), (2) permohonan maaf atas kekurangan, dan (3) ucapan terima kasih. Opsi A adalah kalimat transisi isi, opsi C adalah pembuka (ucapan syukur), opsi D adalah sapaan hormat di pembuka."
  },

  // ===== NOVEL (13–24) =====
  {
    topic: "Novel", diff: "easy",
    q: 'Pengertian novel yang paling tepat adalah …',
    opts: [
      "Karya sastra berbentuk puisi yang menceritakan kisah kehidupan manusia",
      "Karya sastra prosa panjang yang menampilkan tokoh-tokoh dan serangkaian peristiwa secara terstruktur dengan alur yang kompleks",
      "Karya tulis ilmiah yang memuat penelitian tentang kehidupan sosial masyarakat",
      "Karya sastra pendek yang dapat dibaca dalam sekali duduk"
    ],
    ans: 1,
    explain: "Novel adalah karya sastra berbentuk prosa (fiksi) yang panjang, menampilkan tokoh-tokoh dengan karakter yang berkembang, alur yang kompleks, berbagai latar, dan tema yang luas. Berbeda dengan cerpen yang pendek, novel memiliki ruang untuk mengembangkan cerita secara lebih mendalam."
  },
  {
    topic: "Novel", diff: "medium",
    q: 'Bacalah kutipan novel berikut!\n<span class="kutipan">"Lintang mengayuh sepedanya setiap hari menempuh jarak 40 km untuk sampai ke sekolah. Hujan, panas, bahkan ancaman buaya di jalan setapak tidak pernah membuatnya menyerah. Baginya, pendidikan adalah satu-satunya jalan keluar."</span>\nUnsur intrinsik yang paling menonjol dalam kutipan tersebut adalah …',
    opts: ["Latar tempat", "Alur mundur", "Penokohan/karakter tokoh Lintang", "Sudut pandang orang ketiga"],
    ans: 2,
    explain: "Unsur yang paling menonjol adalah penokohan: kutipan secara langsung membangun karakter Lintang sebagai sosok yang gigih, pantang menyerah, dan menjadikan pendidikan sebagai prioritas utama meski menghadapi berbagai rintangan. Inilah teknik 'show' dalam penokohan — karakter dibangun melalui tindakan."
  },
  {
    topic: "Novel", diff: "medium",
    q: 'Novel yang berisi kisah percintaan antara dua tokoh utama dengan berbagai konflik dan rintangan yang harus dihadapi termasuk jenis novel …',
    opts: ["Novel sosial", "Novel sejarah", "Novel roman/percintaan", "Novel detektif"],
    ans: 2,
    explain: "Novel roman atau novel percintaan berfokus pada hubungan asmara antara dua tokoh utama, dengan konflik berupa rintangan-rintangan yang menghalangi hubungan mereka. Contoh: Siti Nurbaya, Tenggelamnya Kapal Van der Wijck. Berbeda dari novel sosial (konflik sosial-masyarakat) atau sejarah (berlatar peristiwa bersejarah)."
  },

  },

  },
  {

      "Musik rakyat dengan irama Timur Tengah",

    ],
    ans: 1,
    explain: "Berdasarkan teks: 'Dengklung merupakan salah satu bentuk kesenian yang bersifat religius. Kesenian tersebut merupakan perpaduan antara musik rakyat dengan irama Timur Tengah. Alat yang dipergunakan pada seni Dengklung adalah kendang buntung.'"

  {

      "Hanya dimainkan oleh seorang penari tunggal yang sangat terlatih",

    explain: "Berdasarkan teks: 'Tarian jathilan dilakukan dengan cara para penari menaiki kuda kepang dan bersenjatakan pedang.' Awalnya hanya 2 orang penari, namun seiring perkembangan zaman dilakukan lebih dari dua orang secara berpasangan."

const letters = ['A','B','C','D'];
const form    = document.getElementById('quiz-form');
const bar     = document.getElementById('progress-bar');
const countEl = document.getElementById('progress-count');
const warn    = document.getElementById('warn-msg');
const hasilDiv= document.getElementById('hasil');
const submitBtn = document.getElementById('submit-btn');

questions.forEach((item, i) => {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = 'card-' + i;
  const optsHTML = item.opts.map((opt, j) => `
    <label class="option-label" id="lbl-${i}-${j}">
      <input type="radio" name="q${i}" value="${j}" />
      <span class="opt-letter">${letters[j]}</span>
      <span class="opt-text">${opt}</span>
    </label>`).join('');
  const diffLabel = item.diff === 'hard'
    ? '<span class="q-diff hard">Sulit</span>'
    : item.diff === 'easy'
    ? '<span class="q-diff easy">Mudah</span>'
    : '<span class="q-diff medium">Sedang</span>';
  card.innerHTML = `
    <div class="q-meta">
      <span class="q-num">${String(i+1).padStart(2,'0')}.</span>
      <span class="q-tag">${item.topic}</span>
      ${diffLabel}
    </div>
    <p class="q-text">${item.q}</p>
    <div class="options">${optsHTML}</div>`;
  form.appendChild(card);
});

function updateProgress() {
  let n = 0;
  questions.forEach((_,i) => { if (document.querySelector('input[name="q'+i+'"]:checked')) n++; });
  bar.style.width = (n / questions.length * 100) + '%';
  countEl.textContent = n + ' / ' + questions.length + ' dijawab';
}
form.addEventListener('change', updateProgress);

submitBtn.addEventListener('click', () => {
  const unanswered = [];
  questions.forEach((_,i) => {
    const card = document.getElementById('card-'+i);
    if (!document.querySelector('input[name="q'+i+'"]:checked')) {
      unanswered.push(i); card.classList.add('unanswered');
    } else { card.classList.remove('unanswered'); }
  });
  if (unanswered.length > 0) {
    warn.style.display = 'block';
    document.getElementById('card-'+unanswered[0]).scrollIntoView({ behavior:'smooth', block:'center' });
    return;
  }
  warn.style.display = 'none';
  submitBtn.disabled = true;
  form.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = true);

  let correct = 0;
  const details = [];
  questions.forEach((item, i) => {
    const sel = parseInt(document.querySelector('input[name="q'+i+'"]:checked').value);
    const ok  = sel === item.ans;
    if (ok) correct++;
    for (let j = 0; j < item.opts.length; j++) {
      const lbl = document.getElementById('lbl-'+i+'-'+j);
      if (j === item.ans) lbl.classList.add('correct');
      else if (j === sel && !ok) lbl.classList.add('wrong');
    }
    details.push({ q:i+1, topic:item.topic, ans:item.ans, sel, ok,
      ansText:item.opts[item.ans], selText:item.opts[sel], explain:item.explain });
  });

  const score = Math.round(correct / questions.length * 100);
  let pred, col;
  if (score >= 90)      { pred = '&#127942; Luar Biasa!';            col = '#E8A87C'; }
  else if (score >= 75) { pred = '&#9733; Sangat Baik';              col = '#A8D08D'; }
  else if (score >= 60) { pred = '&#128218; Baik';                   col = '#F0C040'; }
  else if (score >= 40) { pred = '&#128214; Cukup — Terus Belajar!'; col = '#E09050'; }
  else                  { pred = '&#128172; Jangan Menyerah!';       col = '#E07878'; }

  const kunciHTML = details.map(d => `
    <div class="kunci-item ${d.ok?'ok':''}">
      <div class="ki-no">Soal ${d.q} &mdash; ${d.topic}</div>
      <div class="ki-ans">&#10003; Benar: ${letters[d.ans]}. ${d.ansText}</div>
      ${!d.ok ? '<div class="ki-your">&#10007; Jawabanmu: '+letters[d.sel]+'. '+d.selText+'</div>' : ''}
      <div class="ki-explain">${d.explain}</div>
    </div>`).join('');

  hasilDiv.innerHTML = `
    <div class="score-label">Nilai Kamu</div>
    <div class="score-num">${score}</div>
    <div class="score-of">${correct} dari ${questions.length} soal benar</div>
    <div class="predikat" style="border-color:${col}44;color:${col}">${pred}</div>
    <div class="divider"></div>
    <div class="summary-row">
      <div class="stat"><div class="val g">${correct}</div><div class="lbl">Benar</div></div>
      <div class="stat"><div class="val r">${questions.length-correct}</div><div class="lbl">Salah</div></div>
      <div class="stat"><div class="val">${questions.length}</div><div class="lbl">Total</div></div>
    </div>
    <div class="kunci-title">Kunci Jawaban &amp; Penjelasan</div>
    <div class="kunci-grid">${kunciHTML}</div>
    <button id="retry-btn">&#128260; Coba Lagi</button>`;
  hasilDiv.style.display = 'block';
  hasilDiv.scrollIntoView({ behavior:'smooth', block:'start' });
  document.getElementById('retry-btn').addEventListener('click', () => location.reload());
});
</script>
