    header .chinese-title { position: relative; font-family: 'Noto Sans SC', sans-serif; font-size: clamp(1.1rem,3vw,1.5rem); color: rgba(255,255,255,.55); margin-top: 6px; letter-spacing: .15em; }
    header .sub { position: relative; margin-top: 10px; color: rgba(255,220,200,.7); font-size: .88rem; }

    .section-header { display: flex; align-items: center; gap: 12px; margin: 32px 0 16px; padding: 0 4px; }
    .section-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
    .icon-red { background: rgba(192,57,43,.12); border: 1.5px solid rgba(192,57,43,.2); }
    .icon-blue { background: rgba(52,100,180,.1); border: 1.5px solid rgba(52,100,180,.18); }
    .icon-green { background: rgba(30,107,58,.1); border: 1.5px solid rgba(30,107,58,.18); }
    .section-info .section-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; }
    .section-info .section-sub { font-size: .78rem; color: var(--muted); margin-top: 1px; }
    .section-line { flex: 1; height: 1px; background: var(--border); }

    .question-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 24px; margin-bottom: 14px; transition: box-shadow .2s; }

    .question-card.unanswered { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212,160,42,.14); }

    .q-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .q-num { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; color: var(--accent); min-width: 30px; }

    .q-diff.medium { color: #7A5A1A; background: rgba(122,90,26,.08); border: 1px solid rgba(122,90,26,.2); }
    .q-diff.easy { color: #1E6B3A; background: rgba(30,107,58,.08); border: 1px solid rgba(30,107,58,.2); }

    .hanzi-pinyin { font-size: .95rem; color: var(--muted); margin-top: 4px; letter-spacing: .08em; font-style: italic; }

    .zh { font-family: 'Noto Sans SC', sans-serif; font-weight: 700; color: var(--accent); font-size: 1.05em; }
    .q-note { font-size: .81rem; color: var(--muted); font-style: italic; margin-bottom: 14px; margin-top: -8px; }

    .option-label { display: flex; align-items: flex-start; gap: 12px; padding: 11px 15px; border: 1.5px solid var(--border); border-radius: 9px; cursor: pointer; transition: border-color .15s, background .15s; user-select: none; }
    .option-label:hover { border-color: var(--accent); background: #FFF0ED; }

    .opt-letter { flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%; background: var(--bg); border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: .74rem; font-weight: 700; color: var(--muted); transition: all .15s; margin-top: 1px; }

    .option-label.correct .opt-letter { background: var(--correct); border-color: var(--correct); color: #fff; }
    .option-label.wrong { border-color: var(--wrong); background: #FAF0EE; }
    .option-label.wrong .opt-letter { background: var(--wrong); border-color: var(--wrong); color: #fff; }

    #submit-btn { font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600; background: var(--accent); color: #fff; border: none; padding: 16px 56px; border-radius: 9px; cursor: pointer; transition: background .2s, transform .1s; letter-spacing: .04em; }
    #submit-btn:hover { background: #A0271C; transform: translateY(-1px); }
    #submit-btn:disabled { opacity: .4; cursor: not-allowed; }
    #warn-msg { display: none; margin-top: 12px; font-size: .86rem; color: #8B6200; background: #FFF8E6; border: 1px solid #DEB84A; border-radius: 8px; padding: 10px 18px; text-align: center; }

    #hasil { display: none; margin-top: 44px; background: linear-gradient(135deg,#8B0000,#5A0000); color: #FDF5F0; border-radius: var(--radius); padding: 44px 32px; text-align: center; animation: fadeUp .5s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    .score-label { font-size: .7rem; letter-spacing: .2em; text-transform: uppercase; color: rgba(255,200,180,.5); margin-bottom: 8px; }
    .score-num { font-family: 'Playfair Display', serif; font-size: clamp(3.5rem,10vw,5.5rem); font-weight: 700; line-height: 1; color: var(--gold); }
    .score-of { font-size: .88rem; color: rgba(255,200,180,.6); margin-top: 6px; }
    .predikat { display: inline-block; margin-top: 16px; font-size: 1rem; font-weight: 600; padding: 7px 22px; border-radius: 99px; border: 1.5px solid rgba(255,255,255,.15); font-family: 'Noto Sans SC', sans-serif; }
    .divider { width: 48px; height: 2px; background: rgba(255,255,255,.1); margin: 22px auto; }
    .summary-row { display: flex; justify-content: center; gap: 36px; flex-wrap: wrap; margin-bottom: 28px; }
    .stat .val { font-size: 1.65rem; font-weight: 700; }
    .stat .val.g { color: #7DCFAA; }
    .stat .val.r { color: #E07878; }
    .stat .lbl { font-size: .75rem; color: rgba(255,200,180,.5); margin-top: 3px; }
    .kunci-title { font-family: 'Playfair Display', serif; font-size: 1.18rem; margin-bottom: 16px; }
    .kunci-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(260px,1fr)); gap: 10px; text-align: left; }
    .kunci-item { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08); border-radius: 9px; padding: 12px 14px; font-size: .83rem; line-height: 1.55; }
    .kunci-item.ok { border-color: rgba(125,207,170,.2); }
    .ki-no { color: var(--gold); font-weight: 700; margin-bottom: 4px; font-size: .78rem; }
    .ki-ans { color: #7DCFAA; font-weight: 600; font-family: 'Noto Sans SC', sans-serif; }
    .ki-your { color: #E07878; font-size: .8rem; margin-top: 3px; }
    .ki-explain { color: rgba(255,200,180,.6); font-size: .77rem; margin-top: 5px; font-style: italic; line-height: 1.5; }
    #retry-btn { margin-top: 28px; font-family: 'DM Sans', sans-serif; font-size: .92rem; font-weight: 600; background: transparent; color: #FDF5F0; border: 1.5px solid rgba(255,255,255,.22); padding: 12px 36px; border-radius: 9px; cursor: pointer; transition: all .2s; }
    #retry-btn:hover { border-color: rgba(255,255,255,.6); background: rgba(255,255,255,.06); }
    @media(max-width:500px){.question-card{padding:18px 14px}#hasil{padding:28px 14px}.hanzi-big{font-size:2.4rem}}
  </style>
</head>

const letters = ['A','B','C','D'];
const form = document.getElementById('quiz-form');
const bar  = document.getElementById('progress-bar');
const countEl = document.getElementById('progress-count');
const warn = document.getElementById('warn-msg');
const hasilDiv = document.getElementById('hasil');
const submitBtn = document.getElementById('submit-btn');

questions.forEach((item, i) => {
  if (item.section) {
    const sec = document.createElement('div');
    sec.className = 'section-header';
    sec.innerHTML = `<div class="section-icon ${item.sectionIcon}">${item.section.split(' ')[0]}</div>
      <div class="section-info">
        <div class="section-title">${item.section.replace(/^[\S]+\s/,'')}</div>
        <div class="section-sub">${item.sectionSub}</div>
      </div>
      <div class="section-line"></div>`;
    form.appendChild(sec);
  }

  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = 'card-' + i;

  let extra = '';
  if (item.hanzi) {
    extra = `<div class="hanzi-display"><span class="hanzi-big">${item.hanzi}</span><div class="hanzi-pinyin">${item.pinyin}</div></div>`;
  } else if (item.clock) {
    extra = `<div class="clock-display"><span class="clock-face">${item.clock}</span></div>`;
  }

  const optsHTML = item.opts.map((opt, j) => `
    <label class="option-label" id="lbl-${i}-${j}">
      <input type="radio" name="q${i}" value="${j}" />
      <span class="opt-letter">${letters[j]}</span>
      <span class="opt-text">${opt}</span>
    </label>`).join('');

  const diffLabel = item.diff === 'hard'
    ? '<span class="q-diff hard">Sulit</span>'
    : item.diff === 'easy'
    ? '<span class="q-diff easy">Mudah</span>'
    : '<span class="q-diff medium">Sedang</span>';

  card.innerHTML = `
    <div class="q-meta">
      <span class="q-num">${String(i+1).padStart(2,'0')}.</span>
      <span class="q-tag">${item.topic}</span>${diffLabel}
    </div>
    ${extra}
    <p class="q-text">${item.q}</p>
    ${item.note ? `<p class="q-note">&#x1F4CC; ${item.note}</p>` : ''}
    <div class="options">${optsHTML}</div>`;
  form.appendChild(card);
});

function updateProgress() {
  let n = 0;
  questions.forEach((_,i) => { if (document.querySelector(`input[name="q${i}"]:checked`)) n++; });
  bar.style.width = (n / questions.length * 100) + '%';
  countEl.textContent = n + ' / ' + questions.length + ' dijawab';
}
form.addEventListener('change', updateProgress);

submitBtn.addEventListener('click', () => {
  const unanswered = [];
  questions.forEach((_,i) => {
    const card = document.getElementById('card-'+i);
    if (!document.querySelector(`input[name="q${i}"]:checked`)) { unanswered.push(i); card.classList.add('unanswered'); }
    else card.classList.remove('unanswered');
  });
  if (unanswered.length > 0) {
    warn.style.display = 'block';
    document.getElementById('card-'+unanswered[0]).scrollIntoView({ behavior:'smooth', block:'center' });
    return;
  }
  warn.style.display = 'none';
  submitBtn.disabled = true;
  form.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = true);

  let correct = 0;
  const details = [];
  questions.forEach((item, i) => {
    const sel = parseInt(document.querySelector(`input[name="q${i}"]:checked`).value);
    const ok = sel === item.ans;
    if (ok) correct++;
    for (let j = 0; j < item.opts.length; j++) {
      const lbl = document.getElementById(`lbl-${i}-${j}`);
      if (j === item.ans) lbl.classList.add('correct');
      else if (j === sel && !ok) lbl.classList.add('wrong');
    }
    details.push({ q:i+1, topic:item.topic, ans:item.ans, sel, ok, ansText:item.opts[item.ans], selText:item.opts[sel], explain:item.explain });
  });

  const score = Math.round(correct / questions.length * 100);
  let pred, col;
  if (score >= 92)      { pred = '&#x1F3C6; &#20248;&#31186; — Luar Biasa!'; col = '#D4A02A'; }
  else if (score >= 76) { pred = '&#x2B50; &#24456;&#22909; — Sangat Baik!'; col = '#A8D08D'; }
  else if (score >= 60) { pred = '&#x1F4D6; &#19981;&#38169; — Lumayan!'; col = '#F0C040'; }
  else if (score >= 40) { pred = '&#x1F4AA; &#21152;&#27तेज&#27तेज&#27767; — Semangat!'; col = '#E09050'; }
  else                  { pred = '&#x1F331; &#32487;&#32493;&#21152;&#27तेज़! — Jangan Menyerah!'; col = '#E07878'; }

  const kunciHTML = details.map(d => `
    <div class="kunci-item ${d.ok?'ok':''}">
      <div class="ki-no">Soal ${d.q} &mdash; ${d.topic}</div>
      <div class="ki-ans">&#10003; ${letters[d.ans]}. ${d.ansText}</div>
      ${!d.ok ? `<div class="ki-your">&#10007; ${letters[d.sel]}. ${d.selText}</div>` : ''}
      <div class="ki-explain">${d.explain}</div>
    </div>`).join('');

  hasilDiv.innerHTML = `
    <div class="score-label">NILAI KAMU &middot; &#20320;&#30340;&#25104;&#32489;</div>
    <div class="score-num">${score}</div>
    <div class="score-of">${correct} dari ${questions.length} soal benar</div>
    <div class="predikat" style="border-color:${col}55;color:${col}">${pred}</div>
    <div class="divider"></div>
    <div class="summary-row">
      <div class="stat"><div class="val g">${correct}</div><div class="lbl">Benar &#10003;</div></div>
      <div class="stat"><div class="val r">${questions.length-correct}</div><div class="lbl">Salah &#10007;</div></div>
      <div class="stat"><div class="val">${questions.length}</div><div class="lbl">Total</div></div>
    </div>
    <div class="kunci-title">&#31572;&#26696;&#35299;&#26512; &mdash; Kunci &amp; Penjelasan</div>
    <div class="kunci-grid">${kunciHTML}</div>
    <button id="retry-btn">&#x1F504; &#37325;&#26032;&#24320;&#22987; &mdash; Coba Lagi</button>`;
  hasilDiv.style.display = 'block';
  hasilDiv.scrollIntoView({ behavior:'smooth', block:'start' });
  document.getElementById('retry-btn').addEventListener('click', () => location.reload());
});
</script>
