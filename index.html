<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kuis Bahasa Mandarin — HSK 1 + Jam + Goresan</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@400;500;700&family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FDF5F0; --surface: #FFFCFA; --ink: #1A1210;
      --muted: #8A7060; --accent: #C8401A; --border: #EDD8CC;
      --correct: #2B6044; --wrong: #A02020; --radius: 12px;
      --ch: 'Noto Serif SC', serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; padding: 0 0 80px; }

    header { background: var(--ink); color: #FDF5F0; padding: 52px 24px 44px; text-align: center; position: relative; overflow: hidden; }
    header::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 15% 50%, rgba(200,64,26,.22) 0%, transparent 55%),
                  radial-gradient(ellipse at 85% 30%, rgba(200,64,26,.12) 0%, transparent 50%);
    }
    header .ch-deco { position: relative; font-family: var(--ch); font-size: 5rem; font-weight: 700; color: rgba(200,64,26,.18); line-height: 1; letter-spacing: .2em; user-select: none; }
    header .label {
      position: relative; display: inline-block; font-size: .68rem; font-weight: 600;
      letter-spacing: .22em; text-transform: uppercase; color: #F0A080;
      background: rgba(240,160,128,.1); border: 1px solid rgba(240,160,128,.3);
      padding: 5px 16px; border-radius: 99px; margin-bottom: 16px;
    }
    header h1 { position: relative; font-family: 'Playfair Display', serif; font-size: clamp(1.8rem, 4.5vw, 2.8rem); line-height: 1.2; }
    header p { position: relative; margin-top: 10px; color: #9A8070; font-size: .9rem; }
    .topic-badges { position: relative; display: flex; flex-wrap: wrap; justify-content: center; gap: 9px; margin-top: 18px; }
    .tb { font-size: .7rem; font-weight: 700; padding: 4px 12px; border-radius: 99px; border: 1px solid; letter-spacing: .05em; }
    .tb-hsk  { color: #C8401A; background: rgba(200,64,26,.08);  border-color: rgba(200,64,26,.3); }
    .tb-jam  { color: #1A6AC8; background: rgba(26,106,200,.08); border-color: rgba(26,106,200,.3); }
    .tb-gor  { color: #2A8A5C; background: rgba(42,138,92,.08);  border-color: rgba(42,138,92,.3); }

    #progress-wrap { position: sticky; top: 0; z-index: 10; background: var(--ink); }
    #progress-bar { height: 3px; background: var(--accent); width: 0%; transition: width .35s ease; }
    #progress-count { text-align: right; padding: 4px 16px 5px; font-size: .7rem; color: #5A4030; background: var(--ink); }

    .container { max-width: 780px; margin: 0 auto; padding: 36px 20px 0; }

    .section-title {
      display: flex; align-items: center; gap: 12px; margin: 32px 0 16px;
    }
    .section-title .line { flex: 1; height: 1px; background: var(--border); }
    .section-title h2 {
      font-family: 'Playfair Display', serif; font-size: .98rem; font-weight: 700;
      white-space: nowrap; padding: 6px 16px; border-radius: 99px; border: 1.5px solid;
    }
    .sec-hsk h2 { color: #C8401A; border-color: rgba(200,64,26,.3); background: rgba(200,64,26,.06); }
    .sec-jam h2 { color: #1A6AC8; border-color: rgba(26,106,200,.3); background: rgba(26,106,200,.06); }
    .sec-gor h2 { color: #2A8A5C; border-color: rgba(42,138,92,.3);  background: rgba(42,138,92,.06); }

    .question-card {
      background: var(--surface); border: 1px solid var(--border);
      border-left: 4px solid transparent;
      border-radius: var(--radius); padding: 28px 26px; margin-bottom: 14px;
      transition: box-shadow .2s;
    }
    .question-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.07); }
    .question-card.unanswered { border-color: #C8962A; box-shadow: 0 0 0 3px rgba(200,150,42,.13); }
    .card-hsk { border-left-color: #C8401A; }
    .card-jam { border-left-color: #1A6AC8; }
    .card-gor { border-left-color: #2A8A5C; }

    .q-meta { display: flex; align-items: center; gap: 9px; margin-bottom: 12px; flex-wrap: wrap; }
    .q-num { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; min-width: 28px; }
    .q-num.hsk { color: #C8401A; } .q-num.jam { color: #1A6AC8; } .q-num.gor { color: #2A8A5C; }
    .q-tag {
      font-size: .67rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted); background: var(--bg); border: 1px solid var(--border);
      padding: 3px 10px; border-radius: 99px;
    }

    /* Chinese character display */
    .q-hanzi {
      font-family: var(--ch); font-size: 2.6rem; font-weight: 700;
      color: var(--accent); text-align: center; padding: 18px 0 12px;
      letter-spacing: .15em; line-height: 1.2;
    }
    .q-hanzi.small { font-size: 1.8rem; letter-spacing: .08em; }
    .q-pinyin { text-align: center; font-size: .9rem; color: var(--muted); margin-bottom: 6px; font-style: italic; }
    .q-text { font-size: .97rem; line-height: 1.7; font-weight: 500; margin-bottom: 18px; }

    /* Stroke order box */
    .stroke-box {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 16px; margin-bottom: 18px; text-align: center;
    }
    .stroke-box .ch-big { font-family: var(--ch); font-size: 3.5rem; font-weight: 700; color: var(--ink); }
    .stroke-box .stroke-info { font-size: .82rem; color: var(--muted); margin-top: 6px; }
    .stroke-steps {
      display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-top: 12px;
    }
    .stroke-step {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    .stroke-step .ch-s { font-family: var(--ch); font-size: 1.8rem; color: var(--ink); line-height: 1; }
    .stroke-step .sn { font-size: .65rem; color: var(--muted); }

    .options { display: flex; flex-direction: column; gap: 8px; }
    .option-label {
      display: flex; align-items: flex-start; gap: 11px;
      padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 8px;
      cursor: pointer; transition: border-color .15s, background .15s; user-select: none;
    }
    .option-label:hover { border-color: var(--accent); background: #FEF5F0; }
    .option-label input[type="radio"] { display: none; }
    .opt-letter {
      flex-shrink: 0; width: 25px; height: 25px; border-radius: 50%;
      background: var(--bg); border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: .72rem; font-weight: 700; color: var(--muted);
      transition: all .15s; margin-top: 2px;
    }
    .option-label:has(input:checked) { border-color: var(--accent); background: #FEF5F0; }
    .option-label:has(input:checked) .opt-letter { background: var(--accent); border-color: var(--accent); color: #fff; }
    .opt-text { font-size: .91rem; line-height: 1.55; padding-top: 2px; }
    .opt-ch { font-family: var(--ch); font-size: 1.1rem; color: var(--accent); font-weight: 700; }

    .option-label.correct { border-color: var(--correct); background: #EAF4EF; }
    .option-label.correct .opt-letter { background: var(--correct); border-color: var(--correct); color: #fff; }
    .option-label.wrong   { border-color: var(--wrong);   background: #FAF0F0; }
    .option-label.wrong   .opt-letter { background: var(--wrong);   border-color: var(--wrong);   color: #fff; }

    #btn-wrap { text-align: center; margin-top: 40px; }
    #submit-btn {
      font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600;
      background: var(--ink); color: #FDF5F0; border: none;
      padding: 16px 56px; border-radius: 8px; cursor: pointer;
      transition: background .2s, transform .1s; letter-spacing: .04em;
    }
    #submit-btn:hover { background: #2A1A10; transform: translateY(-1px); }
    #submit-btn:active { transform: translateY(0); }
    #submit-btn:disabled { opacity: .4; cursor: not-allowed; }
    #warn-msg {
      display: none; margin-top: 12px; font-size: .86rem; color: #8B6200;
      background: #FFF8E6; border: 1px solid #DEB84A; border-radius: 8px;
      padding: 10px 18px; text-align: center;
    }

    /* HASIL */
    #hasil {
      display: none; margin-top: 44px; background: var(--ink); color: #FDF5F0;
      border-radius: var(--radius); padding: 44px 32px; text-align: center;
      animation: fadeUp .5s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);} }
    .score-label { font-size: .72rem; letter-spacing: .2em; text-transform: uppercase; color: #7A5040; margin-bottom: 10px; }
    .score-num { font-family: 'Playfair Display', serif; font-size: clamp(3.5rem,10vw,5.5rem); font-weight: 700; line-height: 1; color: var(--accent); }
    .score-of { font-size: .88rem; color: #8A6050; margin-top: 6px; }
    .predikat { display: inline-block; margin-top: 18px; font-size: 1rem; font-weight: 600; padding: 7px 22px; border-radius: 99px; border: 1.5px solid rgba(255,255,255,.15); }
    .divider { width: 48px; height: 2px; background: rgba(255,255,255,.1); margin: 22px auto; }
    .sec-scores { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 22px; }
    .sec-sc { text-align: center; padding: 10px 16px; border-radius: 8px; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08); }
    .sec-sc .sv { font-size: 1.35rem; font-weight: 700; }
    .sec-sc .sl { font-size: .68rem; color: #8A6050; margin-top: 2px; text-transform: uppercase; letter-spacing: .06em; }
    .summary-row { display: flex; justify-content: center; gap: 32px; flex-wrap: wrap; margin-bottom: 28px; }
    .stat .val { font-size: 1.6rem; font-weight: 700; }
    .stat .val.g { color: #90D8AA; } .stat .val.r { color: #E08080; }
    .stat .lbl { font-size: .74rem; color: #8A6050; margin-top: 3px; }
    .kunci-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin-bottom: 18px; }
    .kunci-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px,1fr)); gap: 9px; text-align: left; }
    .kunci-item { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08); border-radius: 8px; padding: 11px 13px; font-size: .83rem; line-height: 1.55; }
    .kunci-item.ok { border-color: rgba(200,64,26,.25); }
    .ki-no { color: #F0A080; font-weight: 700; margin-bottom: 3px; font-size: .78rem; }
    .ki-ans { color: #90D8AA; font-weight: 600; }
    .ki-ch { font-family: var(--ch); font-size: 1.1rem; color: #F0A080; }
    .ki-your { color: #E08080; font-size: .79rem; margin-top: 2px; }
    .ki-explain { color: #8A6050; font-size: .77rem; margin-top: 4px; font-style: italic; }
    #retry-btn {
      margin-top: 28px; font-family: 'DM Sans', sans-serif; font-size: .92rem; font-weight: 600;
      background: transparent; color: #FDF5F0; border: 1.5px solid rgba(255,255,255,.2);
      padding: 12px 36px; border-radius: 8px; cursor: pointer; transition: all .2s;
    }
    #retry-btn:hover { border-color: rgba(255,255,255,.55); background: rgba(255,255,255,.06); }
    @media(max-width:500px){ .question-card{padding:20px 14px;} #hasil{padding:28px 14px;} }
  </style>
</head>
<body>

<header>
  <div class="ch-deco">汉语 时间 笔画</div>
  <div class="label">Bahasa Mandarin &mdash; Pemula</div>
  <h1>Kuis Mandarin</h1>
  <p>HSK 1 &bull; Jam &amp; Waktu &bull; Urutan Goresan</p>
  <div class="topic-badges">
    <span class="tb tb-hsk">HSK 1 &mdash; Kosakata Dasar</span>
    <span class="tb tb-jam">Jam &amp; Waktu (时间)</span>
    <span class="tb tb-gor">Goresan &amp; Penulisan (笔画)</span>
  </div>
</header>

<div id="progress-wrap">
  <div id="progress-bar"></div>
  <div id="progress-count">0 / 20 dijawab</div>
</div>

<div class="container">
  <div id="quiz-form"></div>
  <div id="btn-wrap">
    <button id="submit-btn">Kirim Jawaban &nbsp;提交</button>
    <div id="warn-msg">⚠️ Masih ada soal yang belum dijawab. Lengkapi semua terlebih dahulu.</div>
  </div>
  <div id="hasil"></div>
</div>

<script>
const sections = [
  { id:'hsk', title:'HSK 1 &mdash; Kosakata &amp; Tata Bahasa Dasar (你好！)', cls:'sec-hsk', card:'card-hsk', nc:'hsk' },
  { id:'jam', title:'Jam &amp; Waktu &mdash; 几点了？(Sudah jam berapa?)', cls:'sec-jam', card:'card-jam', nc:'jam' },
  { id:'gor', title:'Goresan &mdash; 笔画顺序 (Urutan Penulisan Huruf)', cls:'sec-gor', card:'card-gor', nc:'gor' }
];

const questions = [
  /* ══════════ HSK 1 — 1 s/d 8 ══════════ */
  {
    sec:'hsk', topic:'Salam',
    hanzi:'你好', pinyin:'nǐ hǎo',
    q:'Apa arti dari 你好？',
    opts:['Selamat tinggal','Halo / Apa kabar','Terima kasih','Permisi'],
    ans:1, explain:'你(nǐ) = kamu, 好(hǎo) = baik/bagus. 你好 adalah sapaan umum "Halo" dalam bahasa Mandarin.'
  },
  {
    sec:'hsk', topic:'Angka',
    hanzi:'三', pinyin:'sān',
    q:'Karakter 三 berarti …',
    opts:['Satu (1)','Dua (2)','Tiga (3)','Empat (4)'],
    ans:2, explain:'Angka Mandarin: 一(yī)=1, 二(èr)=2, 三(sān)=3, 四(sì)=4, 五(wǔ)=5.'
  },
  {
    sec:'hsk', topic:'Keluarga',
    hanzi:'妈妈', pinyin:'māmā',
    q:'妈妈 artinya …',
    opts:['Ayah','Ibu','Kakak perempuan','Nenek'],
    ans:1, explain:'妈妈(māmā) = ibu/mama. 爸爸(bàba) = ayah/papa.'
  },
  {
    sec:'hsk', topic:'Kosakata Dasar',
    hanzi:'水', pinyin:'shuǐ',
    q:'水 artinya …',
    opts:['Api','Angin','Air','Tanah'],
    ans:2, explain:'水(shuǐ) = air. Lima unsur Mandarin: 水(air), 火(huǒ/api), 木(mù/kayu), 金(jīn/logam), 土(tǔ/tanah).'
  },
  {
    sec:'hsk', topic:'Pertanyaan',
    hanzi:'吗', pinyin:'ma',
    q:'Partikel 吗 diletakkan di akhir kalimat untuk membentuk …',
    opts:['Kalimat perintah','Kalimat seru','Kalimat tanya ya/tidak','Kalimat pengandaian'],
    ans:2, explain:'吗(ma) adalah partikel tanya. Contoh: 你好吗？= Apa kabar kamu? (secara harfiah: Kamu baik ya?)'
  },
  {
    sec:'hsk', topic:'Kosakata Dasar',
    hanzi:'我', pinyin:'wǒ',
    q:'Kata ganti 我 berarti …',
    opts:['Kamu','Dia (laki-laki)','Saya / Aku','Mereka'],
    ans:2, explain:'Kata ganti orang: 我(wǒ)=saya, 你(nǐ)=kamu, 他(tā)=dia ♂, 她(tā)=dia ♀, 我们(wǒmen)=kami/kita.'
  },
  {
    sec:'hsk', topic:'Makanan',
    hanzi:'吃', pinyin:'chī',
    q:'吃 artinya …',
    opts:['Minum','Makan','Tidur','Jalan'],
    ans:1, explain:'吃(chī) = makan. 喝(hē) = minum. Contoh kalimat: 我吃饭 = saya makan nasi.'
  },
  {
    sec:'hsk', topic:'Warna',
    hanzi:'红色', pinyin:'hóngsè',
    q:'红色 berarti …',
    opts:['Warna biru','Warna putih','Warna merah','Warna hitam'],
    ans:2, explain:'红(hóng)=merah, 蓝(lán)=biru, 白(bái)=putih, 黑(hēi)=hitam, 黄(huáng)=kuning, 绿(lǜ)=hijau.'
  },

  /* ══════════ JAM & WAKTU — 9 s/d 14 ══════════ */
  {
    sec:'jam', topic:'Menanyakan Jam',
    hanzi:'几点了？', pinyin:'jǐ diǎn le?',
    q:'Kalimat 几点了？digunakan untuk …',
    opts:['Menanyakan hari ini hari apa','Menanyakan sudah jam berapa sekarang','Menanyakan tanggal berapa','Menanyakan berapa umurmu'],
    ans:1, explain:'几点了(jǐ diǎn le) = Sudah jam berapa? 几(jǐ)=berapa, 点(diǎn)=titik/jam, 了(le)=penanda perubahan.'
  },
  {
    sec:'jam', topic:'Menyebut Jam',
    hanzi:'', pinyin:'',
    q:'Bagaimana cara mengatakan "Sekarang jam 3" dalam bahasa Mandarin?',
    opts:['现在三点。', '现在三分。', '现在是三时间。', '三点现在。'],
    ans:0, explain:'Pola: 现在(xiànzài=sekarang) + angka + 点(diǎn=jam). Jadi 现在三点 = Sekarang jam 3. 分(fēn) = menit.'
  },
  {
    sec:'jam', topic:'Menit',
    hanzi:'三十分', pinyin:'sānshí fēn',
    q:'三十分 berarti …',
    opts:['13 menit','30 menit','03 menit','103 menit'],
    ans:1, explain:'三十(sānshí)=30, 分(fēn)=menit. Jadi 三十分=30 menit. Contoh: 两点三十分 = jam 2:30.'
  },
  {
    sec:'jam', topic:'Bagian Hari',
    hanzi:'下午', pinyin:'xiàwǔ',
    q:'下午 artinya …',
    opts:['Pagi hari (sebelum tengah hari)','Tengah malam','Sore/siang setelah tengah hari','Subuh'],
    ans:2, explain:'上午(shàngwǔ)=pagi (sebelum 12 siang), 下午(xiàwǔ)=sore/siang (setelah 12 siang), 晚上(wǎnshàng)=malam, 早上(zǎoshang)=pagi dini.'
  },
  {
    sec:'jam', topic:'Waktu Lengkap',
    hanzi:'', pinyin:'',
    q:'Bagaimana cara mengatakan "Jam 7 pagi" dalam Mandarin?',
    opts:['晚上七点', '上午七点', '下午七点', '中午七点'],
    ans:1, explain:'上午(shàngwǔ)=pagi. Jadi 上午七点=jam 7 pagi. 晚上=malam, 下午=sore, 中午(zhōngwǔ)=tengah hari.'
  },
  {
    sec:'jam', topic:'Durasi Waktu',
    hanzi:'两个小时', pinyin:'liǎng gè xiǎoshí',
    q:'两个小时 berarti …',
    opts:['Dua menit','Dua puluh jam','Dua jam','Dua hari'],
    ans:2, explain:'两(liǎng)=dua (untuk benda terhitung), 个(gè)=kata bantu bilangan, 小时(xiǎoshí)=jam (durasi). Berbeda dengan 点(diǎn) yang dipakai untuk waktu spesifik.'
  },

  /* ══════════ GORESAN — 15 s/d 20 ══════════ */
  {
    sec:'gor', topic:'Aturan Goresan',
    hanzi:'', pinyin:'',
    q:'Aturan dasar urutan goresan (笔顺/bǐshùn) yang paling mendasar dalam penulisan Mandarin adalah …',
    opts:[
      'Dari kanan ke kiri, dari bawah ke atas',
      'Dari kiri ke kanan, dari atas ke bawah',
      'Dari tengah ke luar, dari bawah ke atas',
      'Tidak ada aturan baku, bebas sesuai kenyamanan'
    ],
    ans:1, explain:'Prinsip utama goresan: (1) kiri sebelum kanan, (2) atas sebelum bawah. Prinsip ini berlaku untuk hampir semua karakter Mandarin.'
  },
  {
    sec:'gor', topic:'Jenis Goresan',
    hanzi:'横 héng', pinyin:'',
    q:'Goresan 横 (héng) berbentuk …',
    opts:['Garis lurus vertikal dari atas ke bawah','Garis lurus horizontal dari kiri ke kanan','Garis miring ke kiri (seperti /)','Titik kecil'],
    ans:1, explain:'横(héng)=goresan horizontal (kiri→kanan). Jenis goresan dasar: 横(horizontal), 竖(shù=vertikal), 撇(piě=miring kiri), 捺(nà=miring kanan), 点(diǎn=titik).'
  },
  {
    sec:'gor', topic:'Urutan Goresan',
    hanzi:'一', pinyin:'yī',
    q:'Karakter 一 (yī = angka 1) ditulis dengan …',
    opts:['2 goresan: titik lalu horizontal','1 goresan: satu garis horizontal','3 goresan: tiga garis horizontal','1 goresan: satu garis vertikal'],
    ans:1, explain:'一(yī) adalah karakter tersederhana — hanya 1 goresan horizontal (héng). Inilah mengapa "satu" dalam Mandarin ditulis sebagai satu garis mendatar.'
  },
  {
    sec:'gor', topic:'Urutan Goresan',
    hanzi:'人', pinyin:'rén',
    q:'Karakter 人 (rén = manusia) memiliki berapa goresan dan dalam urutan apa?',
    opts:[
      '3 goresan: horizontal, vertikal, titik',
      '2 goresan: garis miring kiri (撇) lalu garis miring kanan/捺 (nà)',
      '4 goresan dimulai dari garis vertikal',
      '2 goresan: titik lalu horizontal'
    ],
    ans:1, explain:'人(rén) = 2 goresan: ①撇(piě) — garis miring ke kiri, ②捺(nà) — garis miring ke kanan. Seperti dua kaki manusia yang berdiri.'
  },
  {
    sec:'gor', topic:'Urutan Goresan',
    hanzi:'口', pinyin:'kǒu',
    q:'Karakter 口 (kǒu = mulut) ditulis dalam urutan …',
    opts:[
      '① garis kiri (vertikal) → ② horizontal atas → ③ horizontal bawah → ④ garis kanan',
      '① vertikal kiri → ② horizontal atas → ③ garis kanan melengkung → ④ horizontal bawah menutup',
      '① garis kanan dulu → ② horizontal atas → ③ vertikal kiri → ④ horizontal bawah',
      '① titik → ② garis melingkar penuh sekaligus'
    ],
    ans:1, explain:'口(kǒu) = 3 goresan: ①竖(vertikal kiri), ②横折(horizontal atas lalu belok turun kanan=garis kanan), ③横(horizontal bawah menutup). Prinsip: luar dulu, bawah terakhir.'
  },
  {
    sec:'gor', topic:'Jumlah Goresan',
    hanzi:'中', pinyin:'zhōng',
    q:'Karakter 中 (zhōng = tengah/Tiongkok) memiliki berapa goresan?',
    opts:['2 goresan','3 goresan','4 goresan','5 goresan'],
    ans:2, explain:'中(zhōng) = 4 goresan: ①竖(vertikal tengah), ②横折(horizontal atas+kanan), ③横(horizontal bawah), ④竖(vertikal tengah menembus). Urutan: garis tengah → kotak → garis tengah lagi.'
  }
];

/* ── BUILD DOM ── */
const letters = ['A','B','C','D'];
const form = document.getElementById('quiz-form');
const bar  = document.getElementById('progress-bar');
const countEl = document.getElementById('progress-count');
const warn = document.getElementById('warn-msg');
const hasilDiv = document.getElementById('hasil');
const submitBtn = document.getElementById('submit-btn');

sections.forEach(sec => {
  const div = document.createElement('div');
  div.className = 'section-title ' + sec.cls;
  div.innerHTML = '<div class="line"></div><h2>' + sec.title + '</h2><div class="line"></div>';
  form.appendChild(div);

  questions.forEach((item, i) => {
    if (item.sec !== sec.id) return;
    const card = document.createElement('div');
    card.className = 'question-card ' + sec.card;
    card.id = 'card-' + i;

    const hanziBlock = item.hanzi
      ? `<div class="q-hanzi ${item.hanzi.length > 3 ? 'small' : ''}">${item.hanzi}</div>
         ${item.pinyin ? '<div class="q-pinyin">'+item.pinyin+'</div>' : ''}`
      : '';

    const optsHTML = item.opts.map((opt, j) => {
      const hasCh = /[\u4e00-\u9fff]/.test(opt);
      return `<label class="option-label" id="lbl-${i}-${j}">
        <input type="radio" name="q${i}" value="${j}" />
        <span class="opt-letter">${letters[j]}</span>
        <span class="opt-text ${hasCh ? 'opt-ch' : ''}">${opt}</span>
      </label>`;
    }).join('');

    card.innerHTML = `
      <div class="q-meta">
        <span class="q-num ${sec.nc}">${String(i+1).padStart(2,'0')}.</span>
        <span class="q-tag">${item.topic}</span>
      </div>
      ${hanziBlock}
      <p class="q-text">${item.q}</p>
      <div class="options">${optsHTML}</div>`;
    form.appendChild(card);
  });
});

function updateProgress() {
  let n = 0;
  questions.forEach((_,i) => { if (document.querySelector('input[name="q'+i+'"]:checked')) n++; });
  bar.style.width = (n / questions.length * 100) + '%';
  countEl.textContent = n + ' / ' + questions.length + ' dijawab';
}
form.addEventListener('change', updateProgress);

submitBtn.addEventListener('click', () => {
  const unanswered = [];
  questions.forEach((_,i) => {
    const card = document.getElementById('card-'+i);
    if (!document.querySelector('input[name="q'+i+'"]:checked')) {
      unanswered.push(i); card.classList.add('unanswered');
    } else { card.classList.remove('unanswered'); }
  });
  if (unanswered.length > 0) {
    warn.style.display = 'block';
    document.getElementById('card-'+unanswered[0]).scrollIntoView({ behavior:'smooth', block:'center' });
    return;
  }
  warn.style.display = 'none';
  submitBtn.disabled = true;
  form.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = true);

  const secScore = { hsk:0, jam:0, gor:0 };
  const secTotal = { hsk:0, jam:0, gor:0 };
  let correct = 0;
  const details = [];

  questions.forEach((item, i) => {
    const sel = parseInt(document.querySelector('input[name="q'+i+'"]:checked').value);
    const ok = sel === item.ans;
    if (ok) { correct++; secScore[item.sec]++; }
    secTotal[item.sec]++;
    for (let j = 0; j < item.opts.length; j++) {
      const lbl = document.getElementById('lbl-'+i+'-'+j);
      if (j === item.ans) lbl.classList.add('correct');
      else if (j === sel && !ok) lbl.classList.add('wrong');
    }
    details.push({ q:i+1, topic:item.topic, hanzi:item.hanzi, sec:item.sec,
      ans:item.ans, sel, ok, ansText:item.opts[item.ans], selText:item.opts[sel], explain:item.explain });
  });

  const score = Math.round(correct / questions.length * 100);
  let pred, col;
  if (score >= 90)      { pred='&#127942; 优秀！Luar Biasa!'; col='#F0A080'; }
  else if (score >= 75) { pred='&#9733; 很好！Bagus!';        col='#A8D08D'; }
  else if (score >= 60) { pred='&#128218; 不错！Lumayan!';    col='#F0C040'; }
  else if (score >= 40) { pred='&#128214; 加油！Semangat!';   col='#E09050'; }
  else                  { pred='&#128172; 再试试！Coba Lagi!'; col='#E08080'; }

  const secNames = { hsk:'HSK 1', jam:'Jam & Waktu', gor:'Goresan' };
  const secCols  = { hsk:'#F0A080', jam:'#80B8F0', gor:'#80D8AA' };
  const secScoreHTML = Object.keys(secScore).map(k => `
    <div class="sec-sc">
      <div class="sv" style="color:${secCols[k]}">${secScore[k]}/${secTotal[k]}</div>
      <div class="sl">${secNames[k]}</div>
    </div>`).join('');

  const kunciHTML = details.map(d => {
    const hasCh = /[\u4e00-\u9fff]/.test(d.ansText);
    return `<div class="kunci-item ${d.ok?'ok':''}">
      <div class="ki-no">Soal ${d.q} &mdash; ${d.topic}${d.hanzi?' <span class="ki-ch">'+d.hanzi+'</span>':''}</div>
      <div class="ki-ans">&#10003; Benar: ${letters[d.ans]}. <span ${hasCh?'style="font-family:\'Noto Serif SC\',serif;font-size:1rem"':''}>${d.ansText}</span></div>
      ${!d.ok ? '<div class="ki-your">&#10007; Jawaban kamu: '+letters[d.sel]+'. '+d.selText+'</div>' : ''}
      <div class="ki-explain">${d.explain}</div>
    </div>`;
  }).join('');

  hasilDiv.innerHTML = `
    <div class="score-label">Nilai Kamu &mdash; 你的成绩</div>
    <div class="score-num">${score}</div>
    <div class="score-of">${correct} dari ${questions.length} soal benar</div>
    <div class="predikat" style="border-color:${col}44;color:${col}">${pred}</div>
    <div class="divider"></div>
    <div class="sec-scores">${secScoreHTML}</div>
    <div class="summary-row">
      <div class="stat"><div class="val g">${correct}</div><div class="lbl">Benar</div></div>
      <div class="stat"><div class="val r">${questions.length-correct}</div><div class="lbl">Salah</div></div>
      <div class="stat"><div class="val">${questions.length}</div><div class="lbl">Total</div></div>
    </div>
    <div class="kunci-title">Kunci Jawaban &amp; Penjelasan</div>
    <div class="kunci-grid">${kunciHTML}</div>
    <button id="retry-btn">&#128260; Coba Lagi &nbsp; 再来一次</button>`;
  hasilDiv.style.display = 'block';
  hasilDiv.scrollIntoView({ behavior:'smooth', block:'start' });
  document.getElementById('retry-btn').addEventListener('click', () => location.reload());
});
</script>
</body>
</html>
