// Helper: membuat jam analog SVG
function clockSVG(hour, minute) {
  const cx = 55, cy = 55, r = 48;
  const hAngle = ((hour % 12) + minute/60) * 30 - 90;
  const mAngle = minute * 6 - 90;
  const toRad = deg => deg * Math.PI / 180;
  const hx = cx + 26 * Math.cos(toRad(hAngle));
  const hy = cy + 26 * Math.sin(toRad(hAngle));
  const mx = cx + 38 * Math.cos(toRad(mAngle));
  const my = cy + 38 * Math.sin(toRad(mAngle));
  // tick marks
  let ticks = '';
  for (let i = 0; i < 12; i++) {
    const a = toRad(i * 30 - 90);
    const x1 = cx + 42 * Math.cos(a), y1 = cy + 42 * Math.sin(a);
    const x2 = cx + 48 * Math.cos(a), y2 = cy + 48 * Math.sin(a);
    ticks += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#7A7068" stroke-width="2"/>`;
  }
  return `<svg class="clock-svg" viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="#FDFAF6" stroke="#DDD0C0" stroke-width="2"/>
    ${ticks}
    <line x1="${cx}" y1="${cy}" x2="${hx.toFixed(1)}" y2="${hy.toFixed(1)}" stroke="#1A1614" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="${cx}" y1="${cy}" x2="${mx.toFixed(1)}" y2="${my.toFixed(1)}" stroke="#C0392B" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="3.5" fill="#1A1614"/>
  </svg>`;
}

      "Kapan kita bertemu?"
    ],
    ans: 0,
    explain: "现在几点？(Xiànzài jǐ diǎn?) = Sekarang jam berapa? 现在 (xiànzài) = sekarang, 几 (jǐ) = berapa (untuk angka kecil), 点 (diǎn) = jam/titik. Ini adalah cara paling umum bertanya jam dalam bahasa Mandarin."
  },
  {
    topic: "Jam & Waktu",
    diff: "hard",
    q: 'Bagaimana cara mengucapkan "Jam 9 kurang 15 menit" (08.45) dalam bahasa Mandarin?',
    clock: {h:8, m:45},
    note: "",
    opts: [
      "九点四十五分 (jiǔ diǎn sìshíwǔ fēn)",
      "差一刻九点 (chā yī kè jiǔ diǎn)",
      "八点四十五分 (bā diǎn sìshíwǔ fēn)",
      "B dan C keduanya benar"
    ],
    ans: 3,
    explain: "08.45 = jam 9 kurang 15 menit. Ada dua cara mengucapkannya: 八点四十五分 (bā diǎn sìshíwǔ fēn) = jam 8 lewat 45 menit, ATAU 差一刻九点 (chā yī kè jiǔ diǎn) = kurang satu perempat jam (15 menit) menuju jam 9. 一刻 (yī kè) = 15 menit (satu 'kuartal')."
  },
  {
    topic: "Jam & Waktu",
    diff: "hard",
    q: 'Jam berapakah yang ditunjukkan oleh gambar jam berikut?<div class="clock-img" id="clock-12"></div>',
    clock: {h:12, m:0},
    note: "",
    opts: [
      "十点钟 (shí diǎn zhōng) — Jam 10",
      "十一点钟 (shíyī diǎn zhōng) — Jam 11",
      "十二点钟 (shíèr diǎn zhōng) — Jam 12 (tengah hari/tengah malam)",
      "零点钟 (líng diǎn zhōng) — Jam 0 / Tengah malam"
    ],
    ans: 2,
    explain: "十二点钟 (shíèr diǎn zhōng) = Jam 12. Untuk tengah hari: 中午十二点 (zhōngwǔ shíèr diǎn). Untuk tengah malam: 午夜十二点 (wǔyè shíèr diǎn) atau 零点 (líng diǎn). Mandarin tidak mengenal AM/PM, melainkan menggunakan keterangan waktu di depan."
  },
  {
    topic: "Jam & Waktu",
    diff: "medium",
    q: 'Kata apakah yang digunakan untuk menyatakan "menit" dalam bahasa Mandarin?',
    clock: null,
    note: "Contoh: Jam 3 lewat 20 menit = 三点二十___",
    opts: [
      "时 (shí)",
      "刻 (kè)",
      "分 (fēn)",
      "秒 (miǎo)"
    ],
    ans: 2,
    explain: "分 (fēn) = menit. Maka 三点二十分 (sān diǎn èrshí fēn) = jam 3 lewat 20 menit. Perhatikan: 时 (shí) = jam (dalam konteks lain), 刻 (kè) = seperempat jam (15 menit), 秒 (miǎo) = detik."
  },
  {
    topic: "Jam & Waktu",
    diff: "hard",
    q: 'Bagaimana cara menyatakan "Jam 2 siang" (14.00) dalam bahasa Mandarin secara lengkap?',
    clock: null,
    note: "",
    opts: [
      "十四点钟 (shísì diǎn zhōng)",
      "下午两点 (xiàwǔ liǎng diǎn)",
      "下午二点 (xiàwǔ èr diǎn)",
      "A dan B keduanya benar"
    ],
    ans: 1,
    explain: "下午两点 (xiàwǔ liǎng diǎn) = jam 2 siang. Penting: untuk angka 2 dalam konteks jam, Mandarin menggunakan 两 (liǎng), BUKAN 二 (èr). 下午 (xiàwǔ) = sore/siang hari. Mandarin sehari-hari lebih sering pakai 上午/下午 daripada format 24 jam."
  },
  {
    topic: "Jam & Waktu",
    diff: "hard",
    q: 'Kalimat manakah yang berarti "Sekolah dimulai jam 7 pagi" dalam bahasa Mandarin?',
    clock: null,
    note: "",
    opts: [
      "学校七点上课 (xuéxiào qī diǎn shàngkè)",
      "上午七点学校开始 (shàngwǔ qī diǎn xuéxiào kāishǐ)",
      "早上七点上课 (zǎoshang qī diǎn shàngkè)",
      "A dan C keduanya benar"
    ],
    ans: 3,
    explain: "Dua cara yang benar: 学校七点上课 (xuéxiào qī diǎn shàngkè) = sekolah jam tujuh mulai kelas, dan 早上七点上课 (zǎoshang qī diǎn shàngkè) = pagi jam tujuh masuk kelas. 早上 (zǎoshang) = pagi hari, 上课 (shàngkè) = masuk kelas/mulai pelajaran. Dalam Mandarin, waktu selalu diletakkan SEBELUM kata kerja."
  }
];

const letters = ['A','B','C','D'];
const form = document.getElementById('quiz-form');
const bar  = document.getElementById('progress-bar');
const countEl = document.getElementById('progress-count');
const warn = document.getElementById('warn-msg');
const hasilDiv = document.getElementById('hasil');
const submitBtn = document.getElementById('submit-btn');

questions.forEach((item, i) => {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = 'card-' + i;
  const optsHTML = item.opts.map((opt, j) => `
    <label class="option-label" id="lbl-${i}-${j}">
      <input type="radio" name="q${i}" value="${j}" />
      <span class="opt-letter">${letters[j]}</span>
      <span class="opt-text">${opt}</span>
    </label>`).join('');
  const diffLabel = item.diff === 'hard'
    ? '<span class="q-diff hard">Sulit</span>'
    : '<span class="q-diff medium">Sedang</span>';
  card.innerHTML = `
    <div class="q-meta">
      <span class="q-num">${String(i+1).padStart(2,'0')}.</span>
      <span class="q-tag">${item.topic}</span>
      ${diffLabel}
    </div>
    <p class="q-text">${item.q}</p>
    ${item.note ? '<p class="q-note">'+item.note+'</p>' : ''}
    <div class="options">${optsHTML}</div>`;
  form.appendChild(card);

  // Render jam SVG jika ada
  if (item.clock) {
    const clockDiv = card.querySelector('.clock-img');
    if (clockDiv) {
      clockDiv.innerHTML = clockSVG(item.clock.h, item.clock.m);
    }
  }
});

function updateProgress() {
  let n = 0;
  questions.forEach((_,i) => { if (document.querySelector('input[name="q'+i+'"]:checked')) n++; });
  bar.style.width = (n / questions.length * 100) + '%';
  countEl.textContent = n + ' / ' + questions.length + ' dijawab';
}
form.addEventListener('change', updateProgress);

submitBtn.addEventListener('click', () => {
  const unanswered = [];
  questions.forEach((_,i) => {
    const card = document.getElementById('card-'+i);
    if (!document.querySelector('input[name="q'+i+'"]:checked')) {
      unanswered.push(i); card.classList.add('unanswered');
    } else { card.classList.remove('unanswered'); }
  });

  if (unanswered.length > 0) {
    warn.style.display = 'block';
    document.getElementById('card-'+unanswered[0]).scrollIntoView({ behavior:'smooth', block:'center' });
    return;
  }
  warn.style.display = 'none';
  submitBtn.disabled = true;
  form.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = true);

  let correct = 0;
  const details = [];
  questions.forEach((item, i) => {
    const sel = parseInt(document.querySelector('input[name="q'+i+'"]:checked').value);
    const ok = sel === item.ans;
    if (ok) correct++;
    for (let j = 0; j < item.opts.length; j++) {
      const lbl = document.getElementById('lbl-'+i+'-'+j);
      if (j === item.ans) lbl.classList.add('correct');
      else if (j === sel && !ok) lbl.classList.add('wrong');
    }
    details.push({ q:i+1, topic:item.topic, ans:item.ans, sel, ok,
      ansText:item.opts[item.ans], selText:item.opts[sel], explain:item.explain });
  });

  const score = Math.round(correct / questions.length * 100);
  let pred, col;
  if (score >= 90)      { pred = '&#127942; Luar Biasa';              col = '#E8A87C'; }
  else if (score >= 75) { pred = '&#9733; Sangat Baik';               col = '#A8D08D'; }
  else if (score >= 60) { pred = '&#128218; Baik';                    col = '#F0C040'; }
  else if (score >= 40) { pred = '&#128214; Cukup — Terus Belajar';   col = '#E09050'; }
  else                  { pred = '&#128172; Jangan Menyerah!';        col = '#E07878'; }

  const kunciHTML = details.map(d => `
    <div class="kunci-item ${d.ok?'ok':''}">
      <div class="ki-no">Soal ${d.q} &mdash; ${d.topic}</div>
      <div class="ki-ans">&#10003; Benar: ${letters[d.ans]}. ${d.ansText}</div>
      ${!d.ok ? '<div class="ki-your">&#10007; Jawaban kamu: '+letters[d.sel]+'. '+d.selText+'</div>' : ''}
      <div class="ki-explain">${d.explain}</div>
    </div>`).join('');

  hasilDiv.innerHTML = `
    <div class="score-label">Nilai Kamu</div>
    <div class="score-num">${score}</div>
    <div class="score-of">${correct} dari ${questions.length} soal benar</div>
    <div class="predikat" style="border-color:${col}44;color:${col}">${pred}</div>
    <div class="divider"></div>
    <div class="summary-row">
      <div class="stat"><div class="val g">${correct}</div><div class="lbl">Benar</div></div>
      <div class="stat"><div class="val r">${questions.length-correct}</div><div class="lbl">Salah</div></div>
      <div class="stat"><div class="val">${questions.length}</div><div class="lbl">Total</div></div>
    </div>
    <div class="kunci-title">Kunci Jawaban &amp; Penjelasan</div>
    <div class="kunci-grid">${kunciHTML}</div>
    <button id="retry-btn">&#128260; Coba Lagi</button>`;
  hasilDiv.style.display = 'block';
  hasilDiv.scrollIntoView({ behavior:'smooth', block:'start' });
  document.getElementById('retry-btn').addEventListener('click', () => location.reload());
});
</script>
</body>
</html>
