<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galaxy with Zoom Effect</title>
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.152.2/build/three.module.js",
        "three/addons/controls/OrbitControls.js": "https://unpkg.com/three@0.152.2/examples/jsm/controls/OrbitControls.js",
        "three/examples/jsm/loaders/FontLoader.js": "https://unpkg.com/three@0.152.2/examples/jsm/loaders/FontLoader.js",
        "three/examples/jsm/geometries/TextGeometry.js": "https://unpkg.com/three@0.152.2/examples/jsm/geometries/TextGeometry.js"
      }
    }
  </script>
</head>

<body>
  <div id="container"></div>

  <div id="landscape-warning">
    <div class="warning-content">
      <div class="rotate-icon"></div>
      <h1>Stellar Bloom</h1>
      <h1>Tinh Cầu</h1>
      <div class="stars-bg"></div>
    </div>
  </div>

  <div id="dark-overlay"></div>
  <div id="info"></div>

  <!-- Kreator (diisi otomatis dari config.js) -->
  <h1 id="creator-label" style="
    position: fixed;
    bottom: 10px;
    right: 10px;
    font-size: 18px;
    font-family: Arial, sans-serif;
    color: white;
    background: rgba(0,0,0,0.4);
    padding: 6px 12px;
    border-radius: 8px;
    z-index: 9999;
  "></h1>

  <!-- Tombol musik -->
  <button id="musicButton" disabled>Mainkan Musik 🎵</button>
  <div id="player"></div>

  <!-- Muat config.js terlebih dahulu -->
  <script src="config.js"></script>

  <!-- Terapkan config ke halaman -->
  <script>
    // Isi label kreator dari config
    document.getElementById('creator-label').textContent = CONFIG.creatorName;

    // Isi label tombol musik dari config
    document.getElementById('musicButton').textContent = CONFIG.music.buttonLabel;
  </script>

  <!-- YouTube IFrame API -->
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    let player;

    window.onYouTubeIframeAPIReady = function () {
      const { videoId, startTime, endTime } = CONFIG.music;
      player = new YT.Player('player', {
        height: '0',
        width: '0',
        videoId: videoId,
        playerVars: {
          autoplay: 0,
          start: startTime,
          end: endTime || undefined,
          controls: 0,
          loop: 1,
          playlist: videoId,
        },
        events: {
          onReady: () => {
            const btn = document.getElementById('musicButton');
            btn.disabled = false;
            btn.innerText = CONFIG.music.buttonLabel;
          },
          onStateChange: (event) => {
            if (event.data === YT.PlayerState.ENDED) {
              player.seekTo(CONFIG.music.startTime);
            }
          },
        },
      });
    };

    document.getElementById('musicButton').addEventListener('click', () => {
      if (player) {
        player.playVideo();
        document.getElementById('musicButton').style.display = 'none';
      }
    });
  </script>

  <!-- Script utama galaksi -->
  <script type="module" src="script.js"></script>
</body>
</html>
