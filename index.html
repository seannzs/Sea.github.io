<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kuis Antropologi — SMA Kelas XI Semester 2</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #EEF3F0; --surface: #FAFCFB; --ink: #141E1A;
      --muted: #6B7C74; --accent: #2A7A5B; --border: #C8D8D0;
      --correct: #1F6B47; --wrong: #A02828; --radius: 12px;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; padding: 0 0 80px; }

    header {
      background: var(--ink); color: #EEF3F0;
      padding: 52px 24px 44px; text-align: center;
      position: relative; overflow: hidden;
    }
    header::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }
    header .label {
      display: inline-block; font-size: .7rem; font-weight: 600;
      letter-spacing: .2em; text-transform: uppercase; color: #6ECFAA;
      background: rgba(110,207,170,.1); border: 1px solid rgba(110,207,170,.3);
      padding: 5px 16px; border-radius: 99px; margin-bottom: 20px;
    }
    header h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2rem, 5vw, 3.2rem); line-height: 1.15; position: relative;
    }
    header p { margin-top: 12px; color: #8AADA0; font-size: .95rem; }

    #progress-wrap { position: sticky; top: 0; z-index: 10; background: var(--ink); }
    #progress-bar { height: 3px; background: var(--accent); width: 0%; transition: width .4s ease; }

    .container { max-width: 760px; margin: 0 auto; padding: 40px 20px 0; }

    .question-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px 28px; margin-bottom: 18px;
      transition: box-shadow .2s;
    }
    .question-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.07); }
    .question-card.unanswered { border-color: #C8A03A; box-shadow: 0 0 0 3px rgba(200,160,58,.15); }

    .q-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .q-num { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; color: var(--accent); min-width: 32px; }
    .q-tag {
      font-size: .7rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase;
      color: var(--muted); background: var(--bg); border: 1px solid var(--border);
      padding: 3px 10px; border-radius: 99px;
    }
    .q-text { font-size: 1rem; line-height: 1.7; font-weight: 500; margin-bottom: 20px; }

    .options { display: flex; flex-direction: column; gap: 9px; }
    .option-label {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 8px;
      cursor: pointer; transition: border-color .15s, background .15s; user-select: none;
    }
    .option-label:hover { border-color: var(--accent); background: #EAF5EF; }
    .option-label input[type="radio"] { display: none; }
    .opt-letter {
      flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%;
      background: var(--bg); border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: .75rem; font-weight: 700; color: var(--muted);
      transition: all .15s; margin-top: 1px;
    }
    .option-label:has(input:checked) { border-color: var(--accent); background: #EAF5EF; }
    .option-label:has(input:checked) .opt-letter { background: var(--accent); border-color: var(--accent); color: #fff; }
    .opt-text { font-size: .93rem; line-height: 1.55; padding-top: 2px; }

    .option-label.correct { border-color: var(--correct); background: #E8F5EE; }
    .option-label.correct .opt-letter { background: var(--correct); border-color: var(--correct); color: #fff; }
    .option-label.wrong { border-color: var(--wrong); background: #FAF0F0; }
    .option-label.wrong .opt-letter { background: var(--wrong); border-color: var(--wrong); color: #fff; }

    #btn-wrap { text-align: center; margin-top: 36px; }
    #submit-btn {
      font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600;
      background: var(--ink); color: #EEF3F0; border: none;
      padding: 16px 56px; border-radius: 8px; cursor: pointer;
      transition: background .2s, transform .1s; letter-spacing: .03em;
    }
    #submit-btn:hover { background: #1F2E28; transform: translateY(-1px); }
    #submit-btn:active { transform: translateY(0); }
    #submit-btn:disabled { opacity: .4; cursor: not-allowed; }

    #warn-msg {
      display: none; margin-top: 12px; font-size: .87rem; color: #9A6A00;
      background: #FFFAE8; border: 1px solid #DFC76A; border-radius: 8px;
      padding: 10px 18px; text-align: center;
    }

    #hasil {
      display: none; margin-top: 40px; background: var(--ink); color: #EEF3F0;
      border-radius: var(--radius); padding: 44px 32px; text-align: center;
      animation: fadeUp .5s ease both;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    #hasil .score-label { font-size: .75rem; letter-spacing: .18em; text-transform: uppercase; color: #8AADA0; margin-bottom: 10px; }
    #hasil .score-num { font-family: 'Playfair Display', serif; font-size: clamp(3.5rem,10vw,5.5rem); font-weight: 700; line-height: 1; color: #6ECFAA; }
    #hasil .score-of { font-size: .9rem; color: #8AADA0; margin-top: 6px; }
    #hasil .predikat { display: inline-block; margin-top: 20px; font-size: 1.05rem; font-weight: 600; padding: 8px 24px; border-radius: 99px; border: 1.5px solid rgba(255,255,255,.15); }
    #hasil .divider { width: 48px; height: 2px; background: rgba(255,255,255,.12); margin: 24px auto; }
    #hasil .summary-row { display: flex; justify-content: center; gap: 36px; flex-wrap: wrap; margin-bottom: 32px; }
    #hasil .stat .val { font-size: 1.7rem; font-weight: 700; }
    #hasil .stat .val.g { color: #6ECFAA; }
    #hasil .stat .val.r { color: #E07070; }
    #hasil .stat .lbl { font-size: .77rem; color: #8AADA0; margin-top: 3px; }
    #hasil .kunci-title { font-family: 'Playfair Display', serif; font-size: 1.25rem; margin-bottom: 20px; }
    .kunci-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 10px; text-align: left; }
    .kunci-item { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.09); border-radius: 8px; padding: 12px 14px; font-size: .85rem; line-height: 1.55; }
    .kunci-item.ok { border-color: rgba(110,207,170,.22); }
    .ki-no { color: #6ECFAA; font-weight: 700; margin-bottom: 4px; }
    .ki-ans { color: #7DCCA4; font-weight: 600; }
    .ki-your { color: #E07070; font-size: .8rem; margin-top: 2px; }

    #retry-btn {
      margin-top: 28px; font-family: 'DM Sans', sans-serif; font-size: .93rem; font-weight: 600;
      background: transparent; color: #EEF3F0; border: 1.5px solid rgba(255,255,255,.25);
      padding: 12px 36px; border-radius: 8px; cursor: pointer; transition: all .2s;
    }
    #retry-btn:hover { border-color: #fff; background: rgba(255,255,255,.07); }

    @media (max-width: 500px) { .question-card { padding: 22px 16px; } #hasil { padding: 32px 16px; } }
  </style>
</head>
<body>

<header>
  <div class="label">SMA &middot; Kelas XI &middot; Semester 2</div>
  <h1>Kuis Antropologi</h1>
  <p>20 soal pilihan ganda &mdash; jawab semua lalu kirim</p>
</header>
<div id="progress-wrap"><div id="progress-bar"></div></div>

<div class="container">
  <div id="quiz-form"></div>
  <div id="btn-wrap">
    <button id="submit-btn">Kirim Jawaban</button>
    <div id="warn-msg">&#9888; Masih ada soal yang belum dijawab. Lengkapi semua jawaban terlebih dahulu.</div>
  </div>
  <div id="hasil"></div>
</div>

<script>
const questions = [
  {
    topic: "Masyarakat Majemuk",
    q: "Masyarakat majemuk (plural society) menurut J.S. Furnivall adalah masyarakat yang terdiri dari …",
    opts: [
      "Satu kelompok etnis dengan berbagai lapisan ekonomi",
      "Dua atau lebih kelompok etnis yang hidup berdampingan namun kurang bercampur secara sosial dan budaya",
      "Masyarakat yang telah mencapai persatuan penuh tanpa perbedaan etnis",
      "Masyarakat dengan sistem pemerintahan yang terbagi atas banyak partai politik"
    ],
    ans: 1
  },
  {
    topic: "Stratifikasi Sosial",
    q: "Stratifikasi sosial berdasarkan keturunan yang menempatkan seseorang pada lapisan tertentu sejak lahir dan sulit berubah disebut stratifikasi …",
    opts: ["Terbuka", "Campuran", "Tertutup", "Fungsional"],
    ans: 2
  },
  {
    topic: "Kasta",
    q: "Sistem kasta dalam masyarakat Hindu-Bali dibagi menjadi empat wangsa. Urutan wangsa dari tertinggi ke terendah adalah …",
    opts: [
      "Brahmana – Ksatria – Waisya – Sudra",
      "Ksatria – Brahmana – Sudra – Waisya",
      "Waisya – Ksatria – Brahmana – Sudra",
      "Sudra – Waisya – Ksatria – Brahmana"
    ],
    ans: 0
  },
  {
    topic: "Mobilitas Sosial",
    q: "Seorang petani yang anaknya berhasil menjadi dokter merupakan contoh mobilitas sosial …",
    opts: ["Horizontal", "Vertikal turun (sinking)", "Vertikal naik (climbing)", "Lateral"],
    ans: 2
  },
  {
    topic: "Budaya Politik",
    q: "Budaya politik yang ditandai dengan partisipasi aktif warga dalam kehidupan politik dan memahami hak serta kewajiban politiknya disebut budaya politik …",
    opts: ["Parokial", "Kaula (subjek)", "Partisipan", "Elitis"],
    ans: 2
  },
  {
    topic: "Norma Sosial",
    q: "Norma yang pelanggarannya dianggap paling berat karena bertentangan dengan nilai inti masyarakat dan dikenai sanksi tegas disebut …",
    opts: ["Folkways", "Mores", "Taboo (tabu)", "Usage"],
    ans: 2
  },
  {
    topic: "Peran & Status",
    q: "Ketegangan yang dialami seseorang karena ia harus memenuhi berbagai tuntutan peran yang berbeda pada saat bersamaan disebut …",
    opts: ["Konflik peran (role conflict)", "Role strain", "Status inconsistency", "Anomie"],
    ans: 0
  },
  {
    topic: "Kelompok Sosial",
    q: "Kelompok sosial yang ditandai oleh hubungan tatap muka, ikatan emosional yang kuat, dan rasa kebersamaan yang mendalam disebut …",
    opts: ["Kelompok sekunder", "Paguyuban (gemeinschaft)", "Patembayan (gesellschaft)", "Kelompok referensi"],
    ans: 1
  },
  {
    topic: "Hegemoni Budaya",
    q: "Konsep hegemoni budaya yang dikemukakan Antonio Gramsci merujuk pada …",
    opts: [
      "Kekuasaan militer yang memaksa budaya tertentu",
      "Dominasi ideologi kelompok berkuasa yang diterima secara sukarela oleh kelompok yang didominasi",
      "Perlawanan budaya rakyat terhadap penguasa",
      "Penyatuan budaya melalui pernikahan lintas etnis"
    ],
    ans: 1
  },
  {
    topic: "Stereotip & Prasangka",
    q: "Prasangka (prejudice) berbeda dari diskriminasi karena prasangka bersifat …",
    opts: [
      "Tindakan nyata yang merugikan kelompok lain",
      "Kebijakan resmi pemerintah terhadap kelompok minoritas",
      "Sikap atau penilaian negatif terhadap kelompok tertentu tanpa dasar yang kuat, belum terwujud dalam tindakan",
      "Peraturan tertulis yang membatasi hak kelompok tertentu"
    ],
    ans: 2
  },
  {
    topic: "Agen Sosialisasi",
    q: "Di antara agen sosialisasi berikut, yang paling berpengaruh pada pembentukan karakter awal anak adalah …",
    opts: ["Sekolah", "Teman sebaya", "Media massa", "Keluarga"],
    ans: 3
  },
  {
    topic: "Deviasi Sosial",
    q: "Menurut teori label (labeling theory) dari Howard Becker, seseorang menjadi devian karena …",
    opts: [
      "Faktor biologis bawaan yang tidak dapat diubah",
      "Kemiskinan struktural yang memaksanya melanggar norma",
      "Masyarakat menempelkan label 'menyimpang' padanya sehingga ia menginternalisasi identitas tersebut",
      "Pengaruh media massa yang merusak moral"
    ],
    ans: 2
  },
  {
    topic: "Perubahan Sosial",
    q: "Teori siklus perubahan sosial Pitirim Sorokin menyatakan bahwa masyarakat bergerak secara bergantian antara …",
    opts: [
      "Fase primitive dan fase modern",
      "Budaya ideasional, campuran (idealistik), dan inderawi (sensate) secara berulang",
      "Masyarakat agraris dan masyarakat industri",
      "Solidaritas mekanik dan solidaritas organik"
    ],
    ans: 1
  },
  {
    topic: "Lembaga Adat",
    q: "Lembaga adat di Indonesia memiliki fungsi utama sebagai …",
    opts: [
      "Pengganti pemerintah daerah dalam urusan perpajakan",
      "Wadah pelestarian nilai-nilai, norma, dan tradisi masyarakat adat serta penyelesaian sengketa secara kekeluargaan",
      "Badan legislatif tingkat desa yang membuat undang-undang",
      "Organisasi ekonomi masyarakat untuk mengelola sumber daya alam"
    ],
    ans: 1
  },
  {
    topic: "Tradisi Lisan",
    q: "Pantun, mantra, dan cerita rakyat termasuk dalam kategori tradisi lisan. Fungsi mantra dalam masyarakat tradisional adalah …",
    opts: [
      "Sarana hiburan semata di saat senggang",
      "Ungkapan kekuatan magis-religius yang dipercaya mampu mempengaruhi realitas",
      "Alat komunikasi antar suku yang berbeda bahasa",
      "Bentuk protes sosial terhadap penguasa secara tersamar"
    ],
    ans: 1
  },
  {
    topic: "Bahasa Daerah",
    q: "Kepunahan bahasa daerah (language death) berdampak bagi kebudayaan karena …",
    opts: [
      "Mempermudah komunikasi nasional sehingga menguntungkan semua pihak",
      "Turut hilangnya pengetahuan lokal, sistem nilai, dan cara pandang unik yang tersimpan dalam bahasa tersebut",
      "Mendorong masyarakat lebih cepat menyerap teknologi modern",
      "Tidak berdampak signifikan karena bahasa hanya alat komunikasi"
    ],
    ans: 1
  },
  {
    topic: "Sistem Kepercayaan",
    q: "Kepercayaan bahwa roh leluhur masih berpengaruh terhadap kehidupan orang yang masih hidup dan perlu dihormati melalui ritual disebut …",
    opts: ["Animisme", "Dinamisme", "Totemisme", "Pemujaan leluhur (ancestor worship)"],
    ans: 3
  },
  {
    topic: "Ekologi Budaya",
    q: "Ekologi budaya (cultural ecology) yang dikembangkan Julian Steward mempelajari hubungan antara …",
    opts: [
      "Pengaruh iklim terhadap warna kulit manusia",
      "Cara kelompok manusia beradaptasi terhadap lingkungan alam sehingga membentuk kebudayaan tertentu",
      "Dampak industrialisasi terhadap keanekaragaman hayati",
      "Migrasi hewan dan pola pemukiman manusia purba"
    ],
    ans: 1
  },
  {
    topic: "Hukum Adat",
    q: "Hukum adat di Indonesia bersifat tidak tertulis namun tetap dipatuhi masyarakat adat. Ciri khas hukum adat dibandingkan hukum tertulis adalah …",
    opts: [
      "Hanya berlaku bagi masyarakat kota yang terpelajar",
      "Bersifat kaku dan tidak dapat berubah seiring waktu",
      "Bersifat komunal, berakar pada nilai bersama, dan diselesaikan secara musyawarah mufakat",
      "Selalu bertentangan dengan hukum nasional"
    ],
    ans: 2
  },
  {
    topic: "Kebijakan Budaya",
    q: "Kebijakan pemerintah Indonesia yang menetapkan batik sebagai Warisan Budaya Takbenda UNESCO merupakan contoh upaya …",
    opts: [
      "Komersialisasi budaya demi kepentingan ekspor",
      "Pelestarian sekaligus pengakuan internasional atas kekayaan budaya bangsa",
      "Pembatasan penggunaan batik hanya untuk acara resmi kenegaraan",
      "Penyeragaman pakaian nasional di seluruh Indonesia"
    ],
    ans: 1
  }
];

const letters = ['A','B','C','D'];
const form = document.getElementById('quiz-form');
const bar  = document.getElementById('progress-bar');
const warn = document.getElementById('warn-msg');
const hasilDiv = document.getElementById('hasil');
const submitBtn = document.getElementById('submit-btn');

questions.forEach((item, i) => {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = 'card-' + i;
  const optsHTML = item.opts.map((opt, j) => `
    <label class="option-label" id="lbl-${i}-${j}">
      <input type="radio" name="q${i}" value="${j}" />
      <span class="opt-letter">${letters[j]}</span>
      <span class="opt-text">${opt}</span>
    </label>`).join('');
  card.innerHTML = `
    <div class="q-meta">
      <span class="q-num">${String(i+1).padStart(2,'0')}.</span>
      <span class="q-tag">${item.topic}</span>
    </div>
    <p class="q-text">${item.q}</p>
    <div class="options">${optsHTML}</div>`;
  form.appendChild(card);
});

function updateProgress() {
  let n = 0;
  questions.forEach((_,i) => { if (document.querySelector('input[name="q'+i+'"]:checked')) n++; });
  bar.style.width = (n / questions.length * 100) + '%';
}
form.addEventListener('change', updateProgress);

submitBtn.addEventListener('click', () => {
  const unanswered = [];
  questions.forEach((_,i) => {
    const card = document.getElementById('card-'+i);
    if (!document.querySelector('input[name="q'+i+'"]:checked')) {
      unanswered.push(i); card.classList.add('unanswered');
    } else { card.classList.remove('unanswered'); }
  });

  if (unanswered.length > 0) {
    warn.style.display = 'block';
    document.getElementById('card-'+unanswered[0]).scrollIntoView({ behavior:'smooth', block:'center' });
    return;
  }
  warn.style.display = 'none';
  submitBtn.disabled = true;
  form.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = true);

  let correct = 0;
  const details = [];
  questions.forEach((item, i) => {
    const sel = parseInt(document.querySelector('input[name="q'+i+'"]:checked').value);
    const ok = sel === item.ans;
    if (ok) correct++;
    for (let j = 0; j < item.opts.length; j++) {
      const lbl = document.getElementById('lbl-'+i+'-'+j);
      if (j === item.ans) lbl.classList.add('correct');
      else if (j === sel && !ok) lbl.classList.add('wrong');
    }
    details.push({ q:i+1, topic:item.topic, ans:item.ans, sel, ok, ansText:item.opts[item.ans], selText:item.opts[sel] });
  });

  const score = Math.round(correct / questions.length * 100);
  let pred, col;
  if (score >= 90)      { pred = '&#127942; Sangat Baik';        col = '#6ECFAA'; }
  else if (score >= 75) { pred = '&#10003;&#65038; Baik';         col = '#9DD88A'; }
  else if (score >= 60) { pred = '&#128218; Cukup';              col = '#F0C040'; }
  else                  { pred = '&#128214; Perlu Belajar Lagi'; col = '#E07070'; }

  const kunciHTML = details.map(d => `
    <div class="kunci-item ${d.ok?'ok':''}">
      <div class="ki-no">Soal ${d.q} &mdash; ${d.topic}</div>
      <div class="ki-ans">&#10003; Benar: ${letters[d.ans]}. ${d.ansText}</div>
      ${!d.ok ? '<div class="ki-your">&#10007; Jawaban kamu: '+letters[d.sel]+'. '+d.selText+'</div>' : ''}
    </div>`).join('');

  hasilDiv.innerHTML = `
    <div class="score-label">Nilai Kamu</div>
    <div class="score-num">${score}</div>
    <div class="score-of">${correct} dari ${questions.length} soal benar</div>
    <div class="predikat" style="border-color:${col}44;color:${col}">${pred}</div>
    <div class="divider"></div>
    <div class="summary-row">
      <div class="stat"><div class="val g">${correct}</div><div class="lbl">Benar</div></div>
      <div class="stat"><div class="val r">${questions.length-correct}</div><div class="lbl">Salah</div></div>
      <div class="stat"><div class="val">${questions.length}</div><div class="lbl">Total</div></div>
    </div>
    <div class="kunci-title">Kunci Jawaban &amp; Pembahasan</div>
    <div class="kunci-grid">${kunciHTML}</div>
    <button id="retry-btn">&#128260; Coba Lagi</button>`;
  hasilDiv.style.display = 'block';
  hasilDiv.scrollIntoView({ behavior:'smooth', block:'start' });
  document.getElementById('retry-btn').addEventListener('click', () => location.reload());
});
</script>
</body>
</html>
