<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Kuis Mandarin XI — 50 Soal Interaktif</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Syne:wght@400;600;700;800&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#D63031;--ink:#0D0D0D;--cream:#FBF7F0;--warm:#F5EDD8;
  --gold:#C9982A;--green:#1E6B45;--surface:#FFFFFF;
  --muted:#8A7E6E;--border:#E2D9C8;--radius:14px;
  --correct:#1E6B45;--wrong:#9B2226;
}
html{scroll-behavior:smooth}
body{font-family:'Syne',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;overflow-x:hidden}

/* ── HEADER ── */
header{
  background:var(--ink);color:var(--cream);
  padding:60px 24px 50px;text-align:center;
  position:relative;overflow:hidden;
}
header::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(circle at 10% 90%,rgba(214,48,49,.25) 0%,transparent 50%),
    radial-gradient(circle at 90% 10%,rgba(201,152,42,.15) 0%,transparent 50%);
}
.h-tag{
  position:relative;display:inline-flex;align-items:center;gap:8px;
  font-size:.65rem;font-weight:700;letter-spacing:.25em;text-transform:uppercase;
  color:var(--gold);border:1px solid rgba(201,152,42,.35);
  padding:5px 18px;border-radius:99px;margin-bottom:22px;
}
.h-tag::before{content:'✦';font-size:.55rem}
header h1{
  position:relative;
  font-family:'Noto Serif SC',serif;
  font-size:clamp(2rem,6vw,3.8rem);line-height:1.1;
  font-weight:700;letter-spacing:-.01em;
}
header h1 em{color:var(--red);font-style:normal}
.h-sub{position:relative;margin-top:12px;color:#9A8E7E;font-size:.88rem;font-weight:400}
.h-deco{
  position:absolute;font-family:'Noto Serif SC',serif;
  font-size:9rem;opacity:.04;user-select:none;line-height:1;
  right:4%;top:50%;transform:translateY(-50%);
}
.h-stats{
  position:relative;display:flex;justify-content:center;gap:32px;
  margin-top:28px;flex-wrap:wrap;
}
.h-stat{text-align:center}
.h-stat .n{font-family:'Noto Serif SC',serif;font-size:1.8rem;font-weight:700;color:var(--gold)}
.h-stat .l{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:#7A6E5E;margin-top:2px}

/* ── PROGRESS ── */
#prog-wrap{position:sticky;top:0;z-index:20;background:var(--ink)}
#prog-bar{height:3px;background:linear-gradient(90deg,var(--red),var(--gold));width:0%;transition:width .4s cubic-bezier(.4,0,.2,1)}
#prog-info{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 20px 7px;font-size:.7rem;color:#6A5E4E;letter-spacing:.05em;
}
#prog-info #prog-text{color:#7A6E5E}
#prog-info #score-live{color:var(--gold);font-weight:700}

/* ── CONTAINER ── */
.container{max-width:820px;margin:0 auto;padding:44px 20px 0}

/* ── SECTION DIVIDER ── */
.section-head{
  display:flex;align-items:center;gap:14px;margin:44px 0 20px;
}
.section-head .s-icon{
  width:42px;height:42px;border-radius:10px;
  background:var(--ink);color:var(--cream);
  display:flex;align-items:center;justify-content:center;
  font-size:1.15rem;flex-shrink:0;
}
.section-head .s-title{font-size:1rem;font-weight:700;letter-spacing:.04em}
.section-head .s-sub{font-size:.75rem;color:var(--muted);margin-top:2px;font-weight:400}
.section-line{flex:1;height:1px;background:var(--border)}

/* ── QUESTION CARD ── */
.q-card{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--radius);padding:28px 26px;margin-bottom:14px;
  transition:border-color .2s,box-shadow .2s,transform .15s;
  position:relative;overflow:hidden;
}
.q-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;background:var(--border);border-radius:3px 0 0 3px;
  transition:background .2s;
}
.q-card:hover{box-shadow:0 6px 28px rgba(0,0,0,.07);transform:translateY(-1px)}
.q-card.answered::before{background:var(--gold)}
.q-card.unanswered{border-color:#C9982A;box-shadow:0 0 0 3px rgba(201,152,42,.14)}

.q-top{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.q-num{
  font-family:'Noto Serif SC',serif;font-size:1.2rem;font-weight:700;
  color:var(--red);min-width:34px;
}
.q-badge{
  font-size:.62rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  padding:3px 10px;border-radius:99px;
}
.badge-topic{color:var(--muted);background:var(--warm);border:1px solid var(--border)}
.badge-hard{color:#7B1D1D;background:rgba(155,34,38,.08);border:1px solid rgba(155,34,38,.2)}
.badge-medium{color:#5C3D00;background:rgba(201,152,42,.1);border:1px solid rgba(201,152,42,.25)}

.q-body{font-size:.97rem;line-height:1.75;font-weight:500;margin-bottom:18px}
.hanzi{
  display:block;text-align:center;font-family:'Noto Serif SC',serif;
  font-size:2.2rem;color:var(--red);margin:12px 0 4px;letter-spacing:.08em;
}
.pinyin{display:block;text-align:center;font-size:.82rem;color:var(--muted);font-style:italic;margin-bottom:10px}
.q-note{font-size:.8rem;color:var(--muted);font-style:italic;margin-bottom:14px;margin-top:-8px}

/* ── CLOCK ── */
.clock-wrap{display:flex;justify-content:center;margin:12px 0}
.clock-svg{width:108px;height:108px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.1))}

/* ── HSK MATCH BOX ── */
.hsk-pair{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;
}
.hsk-sentence{
  background:var(--warm);border:1px solid var(--border);border-radius:9px;
  padding:10px 14px;font-size:.85rem;line-height:1.6;
}
.hsk-sentence .zh{font-family:'Noto Serif SC',serif;font-size:1.1rem;color:var(--ink);display:block}
.hsk-sentence .py{font-size:.75rem;color:var(--muted);font-style:italic}

/* ── OPTIONS ── */
.options{display:flex;flex-direction:column;gap:8px}
.opt{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 15px;border:1.5px solid var(--border);border-radius:10px;
  cursor:pointer;transition:all .15s;user-select:none;
}
.opt:hover{border-color:var(--red);background:#FEF6F6}
.opt input{display:none}
.opt-dot{
  flex-shrink:0;width:26px;height:26px;border-radius:50%;
  background:var(--warm);border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:.72rem;font-weight:700;color:var(--muted);
  transition:all .15s;margin-top:1px;
}
.opt:has(input:checked){border-color:var(--red);background:#FEF8F8}
.opt:has(input:checked) .opt-dot{background:var(--red);border-color:var(--red);color:#fff}
.opt-text{font-size:.9rem;line-height:1.55;padding-top:2px}

.opt.correct{border-color:var(--correct);background:#EDF6F0}
.opt.correct .opt-dot{background:var(--correct);border-color:var(--correct);color:#fff}
.opt.wrong{border-color:var(--wrong);background:#FDF0F0}
.opt.wrong .opt-dot{background:var(--wrong);border-color:var(--wrong);color:#fff}

/* ── BOTTOM ── */
#btn-area{text-align:center;margin:48px 0 0;padding-bottom:80px}
#submit-btn{
  font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;
  background:var(--ink);color:var(--cream);border:none;
  padding:17px 64px;border-radius:10px;cursor:pointer;letter-spacing:.08em;
  transition:all .2s;text-transform:uppercase;
}
#submit-btn:hover{background:#1A1A1A;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.18)}
#submit-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
#warn{
  display:none;margin-top:14px;font-size:.84rem;color:#7B4A00;
  background:#FFF8E6;border:1px solid #DDB84A;border-radius:8px;
  padding:10px 18px;
}

/* ── HASIL ── */
#hasil{
  display:none;margin-top:48px;margin-bottom:60px;
  background:var(--ink);color:var(--cream);
  border-radius:18px;padding:52px 36px;text-align:center;
  animation:fadeUp .55s cubic-bezier(.4,0,.2,1) both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
.hasil-tag{font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;color:#6A5E4E;margin-bottom:12px}
.hasil-score{font-family:'Noto Serif SC',serif;font-size:clamp(4rem,12vw,6.5rem);font-weight:700;line-height:1;color:var(--red)}
.hasil-of{font-size:.9rem;color:#6A5E4E;margin-top:8px}
.hasil-pred{
  display:inline-block;margin-top:18px;font-size:.95rem;font-weight:700;
  padding:8px 24px;border-radius:99px;border:1.5px solid rgba(255,255,255,.15);
  letter-spacing:.04em;
}
.hasil-div{width:48px;height:1px;background:rgba(255,255,255,.1);margin:28px auto}
.hasil-stats{display:flex;justify-content:center;gap:44px;flex-wrap:wrap;margin-bottom:36px}
.h-stt .v{font-size:2rem;font-weight:700}
.h-stt .v.g{color:#6EC49A}
.h-stt .v.r{color:#E07878}
.h-stt .lbl{font-size:.7rem;color:#6A5E4E;margin-top:3px;letter-spacing:.1em;text-transform:uppercase}
.kunci-title{font-family:'Noto Serif SC',serif;font-size:1.15rem;margin-bottom:18px;letter-spacing:.02em}
.kunci-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;text-align:left}
.ki{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:10px;padding:13px 16px;font-size:.82rem;line-height:1.6;
}
.ki.ok{border-color:rgba(110,196,154,.2)}
.ki-no{color:var(--gold);font-weight:700;font-size:.75rem;margin-bottom:5px}
.ki-ans{color:#6EC49A;font-weight:600}
.ki-your{color:#E07878;font-size:.78rem;margin-top:3px}
.ki-exp{color:#7A6E5E;font-size:.76rem;margin-top:5px;font-style:italic;line-height:1.55}
#retry-btn{
  margin-top:32px;font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;
  background:transparent;color:var(--cream);
  border:1.5px solid rgba(255,255,255,.2);
  padding:13px 40px;border-radius:10px;cursor:pointer;
  transition:all .2s;letter-spacing:.06em;text-transform:uppercase;
}
#retry-btn:hover{border-color:rgba(255,255,255,.6);background:rgba(255,255,255,.06)}

@media(max-width:520px){
  .q-card{padding:20px 16px}
  #hasil{padding:36px 18px}
  .hsk-pair{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header>
  <div class="h-deco">汉语</div>
  <div class="h-tag">SMA · Kelas XI · Bahasa Mandarin</div>
  <h1>Kuis <em>Interaktif</em><br>Bahasa Mandarin</h1>
  <p class="h-sub">Berdasarkan Modul Kelas XI — Materi HSK 1 &amp; Percakapan Dasar</p>
  <div class="h-stats">
    <div class="h-stat"><div class="n">50</div><div class="l">Soal</div></div>
    <div class="h-stat"><div class="n">6</div><div class="l">Topik</div></div>
    <div class="h-stat"><div class="n">HSK 1</div><div class="l">Level</div></div>
  </div>
</header>

<div id="prog-wrap">
  <div id="prog-bar"></div>
  <div id="prog-info">
    <span id="prog-text">0 / 50 dijawab</span>
    <span id="score-live">Nilai: —</span>
  </div>
</div>

<div class="container">
  <div id="quiz-form"></div>
  <div id="btn-area">
    <button id="submit-btn">Kirim Semua Jawaban</button>
    <div id="warn">⚠ Masih ada soal yang belum dijawab. Lengkapi semua soal terlebih dahulu.</div>
  </div>
  <div id="hasil"></div>
</div>

<script>
// ─── CLOCK HELPER ───
function clockSVG(h,m){
  const cx=54,cy=54,r=46;
  const rad=d=>d*Math.PI/180;
  const ha=((h%12)+m/60)*30-90, ma=m*6-90;
  const hx=cx+24*Math.cos(rad(ha)),hy=cy+24*Math.sin(rad(ha));
  const mx=cx+36*Math.cos(rad(ma)),my=cy+36*Math.sin(rad(ma));
  let ticks='';
  for(let i=0;i<12;i++){
    const a=rad(i*30-90);
    const big=(i%3===0);
    const r1=big?38:40,r2=46;
    ticks+=`<line x1="${(cx+r1*Math.cos(a)).toFixed(1)}" y1="${(cy+r1*Math.sin(a)).toFixed(1)}" x2="${(cx+r2*Math.cos(a)).toFixed(1)}" y2="${(cy+r2*Math.sin(a)).toFixed(1)}" stroke="${big?'#0D0D0D':'#C8C0B0'}" stroke-width="${big?2.5:1.5}" stroke-linecap="round"/>`;
  }
  return `<svg class="clock-svg" viewBox="0 0 108 108" xmlns="http://www.w3.org/2000/svg">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="#FBF7F0" stroke="#E2D9C8" stroke-width="2"/>
    ${ticks}
    <line x1="${cx}" y1="${cy}" x2="${hx.toFixed(1)}" y2="${hy.toFixed(1)}" stroke="#0D0D0D" stroke-width="4" stroke-linecap="round"/>
    <line x1="${cx}" y1="${cy}" x2="${mx.toFixed(1)}" y2="${my.toFixed(1)}" stroke="#D63031" stroke-width="2.8" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="4" fill="#0D0D0D"/>
    <circle cx="${cx}" cy="${cy}" r="2" fill="#D63031"/>
  </svg>`;
}

// ─── SECTIONS ───
const sections=[
  {icon:'👋',title:'Sapaan & Percakapan Dasar',sub:'Pelajaran 1 — 你好！'},
  {icon:'📅',title:'Hari & Waktu',sub:'Pelajaran 2 & 4 — 星期 & 几点'},
  {icon:'👨‍👩‍👧',title:'Keluarga & Profesi',sub:'Pelajaran 3 — 你的家'},
  {icon:'🕐',title:'Jam & Menyatakan Waktu',sub:'Pelajaran 4 — 几点起床？'},
  {icon:'📝',title:'Kosakata HSK 1',sub:'Kosakata Wajib HSK Level 1'},
  {icon:'📋',title:'Format Soal HSK (阅读)',sub:'Latihan Soal HSK Sesungguhnya'},
];

// ─── QUESTIONS ───
const questions=[
/* ── BAGIAN 1: SAPAAN (1-10) ── */
{sec:0,diff:'medium',
 q:'Apa arti dari ungkapan berikut?<span class="hanzi">你好</span><span class="pinyin">nǐ hǎo</span>',
 opts:['Selamat tinggal','Halo / Hai (sapaan umum)','Terima kasih','Permisi'],ans:1,
 explain:'你好 (nǐ hǎo) = sapaan umum seperti Halo/Hai. 你 (nǐ) = kamu, 好 (hǎo) = baik. Bentuk formal: 您好 (nín hǎo).'},
{sec:0,diff:'medium',
 q:'Apa arti dari kata berikut?<span class="hanzi">谢谢</span><span class="pinyin">xièxie</span>',
 opts:['Maaf','Selamat pagi','Terima kasih','Sampai jumpa'],ans:2,
 explain:'谢谢 (xièxie) = terima kasih. Jawaban lazim: 不客气 (bú kèqi) = sama-sama.'},
{sec:0,diff:'medium',
 q:'Apa arti dari kata berikut?<span class="hanzi">再见</span><span class="pinyin">zàijiàn</span>',
 opts:['Selamat datang','Sampai jumpa / Selamat tinggal','Selamat makan','Permisi'],ans:1,
 explain:'再见 (zàijiàn) = sampai jumpa. 再 (zài) = lagi, 见 (jiàn) = bertemu. Harfiah: "sampai bertemu lagi".'},
{sec:0,diff:'medium',
 q:'Apa arti dari kalimat berikut?<span class="hanzi">你好吗？</span><span class="pinyin">nǐ hǎo ma?</span>',
 opts:['Siapa kamu?','Apa kabar?','Ke mana kamu pergi?','Kamu mau makan apa?'],ans:1,
 explain:'你好吗？(nǐ hǎo ma?) = Apa kabar? 吗 (ma) adalah partikel tanya ya/tidak. Jawaban: 我很好 (wǒ hěn hǎo) = Saya sangat baik.'},
{sec:0,diff:'medium',
 q:'Apa arti dari kalimat berikut?<span class="hanzi">我很好。</span><span class="pinyin">wǒ hěn hǎo.</span>',
 opts:['Saya tidak baik','Saya sangat baik','Saya juga baik','Kami semua baik'],ans:1,
 explain:'我很好 (wǒ hěn hǎo) = Saya sangat baik. 我 (wǒ) = saya, 很 (hěn) = sangat, 好 (hǎo) = baik.'},
{sec:0,diff:'medium',
 q:'Apa arti dari kalimat berikut?<span class="hanzi">我也很好。</span><span class="pinyin">wǒ yě hěn hǎo.</span>',
 opts:['Saya tidak baik','Saya sangat baik','Saya juga sangat baik','Kita semua baik'],ans:2,
 explain:'我也很好 (wǒ yě hěn hǎo) = Saya juga sangat baik. 也 (yě) = juga. Digunakan untuk menyatakan hal yang sama berlaku pada diri sendiri.'},
{sec:0,diff:'medium',
 q:'Apa arti dari kalimat berikut?<span class="hanzi">我们都很好。</span><span class="pinyin">wǒmen dōu hěn hǎo.</span>',
 opts:['Kami tidak baik','Kami sangat baik','Kita semua sangat baik','Mereka semua baik'],ans:2,
 explain:'我们都很好 = Kita semua sangat baik. 我们 (wǒmen) = kami/kita, 都 (dōu) = semua/semuanya.'},
{sec:0,diff:'medium',
 q:'Apa jawaban yang tepat untuk "对不起" (duìbuqǐ)?',
 opts:['谢谢 (xièxie)','再见 (zàijiàn)','没关系 (méiguānxi)','你好 (nǐ hǎo)'],ans:2,
 explain:'对不起 (duìbuqǐ) = maaf. Jawaban yang tepat: 没关系 (méiguānxi) = tidak apa-apa / tidak masalah.'},
{sec:0,diff:'hard',
 q:'Apa arti dari kata berikut?<span class="hanzi">不客气</span><span class="pinyin">bú kèqi</span>',
 opts:['Maaf sekali','Terima kasih banyak','Sama-sama / Tidak perlu sungkan','Selamat pagi'],ans:2,
 explain:'不客气 (bú kèqi) = sama-sama / tidak perlu bersikap sungkan. Digunakan sebagai respons atas 谢谢 (terima kasih).'},
{sec:0,diff:'hard',
 q:'Dalam dialog: A: 你来吗？B: ___。 Kalimat manakah yang benar untuk menjawab "Ya, saya datang"?',
 opts:['我不来 (wǒ bù lái)','我来 (wǒ lái)','他们来 (tāmen lái)','我们都来 (wǒmen dōu lái)'],ans:1,
 explain:'我来 (wǒ lái) = Saya datang. 来 (lái) = datang. Untuk menolak: 我不来 (wǒ bù lái) = saya tidak datang.'},

/* ── BAGIAN 2: HARI & WAKTU (11-20) ── */
{sec:1,diff:'medium',
 q:'Apa arti dari kata berikut?<span class="hanzi">今天</span><span class="pinyin">jīntiān</span>',
 opts:['Kemarin','Besok','Hari ini','Lusa'],ans:2,
 explain:'今天 (jīntiān) = hari ini. Urutan: 昨天 (kemarin) → 今天 (hari ini) → 明天 (besok) → 后天 (lusa).'},
{sec:1,diff:'medium',
 q:'Apa arti dari kata berikut?<span class="hanzi">星期一</span><span class="pinyin">xīngqīyī</span>',
 opts:['Selasa','Rabu','Minggu','Senin'],ans:3,
 explain:'星期一 (xīngqīyī) = Senin. Pola: 星期 + angka (1-6) untuk Senin-Sabtu, 星期天/日 untuk Minggu.'},
{sec:1,diff:'medium',
 q:'Hari apakah 星期五 (xīngqīwǔ)?',
 opts:['Kamis','Jumat','Sabtu','Minggu'],ans:1,
 explain:'星期五 (xīngqīwǔ) = Jumat. 五 (wǔ) = 5. Urutan: 一(Sen) 二(Sel) 三(Rab) 四(Kam) 五(Jum) 六(Sab) 天(Min).'},
{sec:1,diff:'medium',
 q:'Bagaimana cara mengatakan "Hari Minggu" dalam bahasa Mandarin?',
 opts:['星期六 (xīngqīliù)','星期五 (xīngqīwǔ)','星期天 (xīngqītiān)','周末 (zhōumò)'],ans:2,
 explain:'Hari Minggu = 星期天 (xīngqītiān) ATAU 星期日 (xīngqīrì). 周末 (zhōumò) = akhir pekan (Sabtu+Minggu).'},
{sec:1,diff:'medium',
 q:'Apa arti dari pertanyaan berikut?<span class="hanzi">今天星期几？</span><span class="pinyin">jīntiān xīngqī jǐ?</span>',
 opts:['Hari ini tanggal berapa?','Sekarang jam berapa?','Hari ini hari apa?','Besok hari apa?'],ans:2,
 explain:'今天星期几？(jīntiān xīngqī jǐ?) = Hari ini hari apa? 几 (jǐ) = berapa (untuk jumlah kecil/urutan).'},
{sec:1,diff:'medium',
 q:'Apa arti dari kata berikut?<span class="hanzi">明天</span><span class="pinyin">míngtiān</span>',
 opts:['Kemarin','Hari ini','Besok','Lusa'],ans:2,

// ─── RENDER ───
const letters=['A','B','C','D'];
const form=document.getElementById('quiz-form');

let currentSec=-1;
questions.forEach((item,i)=>{
  // section header
  if(item.sec!==currentSec){
    currentSec=item.sec;
    const s=sections[item.sec];
    const sh=document.createElement('div');
    sh.className='section-head';
    sh.innerHTML=`<div class="s-icon">${s.icon}</div><div><div class="s-title">${s.title}</div><div class="s-sub">${s.sub}</div></div><div class="section-line"></div>`;
    form.appendChild(sh);
  }

  const card=document.createElement('div');
  card.className='q-card';card.id='card-'+i;
  const diffLabel=item.diff==='hard'
    ?'<span class="q-badge badge-hard">Sulit</span>'
    :'<span class="q-badge badge-medium">Sedang</span>';
  const optsHTML=item.opts.map((o,j)=>`
    <label class="opt" id="lbl-${i}-${j}">
      <input type="radio" name="q${i}" value="${j}"/>
      <span class="opt-dot">${letters[j]}</span>
      <span class="opt-text">${o}</span>
    </label>`).join('');
  card.innerHTML=`
    <div class="q-top">
      <span class="q-num">${String(i+1).padStart(2,'0')}.</span>
      <span class="q-badge badge-topic">${sections[item.sec].title.split(' ')[0]} ${sections[item.sec].title.split(' ')[1]||''}</span>
      ${diffLabel}
    </div>
    <div class="q-body">${item.q}</div>
    <div class="options">${optsHTML}</div>`;
  form.appendChild(card);

  // render clock
  if(item.clock){
    setTimeout(()=>{
      const cw=card.querySelector('.clock-wrap');
      if(cw)cw.innerHTML=clockSVG(item.clock.h,item.clock.m);
    },0);
  }
});

// ─── PROGRESS ───
const progBar=document.getElementById('prog-bar');
const progText=document.getElementById('prog-text');
const scoreLive=document.getElementById('score-live');

function updateProg(){
  let n=0;
  questions.forEach((_,i)=>{if(document.querySelector(`input[name="q${i}"]:checked`))n++;});
  const pct=n/questions.length*100;
  progBar.style.width=pct+'%';
  progText.textContent=`${n} / ${questions.length} dijawab`;
  // mark card answered
  questions.forEach((_,i)=>{
    const card=document.getElementById('card-'+i);
    if(document.querySelector(`input[name="q${i}"]:checked`))card.classList.add('answered');
    else card.classList.remove('answered');
  });
}
form.addEventListener('change',updateProg);

// ─── SUBMIT ───
document.getElementById('submit-btn').addEventListener('click',()=>{
  const unanswered=[];
  questions.forEach((_,i)=>{
    if(!document.querySelector(`input[name="q${i}"]:checked`))unanswered.push(i);
  });
  if(unanswered.length){
    document.getElementById('warn').style.display='block';
    document.getElementById('card-'+unanswered[0]).scrollIntoView({behavior:'smooth',block:'center'});
    questions.forEach((_,i)=>{
      document.getElementById('card-'+i).classList.toggle('unanswered',unanswered.includes(i));
    });
    return;
  }
  document.getElementById('warn').style.display='none';
  document.getElementById('submit-btn').disabled=true;
  form.querySelectorAll('input[type="radio"]').forEach(r=>r.disabled=true);

  let correct=0;
  const details=[];
  questions.forEach((item,i)=>{
    const sel=parseInt(document.querySelector(`input[name="q${i}"]:checked`).value);
    const ok=sel===item.ans;
    if(ok)correct++;
    for(let j=0;j<item.opts.length;j++){
      const lbl=document.getElementById(`lbl-${i}-${j}`);
      if(j===item.ans)lbl.classList.add('correct');
      else if(j===sel&&!ok)lbl.classList.add('wrong');
    }
    details.push({q:i+1,sec:item.sec,ans:item.ans,sel,ok,
      ansText:item.opts[item.ans],selText:item.opts[sel],explain:item.explain});
  });

  scoreLive.textContent=`Nilai: ${Math.round(correct/questions.length*100)}`;

  const score=Math.round(correct/questions.length*100);
  let pred,col;
  if(score>=90){pred='🏆 Luar Biasa!';col='#C9982A';}
  else if(score>=75){pred='⭐ Sangat Baik';col='#6EC49A';}
  else if(score>=60){pred='📘 Baik';col='#F0C040';}
  else if(score>=40){pred='📖 Terus Belajar!';col='#E09050';}
  else{pred='💪 Jangan Menyerah!';col='#E07878';}

  const kunciHTML=details.map(d=>`
    <div class="ki ${d.ok?'ok':''}">
      <div class="ki-no">Soal ${d.q} · ${sections[d.sec].title.split(' & ')[0]}</div>
      <div class="ki-ans">✓ ${letters[d.ans]}. ${d.ansText}</div>
      ${!d.ok?`<div class="ki-your">✗ Jawaban kamu: ${letters[d.sel]}. ${d.selText}</div>`:''}
      <div class="ki-exp">${d.explain}</div>
    </div>`).join('');

  const hasil=document.getElementById('hasil');
  hasil.innerHTML=`
    <div class="hasil-tag">Nilai Akhirmu</div>
    <div class="hasil-score">${score}</div>
    <div class="hasil-of">${correct} dari ${questions.length} soal benar</div>
    <div class="hasil-pred" style="border-color:${col}44;color:${col}">${pred}</div>
    <div class="hasil-div"></div>
    <div class="hasil-stats">
      <div class="h-stt"><div class="v g">${correct}</div><div class="lbl">Benar</div></div>
      <div class="h-stt"><div class="v r">${questions.length-correct}</div><div class="lbl">Salah</div></div>
      <div class="h-stt"><div class="v">${questions.length}</div><div class="lbl">Total</div></div>
    </div>
    <div class="kunci-title">Kunci Jawaban &amp; Penjelasan</div>
    <div class="kunci-grid">${kunciHTML}</div>
    <button id="retry-btn">↺ Coba Lagi</button>`;
  hasil.style.display='block';
  hasil.scrollIntoView({behavior:'smooth',block:'start'});
  document.getElementById('retry-btn').addEventListener('click',()=>location.reload());
});
</script>
</body>
</html>
