<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kuis PKWU — SMA Kelas XI Semester 2</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F0EBE3; --surface: #FDFAF6; --ink: #1A1614;
      --muted: #7A7068; --accent: #8B3A2A; --border: #DDD0C0;
      --correct: #2B5E3E; --wrong: #8B2020; --radius: 12px;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; padding: 0 0 80px; }

    header {
      background: var(--ink); color: #F0EBE3;
      padding: 52px 24px 44px; text-align: center; position: relative; overflow: hidden;
    }
    header::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 70% 50%, rgba(139,58,42,.18) 0%, transparent 65%),
                  radial-gradient(ellipse at 20% 80%, rgba(139,58,42,.1) 0%, transparent 55%);
    }
    header .label {
      position: relative; display: inline-block; font-size: .68rem; font-weight: 600;
      letter-spacing: .22em; text-transform: uppercase; color: #E8A87C;
      background: rgba(232,168,124,.1); border: 1px solid rgba(232,168,124,.3);
      padding: 5px 16px; border-radius: 99px; margin-bottom: 18px;
    }
    header h1 {
      position: relative;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.9rem, 5vw, 3rem); line-height: 1.18;
    }
    header .sub {
      position: relative; margin-top: 10px; color: #A09080; font-size: .9rem;
    }
    header .difficulty {
      position: relative; display: inline-block; margin-top: 14px;
      font-size: .78rem; font-weight: 600; color: #E8A87C;
      background: rgba(232,168,124,.08); border: 1px solid rgba(232,168,124,.25);
      padding: 4px 14px; border-radius: 99px; letter-spacing: .06em;
    }

    #progress-wrap { position: sticky; top: 0; z-index: 10; background: var(--ink); }
    #progress-bar { height: 3px; background: var(--accent); width: 0%; transition: width .35s ease; }
    #progress-count {
      text-align: right; padding: 4px 16px 5px; font-size: .7rem;
      color: #7A7068; background: var(--ink); letter-spacing: .05em;
    }

    .container { max-width: 780px; margin: 0 auto; padding: 40px 20px 0; }

    .question-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px 28px; margin-bottom: 18px;
      transition: box-shadow .2s;
    }
    .question-card:hover { box-shadow: 0 4px 22px rgba(0,0,0,.07); }
    .question-card.unanswered { border-color: #C8962A; box-shadow: 0 0 0 3px rgba(200,150,42,.14); }

    .q-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .q-num { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 700; color: var(--accent); min-width: 30px; }
    .q-tag {
      font-size: .68rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase;
      color: var(--muted); background: var(--bg); border: 1px solid var(--border);
      padding: 3px 10px; border-radius: 99px;
    }
    .q-diff {
      font-size: .65rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      padding: 3px 9px; border-radius: 99px;
    }
    .q-diff.hard { color: #8B3A2A; background: rgba(139,58,42,.08); border: 1px solid rgba(139,58,42,.2); }
    .q-diff.medium { color: #7A5A1A; background: rgba(122,90,26,.08); border: 1px solid rgba(122,90,26,.2); }

    .q-text { font-size: 1rem; line-height: 1.72; font-weight: 500; margin-bottom: 20px; }
    .q-note { font-size: .82rem; color: var(--muted); font-style: italic; margin-bottom: 16px; margin-top: -10px; }

    .options { display: flex; flex-direction: column; gap: 9px; }
    .option-label {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 8px;
      cursor: pointer; transition: border-color .15s, background .15s; user-select: none;
    }
    .option-label:hover { border-color: var(--accent); background: #FBF4EE; }
    .option-label input[type="radio"] { display: none; }
    .opt-letter {
      flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%;
      background: var(--bg); border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: .74rem; font-weight: 700; color: var(--muted);
      transition: all .15s; margin-top: 1px;
    }
    .option-label:has(input:checked) { border-color: var(--accent); background: #FBF4EE; }
    .option-label:has(input:checked) .opt-letter { background: var(--accent); border-color: var(--accent); color: #fff; }
    .opt-text { font-size: .92rem; line-height: 1.55; padding-top: 2px; }

    .option-label.correct { border-color: var(--correct); background: #EAF3EE; }
    .option-label.correct .opt-letter { background: var(--correct); border-color: var(--correct); color: #fff; }
    .option-label.wrong { border-color: var(--wrong); background: #FAF0EE; }
    .option-label.wrong .opt-letter { background: var(--wrong); border-color: var(--wrong); color: #fff; }

    #btn-wrap { text-align: center; margin-top: 40px; }
    #submit-btn {
      font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600;
      background: var(--ink); color: #F0EBE3; border: none;
      padding: 16px 56px; border-radius: 8px; cursor: pointer;
      transition: background .2s, transform .1s; letter-spacing: .04em;
    }
    #submit-btn:hover { background: #2A2420; transform: translateY(-1px); }
    #submit-btn:active { transform: translateY(0); }
    #submit-btn:disabled { opacity: .4; cursor: not-allowed; }

    #warn-msg {
      display: none; margin-top: 12px; font-size: .86rem; color: #8B6200;
      background: #FFF8E6; border: 1px solid #DEB84A; border-radius: 8px;
      padding: 10px 18px; text-align: center;
    }

    #hasil {
      display: none; margin-top: 44px; background: var(--ink); color: #F0EBE3;
      border-radius: var(--radius); padding: 44px 32px; text-align: center;
      animation: fadeUp .5s ease both;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    .score-label { font-size: .72rem; letter-spacing: .2em; text-transform: uppercase; color: #9A8878; margin-bottom: 10px; }
    .score-num { font-family: 'Playfair Display', serif; font-size: clamp(3.5rem,10vw,5.5rem); font-weight: 700; line-height: 1; color: var(--accent); }
    .score-of { font-size: .88rem; color: #9A8878; margin-top: 6px; }
    .predikat { display: inline-block; margin-top: 18px; font-size: 1rem; font-weight: 600; padding: 7px 22px; border-radius: 99px; border: 1.5px solid rgba(255,255,255,.15); }
    .divider { width: 48px; height: 2px; background: rgba(255,255,255,.1); margin: 24px auto; }
    .summary-row { display: flex; justify-content: center; gap: 36px; flex-wrap: wrap; margin-bottom: 30px; }
    .stat .val { font-size: 1.65rem; font-weight: 700; }
    .stat .val.g { color: #7DCFAA; }
    .stat .val.r { color: #E07878; }
    .stat .lbl { font-size: .75rem; color: #9A8878; margin-top: 3px; }
    .kunci-title { font-family: 'Playfair Display', serif; font-size: 1.22rem; margin-bottom: 18px; }
    .kunci-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(270px,1fr)); gap: 10px; text-align: left; }
    .kunci-item { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.09); border-radius: 8px; padding: 12px 14px; font-size: .84rem; line-height: 1.55; }
    .kunci-item.ok { border-color: rgba(125,207,170,.2); }
    .ki-no { color: #E8A87C; font-weight: 700; margin-bottom: 4px; font-size: .8rem; }
    .ki-ans { color: #7DCFAA; font-weight: 600; }
    .ki-your { color: #E07878; font-size: .8rem; margin-top: 3px; }
    .ki-explain { color: #9A8878; font-size: .78rem; margin-top: 4px; font-style: italic; }

    #retry-btn {
      margin-top: 28px; font-family: 'DM Sans', sans-serif; font-size: .92rem; font-weight: 600;
      background: transparent; color: #F0EBE3; border: 1.5px solid rgba(255,255,255,.22);
      padding: 12px 36px; border-radius: 8px; cursor: pointer; transition: all .2s;
    }
    #retry-btn:hover { border-color: rgba(255,255,255,.6); background: rgba(255,255,255,.06); }

    @media (max-width: 500px) { .question-card { padding: 22px 16px; } #hasil { padding: 32px 16px; } }
  </style>
</head>
<body>

<header>
  <div class="label">SMA &middot; Kelas XI &middot; Semester 2</div>
  <h1>Kuis PKWU</h1>
  <p class="sub">Prakarya &amp; Kewirausahaan &mdash; 20 soal pilihan ganda &mdash; jawab semua lalu kirim</p>
  <div class="difficulty">&#9888; Tingkat Kesulitan: Menengah-Tinggi</div>
</header>
<div id="progress-wrap">
  <div id="progress-bar"></div>
  <div id="progress-count">0 / 20 dijawab</div>
</div>

<div class="container">
  <div id="quiz-form"></div>
  <div id="btn-wrap">
    <button id="submit-btn">Kirim Jawaban</button>
    <div id="warn-msg">&#9888; Masih ada soal yang belum dijawab. Lengkapi semua jawaban terlebih dahulu.</div>
  </div>
  <div id="hasil"></div>
</div>

<script>
const questions = [
  {
    topic: "Konsep Kewirausahaan",
    diff: "medium",
    q: "Seorang wirausahawan sejati memiliki kemampuan untuk melihat peluang di tengah ketidakpastian. Sikap ini disebut …",
    note: "",
    opts: [
      "Risk aversion — menghindari semua risiko yang mungkin terjadi",
      "Calculated risk taking — berani mengambil risiko yang telah diperhitungkan secara matang",
      "Impulsive behavior — bertindak cepat tanpa perencanaan apapun",
      "Defensive strategy — menggunakan sumber daya sesedikit mungkin"
    ],
    ans: 1,
    explain: "Wirausahawan bukan penjudi. Mereka mengambil risiko yang sudah dikalkulasi (calculated risk) — mempertimbangkan kemungkinan untung/rugi, membuat rencana cadangan, dan meminimalkan risiko yang tidak perlu."
  },
  {
    topic: "Analisis Peluang Usaha",
    diff: "medium",
    q: "Analisis SWOT dalam kewirausahaan digunakan untuk mengevaluasi kondisi usaha. Faktor <em>Opportunities</em> (Peluang) dalam SWOT berasal dari …",
    note: "",
    opts: [
      "Keunggulan internal perusahaan seperti SDM yang terlatih dan modal besar",
      "Kelemahan internal perusahaan yang perlu diperbaiki",
      "Kondisi lingkungan eksternal yang menguntungkan dan dapat dimanfaatkan perusahaan",
      "Ancaman dari pesaing dan perubahan regulasi pemerintah"
    ],
    ans: 2,
    explain: "Dalam SWOT: Strengths & Weaknesses = faktor internal, sedangkan Opportunities & Threats = faktor eksternal. Peluang muncul dari tren pasar, kebutuhan konsumen yang belum terpenuhi, atau perubahan teknologi yang menguntungkan."
  },
  {
    topic: "Perencanaan Usaha",
    diff: "hard",
    q: "Bagian paling krusial dalam sebuah <em>business plan</em> (rencana bisnis) yang menjadi dasar keputusan investor adalah …",
    note: "",
    opts: [
      "Profil pendiri dan latar belakang perusahaan",
      "Analisis pasar dan proyeksi keuangan yang realistis",
      "Daftar perlengkapan kantor yang dibutuhkan",
      "Slogan dan logo perusahaan yang menarik"
    ],
    ans: 1,
    explain: "Investor membutuhkan bukti bahwa usaha memiliki pasar yang nyata (analisis pasar) dan akan menghasilkan keuntungan (proyeksi keuangan). Tanpa dua elemen ini, rencana bisnis tidak memiliki dasar yang kuat."
  },
  {
    topic: "Produksi Kerajinan",
    diff: "medium",
    q: "Dalam produksi kerajinan tangan berbasis limbah, prinsip <em>upcycling</em> berbeda dari <em>recycling</em> karena …",
    note: "",
    opts: [
      "Upcycling menghancurkan bahan limbah untuk dijadikan bahan baku baru",
      "Upcycling mengubah limbah menjadi produk bernilai lebih tinggi tanpa proses peleburan atau penghancuran",
      "Upcycling hanya bisa dilakukan oleh industri besar dengan mesin canggih",
      "Upcycling sama persis dengan recycling, hanya berbeda istilah"
    ],
    ans: 1,
    explain: "Upcycling = naik nilai (ban bekas → tas premium, koran → keranjang seni). Recycling = turun lalu naik (plastik dihancurkan → pelet → produk baru). Upcycling lebih ramah lingkungan karena tidak butuh energi pengolahan besar."
  },
  {
    topic: "Strategi Pemasaran",
    diff: "medium",
    q: "Konsep <em>marketing mix</em> 4P terdiri dari Product, Price, Place, dan Promotion. Seorang penjual bakso memutuskan menjual di depan sekolah dan via GoFood. Keputusan ini termasuk strategi …",
    note: "",
    opts: [
      "Product — mengembangkan variasi menu bakso baru",
      "Price — menetapkan harga yang kompetitif",
      "Place — memilih saluran distribusi yang tepat untuk menjangkau konsumen",
      "Promotion — mengiklankan produk di media sosial"
    ],
    ans: 2,
    explain: "Place (distribusi) bukan hanya lokasi fisik, tetapi semua saluran yang menghubungkan produk dengan konsumen — termasuk platform online. Strategi tempat yang tepat memastikan produk mudah dijangkau target pasar."
  },
  {
    topic: "Laporan Keuangan",
    diff: "hard",
    q: "Dalam laporan keuangan usaha kecil, perbedaan antara <em>laba kotor</em> dan <em>laba bersih</em> adalah …",
    note: "",
    opts: [
      "Laba kotor = pendapatan dikurangi semua biaya termasuk pajak; laba bersih = pendapatan sebelum dikurangi biaya apapun",
      "Laba kotor = pendapatan dikurangi Harga Pokok Penjualan (HPP); laba bersih = laba kotor dikurangi biaya operasional dan pajak",
      "Laba kotor dan laba bersih adalah istilah yang sama",
      "Laba kotor hanya untuk perusahaan manufaktur; laba bersih untuk perusahaan jasa"
    ],
    ans: 1,
    explain: "Laba Kotor = Pendapatan − HPP (biaya langsung produksi). Laba Bersih = Laba Kotor − Biaya Operasional (gaji, sewa, listrik) − Pajak. Laba bersih mencerminkan keuntungan sesungguhnya yang diterima pemilik usaha."
  },
  {
    topic: "Harga Pokok Produksi",
    diff: "hard",
    q: "Dita membuat 100 tas rajut. Biaya benang Rp500.000, biaya listrik Rp50.000, dan upah pengrajin Rp300.000. Harga Pokok Produksi (HPP) per unit adalah …",
    note: "Asumsikan tidak ada biaya lain.",
    opts: [
      "Rp5.000",
      "Rp8.000",
      "Rp8.500",
      "Rp3.000"
    ],
    ans: 2,
    explain: "HPP Total = Rp500.000 + Rp50.000 + Rp300.000 = Rp850.000. HPP per unit = Rp850.000 ÷ 100 = Rp8.500. Penting: HPP mencakup semua biaya yang dikeluarkan untuk memproduksi barang (bahan baku + tenaga kerja + overhead)."
  },
  {
    topic: "Pengemasan Produk",
    diff: "medium",
    q: "Fungsi kemasan produk dalam kewirausahaan tidak hanya melindungi produk, tetapi juga berfungsi sebagai …",
    note: "",
    opts: [
      "Alat untuk mengurangi berat produk agar lebih hemat ongkir",
      "Media komunikasi dan branding yang menyampaikan nilai produk serta identitas merek kepada konsumen",
      "Pengganti label harga di supermarket",
      "Syarat administratif pendaftaran NPWP usaha"
    ],
    ans: 1,
    explain: "Kemasan modern berfungsi sebagai 'silent salesman' — menyampaikan brand story, nilai produk, dan membedakan dari kompetitor. Desain kemasan yang baik dapat meningkatkan persepsi nilai produk secara signifikan."
  },
  {
    topic: "Promosi Digital",
    diff: "medium",
    q: "Strategi pemasaran digital yang menggunakan konten edukasi untuk menarik dan membangun kepercayaan konsumen secara organik disebut …",
    note: "",
    opts: [
      "Hard selling — menekan konsumen untuk segera membeli",
      "Cold calling — menghubungi calon konsumen secara acak",
      "Content marketing — membuat konten bernilai yang relevan untuk menarik audiens target",
      "Guerrilla marketing — promosi kejutan di tempat umum"
    ],
    ans: 2,
    explain: "Content marketing membangun kepercayaan jangka panjang — misal UMKM batik yang membuat video tutorial batik mendapat pengikut setia yang akhirnya menjadi pelanggan. Lebih efektif dan murah dibanding iklan berbayar."
  },
  {
    topic: "Sumber Modal Usaha",
    diff: "medium",
    q: "Salah satu keuntungan menggunakan modal dari investor (equity financing) dibandingkan pinjaman bank (debt financing) adalah …",
    note: "",
    opts: [
      "Pemilik usaha tidak perlu berbagi keuntungan dengan siapapun",
      "Tidak ada kewajiban membayar cicilan setiap bulan, sehingga arus kas lebih fleksibel",
      "Bunga yang dibayarkan dapat dikurangkan dari pajak",
      "Proses mendapatkan dana lebih cepat daripada mengajukan KUR"
    ],
    ans: 1,
    explain: "Equity financing tidak memiliki kewajiban cicilan tetap — cocok untuk usaha rintisan yang arus kasnya belum stabil. Kelemahannya: kepemilikan usaha harus dibagi (dilusi). Pinjaman bank lebih mengancam jika pendapatan belum stabil."
  },
  {
    topic: "Koperasi & UMKM",
    diff: "medium",
    q: "Prinsip koperasi yang membedakannya secara mendasar dari perusahaan konvensional (PT/CV) adalah …",
    note: "",
    opts: [
      "Koperasi hanya bergerak di bidang pertanian dan peternakan",
      "Koperasi dikelola secara demokratis (satu anggota satu suara) dan keuntungan dibagi berdasarkan jasa/kontribusi anggota, bukan jumlah saham",
      "Koperasi mendapatkan subsidi penuh dari pemerintah tanpa perlu mencari laba",
      "Koperasi tidak diizinkan meminjam modal dari pihak luar"
    ],
    ans: 1,
    explain: "Di PT/CV: suara dan keuntungan proporsional dengan saham. Di Koperasi: setiap anggota memiliki satu suara (demokratis) dan Sisa Hasil Usaha (SHU) dibagi berdasarkan transaksi/jasa anggota — bukan kepemilikan modal."
  },
  {
    topic: "Manajemen SDM",
    diff: "hard",
    q: "Teori motivasi Herzberg membagi faktor yang memengaruhi kepuasan kerja menjadi dua: <em>hygiene factors</em> dan <em>motivators</em>. Contoh <em>motivator</em> yang meningkatkan kepuasan kerja adalah …",
    note: "",
    opts: [
      "Gaji yang kompetitif dan fasilitas kantor yang lengkap",
      "Kebijakan perusahaan yang jelas dan kondisi kerja yang nyaman",
      "Pengakuan atas prestasi, tanggung jawab yang lebih besar, dan kesempatan berkembang",
      "Hubungan baik dengan rekan kerja dan atasan yang tidak otoriter"
    ],
    ans: 2,
    explain: "Herzberg: Hygiene factors (gaji, fasilitas, kebijakan) hanya mencegah ketidakpuasan — tidak secara aktif memotivasi. Motivators (pengakuan, tanggung jawab, pertumbuhan) yang benar-benar mendorong kepuasan dan kinerja tinggi."
  },
  {
    topic: "Inovasi Produk",
    diff: "medium",
    q: "Strategi <em>Blue Ocean</em> dalam kewirausahaan berbeda dari persaingan pasar biasa karena …",
    note: "",
    opts: [
      "Berfokus pada mengalahkan kompetitor dengan menurunkan harga serendah mungkin",
      "Menciptakan ruang pasar baru yang belum ada persaingan, sehingga kompetisi menjadi tidak relevan",
      "Meniru produk terlaris kompetitor dan menjualnya lebih murah",
      "Berfokus hanya pada segmen pasar kelas atas yang rela membayar mahal"
    ],
    ans: 1,
    explain: "Blue Ocean Strategy (Kim & Mauborgne): daripada bersaing di pasar yang sudah sesak (red ocean/lautan merah darah), ciptakan pasar baru. Contoh: Cirque du Soleil menciptakan 'sirkus premium' yang tidak bersaing langsung dengan sirkus biasa maupun teater."
  },
  {
    topic: "Etika Bisnis",
    diff: "medium",
    q: "Konsep <em>Corporate Social Responsibility</em> (CSR) dalam konteks usaha kecil menengah paling tepat diimplementasikan melalui …",
    note: "",
    opts: [
      "Donasi besar kepada partai politik untuk mendapat perlindungan bisnis",
      "Mempekerjakan tenaga kerja anak usia sekolah karena biayanya lebih murah",
      "Menggunakan bahan baku lokal, memberdayakan pengrajin daerah, dan mengelola limbah produksi secara bertanggung jawab",
      "Menghindari pembayaran pajak secara legal untuk memaksimalkan keuntungan"
    ],
    ans: 2,
    explain: "CSR bukan hanya filantropi — ia adalah tanggung jawab bisnis terhadap lingkungan dan masyarakat. UMKM yang menggunakan bahan lokal, membayar upah layak, dan mengelola limbah dengan baik menjalankan bisnis yang berkelanjutan."
  },
  {
    topic: "Wirausaha Sosial",
    diff: "hard",
    q: "Perbedaan mendasar antara <em>social entrepreneur</em> (wirausaha sosial) dengan wirausaha konvensional terletak pada …",
    note: "",
    opts: [
      "Wirausaha sosial tidak pernah menghasilkan keuntungan finansial sama sekali",
      "Wirausaha sosial menggunakan mekanisme pasar untuk menyelesaikan masalah sosial, di mana dampak sosial adalah tujuan utama bukan sekadar efek samping",
      "Wirausaha sosial hanya beroperasi di sektor pendidikan dan kesehatan",
      "Wirausaha sosial dijalankan oleh LSM dan tidak dapat berbentuk PT"
    ],
    ans: 1,
    explain: "Social entrepreneur (seperti Grameen Bank, Tokopedia di awal) menjadikan dampak sosial sebagai misi inti — bukan afterthought. Mereka tetap harus menghasilkan revenue agar berkelanjutan, tetapi keuntungan finansial bukan tujuan utama."
  },
  {
    topic: "Produksi Pengolahan Pangan",
    diff: "medium",
    q: "Dalam produksi pangan wirausaha, perbedaan antara <em>masa simpan</em> (shelf life) dan <em>tanggal kedaluwarsa</em> (expiry date) adalah …",
    note: "",
    opts: [
      "Keduanya identik dan hanya berbeda dalam penulisan label",
      "Masa simpan adalah perkiraan rentang waktu produk masih berkualitas optimal; tanggal kedaluwarsa adalah batas akhir absolut keamanan produk untuk dikonsumsi",
      "Masa simpan hanya berlaku untuk produk segar; tanggal kedaluwarsa hanya untuk produk olahan",
      "Tanggal kedaluwarsa selalu lebih lama daripada masa simpan"
    ],
    ans: 1,
    explain: "Shelf life = estimasi kualitas optimal (produk masih enak, warna/tekstur bagus). Expiry date = batas keamanan pangan (setelah tanggal ini berpotensi berbahaya). Produsen makanan WAJIB memahami perbedaan ini untuk keamanan konsumen dan kepatuhan BPOM."
  },
  {
    topic: "Perizinan Usaha",
    diff: "medium",
    q: "Sertifikasi yang wajib dimiliki oleh produsen pangan rumahan (home industry) sebelum memasarkan produk makanan di Indonesia adalah …",
    note: "",
    opts: [
      "NPWP (Nomor Pokok Wajib Pajak) dari Dirjen Pajak",
      "SIUP (Surat Izin Usaha Perdagangan) dari Dinas Perdagangan",
      "Izin PIRT (Pangan Industri Rumah Tangga) dari Dinas Kesehatan setempat",
      "Sertifikat ISO 9001 dari lembaga sertifikasi internasional"
    ],
    ans: 2,
    explain: "PIRT (Produksi Pangan Industri Rumah Tangga) adalah izin wajib untuk usaha pangan skala rumahan sebelum dijual ke publik. Tanpa PIRT, produk makanan tidak boleh dipasarkan secara resmi dan dapat disita Dinas Kesehatan."
  },
  {
    topic: "Pengelolaan Keuangan",
    diff: "hard",
    q: "Break-even point (BEP) adalah kondisi di mana …",
    note: "Jika biaya tetap Rp2.000.000, harga jual Rp25.000/unit, biaya variabel Rp15.000/unit, maka BEP = ?",
    opts: [
      "Total pendapatan sama dengan biaya variabel; BEP = 133 unit",
      "Total pendapatan sama dengan total biaya (tetap + variabel); BEP = 200 unit",
      "Laba bersih mencapai 10% dari total pendapatan; BEP = 180 unit",
      "Biaya produksi per unit paling rendah; BEP = 250 unit"
    ],
    ans: 1,
    explain: "BEP = Biaya Tetap ÷ (Harga Jual − Biaya Variabel per unit) = Rp2.000.000 ÷ (Rp25.000 − Rp15.000) = Rp2.000.000 ÷ Rp10.000 = 200 unit. Pada 200 unit, usaha tidak rugi dan tidak untung — modal baru kembali."
  },
  {
    topic: "E-Commerce & Digital",
    diff: "medium",
    q: "Keuntungan utama berjualan melalui marketplace (Tokopedia, Shopee) dibandingkan membuat toko online sendiri bagi usaha pemula adalah …",
    note: "",
    opts: [
      "Biaya komisi di marketplace selalu lebih murah dibandingkan biaya hosting toko sendiri",
      "Marketplace memberikan akses ke basis pelanggan yang sudah ada (existing traffic) tanpa perlu membangun audiens dari nol",
      "Toko di marketplace tidak dikenai biaya apapun selamanya",
      "Produk di marketplace otomatis tampil di halaman pertama Google"
    ],
    ans: 1,
    explain: "Keunggulan marketplace: langsung dapat traffic jutaan pengunjung yang sudah siap belanja. Toko mandiri lebih mengontrol brand dan data pelanggan, tetapi butuh investasi besar untuk membangun traffic. Pemula lebih baik mulai dari marketplace."
  },
  {
    topic: "Pengembangan Usaha",
    diff: "hard",
    q: "Ketika sebuah usaha makanan ringan yang sukses memutuskan untuk membuka sistem <em>waralaba</em> (franchise), hal utama yang harus disiapkan adalah …",
    note: "",
    opts: [
      "Menurunkan harga produk agar mitra lebih mudah mendapat untung besar",
      "Sistem operasional yang terdokumentasi (SOP), brand yang kuat, dan dukungan pelatihan bagi mitra waralaba",
      "Memiliki minimal 100 cabang sendiri sebelum membuka waralaba",
      "Mendaftar sebagai anggota Kamar Dagang dan Industri (KADIN)"
    ],
    ans: 1,
    explain: "Franchise yang sukses bergantung pada replikasi sistem, bukan sekadar produk. SOP yang jelas memastikan kualitas konsisten di semua cabang. Brand yang kuat menarik mitra. Tanpa sistem yang terstandarisasi, waralaba akan kacau dan merusak reputasi brand."
  }
];

const letters = ['A','B','C','D'];
const form = document.getElementById('quiz-form');
const bar  = document.getElementById('progress-bar');
const countEl = document.getElementById('progress-count');
const warn = document.getElementById('warn-msg');
const hasilDiv = document.getElementById('hasil');
const submitBtn = document.getElementById('submit-btn');

questions.forEach((item, i) => {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = 'card-' + i;
  const optsHTML = item.opts.map((opt, j) => `
    <label class="option-label" id="lbl-${i}-${j}">
      <input type="radio" name="q${i}" value="${j}" />
      <span class="opt-letter">${letters[j]}</span>
      <span class="opt-text">${opt}</span>
    </label>`).join('');
  const diffLabel = item.diff === 'hard'
    ? '<span class="q-diff hard">Sulit</span>'
    : '<span class="q-diff medium">Sedang</span>';
  card.innerHTML = `
    <div class="q-meta">
      <span class="q-num">${String(i+1).padStart(2,'0')}.</span>
      <span class="q-tag">${item.topic}</span>
      ${diffLabel}
    </div>
    <p class="q-text">${item.q}</p>
    ${item.note ? '<p class="q-note">'+item.note+'</p>' : ''}
    <div class="options">${optsHTML}</div>`;
  form.appendChild(card);
});

function updateProgress() {
  let n = 0;
  questions.forEach((_,i) => { if (document.querySelector('input[name="q'+i+'"]:checked')) n++; });
  bar.style.width = (n / questions.length * 100) + '%';
  countEl.textContent = n + ' / ' + questions.length + ' dijawab';
}
form.addEventListener('change', updateProgress);

submitBtn.addEventListener('click', () => {
  const unanswered = [];
  questions.forEach((_,i) => {
    const card = document.getElementById('card-'+i);
    if (!document.querySelector('input[name="q'+i+'"]:checked')) {
      unanswered.push(i); card.classList.add('unanswered');
    } else { card.classList.remove('unanswered'); }
  });

  if (unanswered.length > 0) {
    warn.style.display = 'block';
    document.getElementById('card-'+unanswered[0]).scrollIntoView({ behavior:'smooth', block:'center' });
    return;
  }
  warn.style.display = 'none';
  submitBtn.disabled = true;
  form.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = true);

  let correct = 0;
  const details = [];
  questions.forEach((item, i) => {
    const sel = parseInt(document.querySelector('input[name="q'+i+'"]:checked').value);
    const ok = sel === item.ans;
    if (ok) correct++;
    for (let j = 0; j < item.opts.length; j++) {
      const lbl = document.getElementById('lbl-'+i+'-'+j);
      if (j === item.ans) lbl.classList.add('correct');
      else if (j === sel && !ok) lbl.classList.add('wrong');
    }
    details.push({ q:i+1, topic:item.topic, ans:item.ans, sel, ok,
      ansText:item.opts[item.ans], selText:item.opts[sel], explain:item.explain });
  });

  const score = Math.round(correct / questions.length * 100);
  let pred, col;
  if (score >= 90)      { pred = '&#127942; Luar Biasa';          col = '#E8A87C'; }
  else if (score >= 75) { pred = '&#9733; Sangat Baik';           col = '#A8D08D'; }
  else if (score >= 60) { pred = '&#128218; Baik';                col = '#F0C040'; }
  else if (score >= 40) { pred = '&#128214; Cukup — Terus Belajar'; col = '#E09050'; }
  else                  { pred = '&#128172; Jangan Menyerah!';    col = '#E07878'; }

  const kunciHTML = details.map(d => `
    <div class="kunci-item ${d.ok?'ok':''}">
      <div class="ki-no">Soal ${d.q} &mdash; ${d.topic}</div>
      <div class="ki-ans">&#10003; Benar: ${letters[d.ans]}. ${d.ansText}</div>
      ${!d.ok ? '<div class="ki-your">&#10007; Jawaban kamu: '+letters[d.sel]+'. '+d.selText+'</div>' : ''}
      <div class="ki-explain">${d.explain}</div>
    </div>`).join('');

  hasilDiv.innerHTML = `
    <div class="score-label">Nilai Kamu</div>
    <div class="score-num">${score}</div>
    <div class="score-of">${correct} dari ${questions.length} soal benar</div>
    <div class="predikat" style="border-color:${col}44;color:${col}">${pred}</div>
    <div class="divider"></div>
    <div class="summary-row">
      <div class="stat"><div class="val g">${correct}</div><div class="lbl">Benar</div></div>
      <div class="stat"><div class="val r">${questions.length-correct}</div><div class="lbl">Salah</div></div>
      <div class="stat"><div class="val">${questions.length}</div><div class="lbl">Total</div></div>
    </div>
    <div class="kunci-title">Kunci Jawaban &amp; Penjelasan</div>
    <div class="kunci-grid">${kunciHTML}</div>
    <button id="retry-btn">&#128260; Coba Lagi</button>`;
  hasilDiv.style.display = 'block';
  hasilDiv.scrollIntoView({ behavior:'smooth', block:'start' });
  document.getElementById('retry-btn').addEventListener('click', () => location.reload());
});
</script>
</body>
</html>
